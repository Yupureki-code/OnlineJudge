syntax = "proto3";
package oj_judge;
option cc_generic_services = true;

// Transitional Phase 2 messages. New MQ producers must publish
// oj.mq.JudgeTaskMessage and new result callbacks must use
// oj.biz.UpdateJudgeResultRequest. These remain only so the completed Judge
// implementation keeps building until its Phase 7 migration.
message SubmitRequest {
    uint32 submission_id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    string code = 4;
    uint64 timestamp = 5;
    string language = 6;
    int32 time_limit = 7;
    int32 memory_limit = 8;
    bool is_custom_test = 9;
    string custom_input = 10;
}

enum SubmitResult {
    AC = 0;
    WA = 1;
    COMPILE_ERROR = 2;
    MEMORY_LIMIT = 3;
    TIME_LIMIT = 4;
    SEGV_ERROR = 5;
    FPE_ERROR = 6;
    RUNTIME_ERROR = 7;
    UNKNOWN = 8;
}

message SubmitStatus {
    int32 time_cost = 1;
    int32 memory_cost = 2;
    SubmitResult result = 3;
}

message JudgeFinishedRequest {
    uint32 submission_id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    repeated SubmitStatus status_list = 4;
}

// This callback is part of the existing Docker sandbox protocol and remains
// available while Judge migrates to the canonical MQ and result contracts.
message DockerWorkDoneRequest {
    string id = 1;
    string status = 2;
    int32 exit_code = 3;
}

message NullRsp {}

service JudgeService {
    rpc DockerWorkDone(DockerWorkDoneRequest) returns (NullRsp);
}
