syntax = "proto3";
package oj_judge;
option cc_generic_services = true;

// ==================== 判题请求/响应 ====================

message SubmitRequest {
    uint32 submission_id = 1;   // Business Service 生成的提交记录 ID
    string question_id = 2;
    uint32 user_id = 3;
    string code = 4;
    uint64 timestamp = 5;
    string language = 6;        // cpp/python/java
    int32 time_limit = 7;        // ms
    int32 memory_limit = 8;      // MB
    bool is_custom_test = 9;
    string custom_input = 10;
}

enum SubmitResult
{
    AC = 0;
    WA = 1;
    COMPILE_ERROR = 2;
    MEMORY_LIMIT = 3;
    TIME_LIMIT = 4;
    SEGV_ERROR = 5;
    FPE_ERROR = 6;
    RUNTIME_ERROR = 7;
    UNKNOWN = 8;
}

message SubmitStatus{
    int32 time_cost = 1;
    int32 memory_cost = 2;
    SubmitResult result = 3;
}

message JudgeFinishedRequest {
    uint32 submission_id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    repeated SubmitStatus status_list = 4;
}

// ==================== 判题结果 ====================

message DockerWorkDoneRequest{
    string id = 1;       // task_id → 找到存储的协程句柄
    string status = 2;   // OK / COMPILE_ERROR / MEMORY_LIMIT / SEGV / FPE / TIME_LIMIT
    int32  exit_code = 3; // 进程退出码
}

message NullRsp{}

message TestCaseResult {
    int32 index = 1;
    string status = 2;       // AC/WA/TLE/MLE/RTE
    int32 time_ms = 3;
    int64 memory_bytes = 4;
    string diff_info = 5;
}

message JudgeResult {
    uint32 submission_id = 1;
    string status = 2;           // AC/WA/TLE/MLE/CE/RTE/PENDING/JUDGING
    int32 time_used_ms = 3;
    int64 memory_used_bytes = 4;
    string compile_error = 5;
    repeated TestCaseResult test_cases = 6;
}

message GetStatusRequest {
    uint32 submission_id = 1;
}

// ==================== JudgeService ====================

service JudgeService {
    // 容器内脚本完成时回调（编译容器/运行容器都会调用）
    rpc DockerWorkDone(DockerWorkDoneRequest) returns (NullRsp);
}