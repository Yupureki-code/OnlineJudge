syntax = "proto3";
package oj.biz;
option cc_generic_services = true;

import "common.proto";
import "judge_service.proto";

// Authenticated requests intentionally omit actor user IDs. Implementations
// derive identity from oj_session_id or oj_admin_session_id Redis sessions.

message SendVerificationCodeRequest { string email = 1; }
message SendVerificationCodeResponse {
    oj.common.StatusResponse status = 1;
    uint32 retry_after_seconds = 2;
}

message RegisterRequest {
    string email = 1;
    string verification_code = 2;
    string name = 3;
    string password = 4;
}
message AuthResponse {
    oj.common.StatusResponse status = 1;
    oj.common.User user = 2;
}
message VerificationCodeLoginRequest {
    string email = 1;
    string verification_code = 2;
}
message PasswordLoginRequest {
    string email_or_name = 1;
    string password = 2;
}
message SetPasswordRequest { string password = 1; }
message SendSecurityCodeRequest {
    string purpose = 1;
    string new_email = 2;
}
message ChangePasswordRequest {
    string verification_code = 1;
    string new_password = 2;
}
message ChangeEmailRequest {
    string new_email = 1;
    string verification_code = 2;
}
message DeleteAccountRequest { string verification_code = 1; }
message GetUserProfileRequest { uint32 uid = 1; }
message GetUserProfileResponse {
    oj.common.StatusResponse status = 1;
    oj.common.User user = 2;
    oj.common.UserStatistics statistics = 3;
}
message UpdateProfileRequest { string name = 1; }
message UpdateProfileResponse {
    oj.common.StatusResponse status = 1;
    oj.common.User user = 2;
}
message UpdateAvatarRequest {
    bytes content = 1;
    string content_type = 2;
}
message UpdateAvatarResponse {
    oj.common.StatusResponse status = 1;
    oj.common.AvatarMetadata avatar = 2;
}
message GetUserStatisticsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.UserStatistics statistics = 2;
    repeated oj.common.Submission recent_submissions = 3;
}

message GetQuestionListRequest {
    oj.common.PageRequest page = 1;
    string search = 2;
    string difficulty = 3;
    bool include_hidden = 4;
}
message GetQuestionListResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.Question questions = 3;
}
message QuestionIdRequest { string question_id = 1; }
message GetQuestionDetailResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Question question = 2;
    repeated oj.common.TestCase sample_tests = 3;
    bool passed_by_current_user = 4;
}
message GetQuestionPassStatusResponse {
    oj.common.StatusResponse status = 1;
    bool passed = 2;
}
message SaveQuestionRequest { oj.common.Question question = 1; }
message QuestionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Question question = 2;
}
message ListTestCasesRequest {
    string question_id = 1;
    bool sample_only = 2;
}
message ListTestCasesResponse {
    oj.common.StatusResponse status = 1;
    repeated oj.common.TestCase test_cases = 2;
}
message CreateTestCaseRequest {
    string question_id = 1;
    uint32 ordinal = 2;
    string input = 3;
    string expected_output = 4;
    bool is_sample = 5;
}
message UpdateTestCaseRequest { oj.common.TestCase test_case = 1; }
message TestCaseIdRequest { uint64 test_case_id = 1; }
message TestCaseResponse {
    oj.common.StatusResponse status = 1;
    oj.common.TestCase test_case = 2;
}
message InvalidateQuestionCacheRequest { string question_id = 1; }

message ListSolutionsRequest {
    oj.common.PageRequest page = 1;
    string question_id = 2;
    string sort_by = 3;
    uint32 author_uid = 4;
}
message ListSolutionsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.Solution solutions = 3;
}
message SolutionIdRequest { uint64 solution_id = 1; }
message GetSolutionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Solution solution = 2;
    oj.common.User author = 3;
    oj.common.SolutionActionState current_user_actions = 4;
}
message CreateSolutionRequest {
    string question_id = 1;
    string title = 2;
    string content_md = 3;
}
message UpdateSolutionRequest {
    uint64 solution_id = 1;
    string title = 2;
    string content_md = 3;
}
message SolutionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Solution solution = 2;
}
message SolutionActionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.SolutionActionState actions = 2;
    uint64 like_count = 3;
    uint64 favorite_count = 4;
}

message ListCommentsRequest {
    uint64 solution_id = 1;
    oj.common.PageRequest page = 2;
}
message ListRepliesRequest {
    uint64 parent_comment_id = 1;
    oj.common.PageRequest page = 2;
}
message ListCommentsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.Comment comments = 3;
    repeated oj.common.CommentActionState current_user_actions = 4;
}
message CreateCommentRequest {
    uint64 solution_id = 1;
    uint64 parent_comment_id = 2;
    string content = 3;
}
message UpdateCommentRequest {
    uint64 comment_id = 1;
    string content = 2;
}
message CommentIdRequest { uint64 comment_id = 1; }
message CommentResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Comment comment = 2;
}
message CommentActionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.CommentActionState actions = 2;
    uint64 like_count = 3;
    uint64 favorite_count = 4;
}
message GetCommentActionsRequest { repeated uint64 comment_ids = 1; }
message GetCommentActionsResponse {
    oj.common.StatusResponse status = 1;
    repeated oj.common.CommentActionState actions = 2;
}

message AdminLoginRequest {
    uint32 admin_id = 1;
    string password = 2;
}
message AdminLoginResponse {
    oj.common.StatusResponse status = 1;
    oj.common.AdminAccount admin = 2;
}
message GetVersionResponse {
    oj.common.StatusResponse status = 1;
    string service = 2;
    string version = 3;
    string build_date = 4;
    string build_time = 5;
}
message AdminOverviewResponse {
    oj.common.StatusResponse status = 1;
    uint64 total_users = 2;
    uint64 total_questions = 3;
    uint64 total_solutions = 4;
    uint64 total_submissions = 5;
    uint64 today_submissions = 6;
    uint32 judge_server_count = 7;
}
message AdminListUsersRequest {
    oj.common.PageRequest page = 1;
    string search = 2;
}
message AdminListUsersResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.User users = 3;
}
message AdminCreateUserRequest {
    oj.common.User user = 1;
    string password = 2;
}
message AdminUpdateUserRequest { oj.common.User user = 1; }
message AdminUserIdRequest { uint32 uid = 1; }
message AdminUserResponse {
    oj.common.StatusResponse status = 1;
    oj.common.User user = 2;
}
message ListAdminAccountsRequest {
    oj.common.PageRequest page = 1;
    string search = 2;
}
message ListAdminAccountsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.AdminAccount accounts = 3;
}
message SaveAdminAccountRequest {
    oj.common.AdminAccount account = 1;
    string password = 2;
}
message AdminAccountIdRequest { uint32 admin_id = 1; }
message AdminAccountResponse {
    oj.common.StatusResponse status = 1;
    oj.common.AdminAccount account = 2;
}
message GetCacheMetricsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.CacheMetrics metrics = 2;
}
message GetAuditLogsRequest {
    oj.common.PageRequest page = 1;
    string action = 2;
    int64 start_time = 3;
    int64 end_time = 4;
}
message GetAuditLogsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.AdminAuditLog logs = 3;
}
message DiagnosticFilesRequest { string kind = 1; }
message DiagnosticFilesResponse {
    oj.common.StatusResponse status = 1;
    repeated string files = 2;
}
message DiagnosticContentRequest {
    string kind = 1;
    string file = 2;
}
message DiagnosticContentResponse {
    oj.common.StatusResponse status = 1;
    string file = 2;
    string content = 3;
    bool truncated = 4;
    uint32 returned_lines = 5;
}

message CreateSubmissionRequest {
    string question_id = 1;
    string code = 2;
    string language = 3;
}
message CreateSubmissionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Submission submission = 2;
}
message CreateCustomTestRequest {
    string question_id = 1;
    string code = 2;
    string language = 3;
    string custom_input = 4;
}
message CreateCustomTestResponse {
    oj.common.StatusResponse status = 1;
    string task_id = 2;
    oj.common.SubmissionStatus submission_status = 3;
}
message GetSubmissionRequest { uint64 submission_id = 1; }
message GetSubmissionResponse {
    oj.common.StatusResponse status = 1;
    oj.common.Submission submission = 2;
}
message GetCustomTestRequest { string task_id = 1; }
message GetCustomTestResponse {
    oj.common.StatusResponse status = 1;
    string task_id = 2;
    oj.common.SubmissionStatus submission_status = 3;
    oj.common.JudgeResult result = 4;
}
message ListSubmissionsRequest {
    oj.common.PageRequest page = 1;
    string question_id = 2;
    reserved 3;
    oj.common.SubmissionStatus submission_status = 4;
}
message ListSubmissionsResponse {
    oj.common.StatusResponse status = 1;
    oj.common.PageResponse page = 2;
    repeated oj.common.Submission submissions = 3;
    bool guest = 4;
    string message = 5;
}
message UpdateJudgeResultRequest {
    string message_id = 1;
    reserved 2;
    oneof task_id {
        uint64 submission_id = 3;
        string custom_task_id = 4;
    }
    // Serialized oj.common.JudgeResult bytes. The receiver verifies the HMAC
    // over these exact bytes before parsing the result.
    bytes result_payload = 5;
    ServiceAuthentication service_auth = 6;
}
message ServiceAuthentication {
    string key_id = 1;
    int64 timestamp = 2;
    string nonce = 3;
    // HMAC-SHA256 over the UTF-8 bytes of:
    //   oj-judge-result-v1\n
    //   <message_id>\n
    //   submission:<uint64-decimal>\n  OR  custom:<task-id-utf8>\n
    //   <timestamp-decimal>\n
    //   <nonce>\n
    // followed by the raw result_payload bytes. Phase 7 validates the key ID,
    // timestamp window, and nonce replay before parsing or persisting a result.
    bytes hmac_sha256 = 4;
}
enum JudgeResultPersistenceOutcome {
    JUDGE_RESULT_PERSISTENCE_OUTCOME_UNSPECIFIED = 0;
    JUDGE_RESULT_PERSISTENCE_OUTCOME_PERSISTED = 1;
    JUDGE_RESULT_PERSISTENCE_OUTCOME_IDEMPOTENT = 2;
    JUDGE_RESULT_PERSISTENCE_OUTCOME_RETRYABLE_FAILURE = 3;
    JUDGE_RESULT_PERSISTENCE_OUTCOME_REJECTED = 4;
}
message UpdateJudgeResultResponse {
    oj.common.StatusResponse status = 1;
    JudgeResultPersistenceOutcome outcome = 2;
    uint32 retry_after_ms = 3;
}

message InvalidateStaticCacheRequest { string path = 1; }

service OJService {
    rpc SendRegistrationCode(SendVerificationCodeRequest) returns (SendVerificationCodeResponse);
    rpc Register(RegisterRequest) returns (AuthResponse);
    rpc LoginWithVerificationCode(VerificationCodeLoginRequest) returns (AuthResponse);
    rpc LoginWithPassword(PasswordLoginRequest) returns (AuthResponse);
    rpc Logout(oj.common.EmptyRequest) returns (oj.common.EmptyResponse);
    rpc SetPassword(SetPasswordRequest) returns (oj.common.EmptyResponse);
    rpc SendSecurityCode(SendSecurityCodeRequest) returns (SendVerificationCodeResponse);
    rpc ChangePassword(ChangePasswordRequest) returns (oj.common.EmptyResponse);
    rpc ChangeEmail(ChangeEmailRequest) returns (oj.common.EmptyResponse);
    rpc DeleteAccount(DeleteAccountRequest) returns (oj.common.EmptyResponse);
    rpc GetCurrentUser(oj.common.EmptyRequest) returns (GetUserProfileResponse);
    rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
    rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
    rpc DeleteAvatar(oj.common.EmptyRequest) returns (oj.common.EmptyResponse);
    rpc GetStatistics(oj.common.EmptyRequest) returns (GetUserStatisticsResponse);

    rpc ListQuestions(GetQuestionListRequest) returns (GetQuestionListResponse);
    rpc GetQuestion(QuestionIdRequest) returns (GetQuestionDetailResponse);
    rpc GetPassStatus(QuestionIdRequest) returns (GetQuestionPassStatusResponse);
    rpc CreateQuestion(SaveQuestionRequest) returns (QuestionResponse);
    rpc UpdateQuestion(SaveQuestionRequest) returns (QuestionResponse);
    rpc DeleteQuestion(QuestionIdRequest) returns (oj.common.EmptyResponse);
    rpc ListTestCases(ListTestCasesRequest) returns (ListTestCasesResponse);
    rpc CreateTestCase(CreateTestCaseRequest) returns (TestCaseResponse);
    rpc UpdateTestCase(UpdateTestCaseRequest) returns (TestCaseResponse);
    rpc DeleteTestCase(TestCaseIdRequest) returns (oj.common.EmptyResponse);
    rpc InvalidateCache(InvalidateQuestionCacheRequest) returns (oj.common.EmptyResponse);

    rpc ListSolutions(ListSolutionsRequest) returns (ListSolutionsResponse);
    rpc GetSolution(SolutionIdRequest) returns (GetSolutionResponse);
    rpc CreateSolution(CreateSolutionRequest) returns (SolutionResponse);
    rpc UpdateSolution(UpdateSolutionRequest) returns (SolutionResponse);
    rpc DeleteSolution(SolutionIdRequest) returns (oj.common.EmptyResponse);
    rpc ToggleSolutionLike(SolutionIdRequest) returns (SolutionActionResponse);
    rpc ToggleSolutionFavorite(SolutionIdRequest) returns (SolutionActionResponse);
    rpc GetActionState(SolutionIdRequest) returns (SolutionActionResponse);

    rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
    rpc ListReplies(ListRepliesRequest) returns (ListCommentsResponse);
    rpc CreateComment(CreateCommentRequest) returns (CommentResponse);
    rpc UpdateComment(UpdateCommentRequest) returns (CommentResponse);
    rpc DeleteComment(CommentIdRequest) returns (oj.common.EmptyResponse);
    rpc ToggleCommentLike(CommentIdRequest) returns (CommentActionResponse);
    rpc ToggleCommentFavorite(CommentIdRequest) returns (CommentActionResponse);
    rpc GetActionStates(GetCommentActionsRequest) returns (GetCommentActionsResponse);

    rpc CreateSubmission(CreateSubmissionRequest) returns (CreateSubmissionResponse);
    rpc CreateCustomTest(CreateCustomTestRequest) returns (CreateCustomTestResponse);
    rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse);
    rpc GetCustomTest(GetCustomTestRequest) returns (GetCustomTestResponse);
    rpc ListSubmissions(ListSubmissionsRequest) returns (ListSubmissionsResponse);
    rpc UpdateJudgeResult(UpdateJudgeResultRequest) returns (UpdateJudgeResultResponse);
    // Transitional callback used by the completed Phase 2 Judge. Phase 7
    // migrates Judge to UpdateJudgeResult and then removes this method.
    rpc LegacyUpdateJudgeResult(oj_judge.JudgeFinishedRequest) returns (oj_judge.NullRsp);

    rpc InvalidateStaticCache(InvalidateStaticCacheRequest) returns (oj.common.EmptyResponse);
}

service OJAdminService {
    rpc AdminGetVersion(oj.common.EmptyRequest) returns (GetVersionResponse);
    rpc AdminLogin(AdminLoginRequest) returns (AdminLoginResponse);
    rpc AdminLogout(oj.common.EmptyRequest) returns (oj.common.EmptyResponse);
    rpc AdminGetOverview(oj.common.EmptyRequest) returns (AdminOverviewResponse);
    rpc AdminListUsers(AdminListUsersRequest) returns (AdminListUsersResponse);
    rpc AdminGetUser(AdminUserIdRequest) returns (AdminUserResponse);
    rpc AdminCreateUser(AdminCreateUserRequest) returns (AdminUserResponse);
    rpc AdminUpdateUser(AdminUpdateUserRequest) returns (AdminUserResponse);
    rpc AdminDeleteUser(AdminUserIdRequest) returns (oj.common.EmptyResponse);
    rpc AdminListQuestions(GetQuestionListRequest) returns (GetQuestionListResponse);
    rpc AdminGetQuestion(QuestionIdRequest) returns (GetQuestionDetailResponse);
    rpc AdminCreateQuestion(SaveQuestionRequest) returns (QuestionResponse);
    rpc AdminUpdateQuestion(SaveQuestionRequest) returns (QuestionResponse);
    rpc AdminDeleteQuestion(QuestionIdRequest) returns (oj.common.EmptyResponse);
    rpc AdminListTestCases(ListTestCasesRequest) returns (ListTestCasesResponse);
    rpc AdminCreateTestCase(CreateTestCaseRequest) returns (TestCaseResponse);
    rpc AdminUpdateTestCase(UpdateTestCaseRequest) returns (TestCaseResponse);
    rpc AdminDeleteTestCase(TestCaseIdRequest) returns (oj.common.EmptyResponse);
    rpc AdminInvalidateQuestionCache(InvalidateQuestionCacheRequest) returns (oj.common.EmptyResponse);
    rpc AdminListAdminAccounts(ListAdminAccountsRequest) returns (ListAdminAccountsResponse);
    rpc AdminGetAdminAccount(AdminAccountIdRequest) returns (AdminAccountResponse);
    rpc AdminCreateAdminAccount(SaveAdminAccountRequest) returns (AdminAccountResponse);
    rpc AdminUpdateAdminAccount(SaveAdminAccountRequest) returns (AdminAccountResponse);
    rpc AdminDeleteAdminAccount(AdminAccountIdRequest) returns (oj.common.EmptyResponse);
    rpc AdminGetCacheMetrics(oj.common.EmptyRequest) returns (GetCacheMetricsResponse);
    rpc AdminGetAuditLogs(GetAuditLogsRequest) returns (GetAuditLogsResponse);
    rpc AdminListDiagnosticFiles(DiagnosticFilesRequest) returns (DiagnosticFilesResponse);
    rpc AdminReadDiagnosticFile(DiagnosticContentRequest) returns (DiagnosticContentResponse);
}
