syntax = "proto3";
package oj.mq;

// This is a breaking replacement for the unused Phase 2 MQ draft. Producer
// activation and Judge Consumer migration occur together in Phase 7.

message TestCaseInput {
    uint64 test_case_id = 1;
    uint32 index = 2;
    string input = 3;
    string expected_output = 4;
}

// The sole payload published to oj.judge.task. message_id is generated by the
// outbox and is also the idempotency key used by the result callback.
message JudgeTaskMessage {
    string message_id = 1;
    reserved 2;
    oneof task_id {
        uint64 submission_id = 3;
        string custom_task_id = 4;
    }
    uint32 user_id = 5;
    string question_id = 6;
    string code = 7;
    string language = 8;
    uint32 time_limit_ms = 9;
    uint32 memory_limit_mb = 10;
    string custom_input = 11;
    repeated TestCaseInput test_cases = 12;
    int64 created_at = 13;
    uint32 delivery_attempt = 14;
}
