syntax = "proto3";
package oj.mq;
option cc_generic_services = true;

// ==================== 测试用例输入（预查询） ====================

message TestCaseInput {
    string input = 1;
    string expected_output = 2;
}

// ==================== RabbitMQ 消息体 ====================
// 用于 judge_task_queue，Business Service → Judge Worker
// 二进制 Protobuf 传输，避免 JSON 序列化开销

message JudgeTaskMessage {
    uint32 submission_id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    string code = 4;
    string language = 5;        // cpp/python/java
    bool is_custom_test = 6;
    string custom_input = 7;
    int32 time_limit = 8;        // ms
    int32 memory_limit = 9;      // MB
    int64 timestamp = 10;        // 消息创建时间戳
    uint32 retry_count = 11;     // 重试次数（死信队列用）
    repeated TestCaseInput test_cases = 12;  // 预查询的测试用例
}

// ==================== 判题结果回传消息 ====================
// Judge Worker → Business Service（通过 brpc RPC，不走 MQ）
// 此消息定义保留备用，当前回传直接使用 biz_service.proto 的 UpdateSubmissionResult

message JudgeResultCallback {
    uint32 submission_id = 1;
    string status = 2;           // AC/WA/TLE/MLE/CE/RTE
    int32 time_used_ms = 3;
    int64 memory_used_bytes = 4;
    string compile_error = 5;
    string test_cases_json = 6;  // 序列化的 TestCaseResult 列表
    int64 completed_at = 7;
}