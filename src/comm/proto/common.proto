syntax = "proto3";
package oj.common;

// Phase 3 intentionally replaces the legacy JSON-shaped protobuf draft. It is
// a breaking contract deployed only with the final atomic server/frontend
// switch; mixed Phase 2 and Phase 3 business messages are not supported.

enum ErrorCode {
    ERROR_CODE_UNSPECIFIED = 0;
    ERROR_CODE_OK = 1;
    ERROR_CODE_INVALID_ARGUMENT = 2;
    ERROR_CODE_UNAUTHENTICATED = 3;
    ERROR_CODE_PERMISSION_DENIED = 4;
    ERROR_CODE_NOT_FOUND = 5;
    ERROR_CODE_CONFLICT = 6;
    ERROR_CODE_RATE_LIMITED = 7;
    ERROR_CODE_UNAVAILABLE = 8;
    ERROR_CODE_INTERNAL = 9;
}

message StatusResponse {
    ErrorCode code = 1;
    string message = 2;
    bool retryable = 3;
}

message PageRequest {
    uint32 page = 1;
    uint32 page_size = 2;
}

message PageResponse {
    uint64 total_items = 1;
    uint32 page = 2;
    uint32 page_size = 3;
    uint32 total_pages = 4;
}

enum SubmissionStatus {
    SUBMISSION_STATUS_UNSPECIFIED = 0;
    SUBMISSION_STATUS_PENDING = 1;
    SUBMISSION_STATUS_QUEUED = 2;
    SUBMISSION_STATUS_JUDGING = 3;
    SUBMISSION_STATUS_ACCEPTED = 4;
    SUBMISSION_STATUS_WRONG_ANSWER = 5;
    SUBMISSION_STATUS_COMPILE_ERROR = 6;
    SUBMISSION_STATUS_MEMORY_LIMIT_EXCEEDED = 7;
    SUBMISSION_STATUS_TIME_LIMIT_EXCEEDED = 8;
    SUBMISSION_STATUS_RUNTIME_ERROR = 9;
    SUBMISSION_STATUS_SYSTEM_ERROR = 10;
    SUBMISSION_STATUS_CANCELLED = 11;
}

message TestCaseResult {
    uint32 index = 1;
    SubmissionStatus status = 2;
    uint64 time_used_ms = 3;
    uint64 memory_used_bytes = 4;
    string input = 5;
    string expected_output = 6;
    string actual_output = 7;
    string message = 8;
}

message JudgeResult {
    SubmissionStatus status = 1;
    uint64 time_used_ms = 2;
    uint64 memory_used_bytes = 3;
    string compile_error = 4;
    repeated TestCaseResult test_case_results = 5;
    int64 completed_at = 6;
}

message User {
    uint32 uid = 1;
    string name = 2;
    string email = 3;
    int64 create_time = 4;
    int64 last_login = 5;
    int32 role = 6;
    AvatarMetadata avatar = 7;
    bool disabled = 8;
}

message AvatarMetadata {
    string url = 1;
    string content_type = 2;
    uint64 size_bytes = 3;
    int64 updated_at = 4;
}

message UserStatistics {
    uint64 total_submissions = 1;
    uint64 accepted_submissions = 2;
    uint64 accepted_questions = 3;
    uint64 total_solutions = 4;
    uint64 total_likes_received = 5;
}

message Question {
    string id = 1;
    string title = 2;
    string description = 3;
    string difficulty = 4;
    uint32 time_limit_ms = 5;
    uint32 memory_limit_mb = 6;
    int64 create_time = 7;
    int64 update_time = 8;
    bool visible = 9;
}

message TestCase {
    uint64 test_case_id = 1;
    string question_id = 2;
    uint32 ordinal = 3;
    string input = 4;
    string expected_output = 5;
    bool is_sample = 6;
}

message Solution {
    uint64 id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    string title = 4;
    string content_md = 5;
    uint64 like_count = 6;
    uint64 favorite_count = 7;
    uint64 comment_count = 8;
    string moderation_status = 9;
    int64 created_at = 10;
    int64 updated_at = 11;
}

message SolutionActionState {
    bool liked = 1;
    bool favorited = 2;
}

message Comment {
    uint64 id = 1;
    uint64 solution_id = 2;
    uint32 user_id = 3;
    uint64 parent_id = 4;
    uint32 reply_to_user_id = 5;
    string content = 6;
    uint64 like_count = 7;
    uint64 favorite_count = 8;
    bool is_edited = 9;
    int64 created_at = 10;
    int64 updated_at = 11;
}

message CommentActionState {
    uint64 comment_id = 1;
    bool liked = 2;
    bool favorited = 3;
}

message Submission {
    uint64 submission_id = 1;
    uint32 user_id = 2;
    string question_id = 3;
    string code = 4;
    string language = 5;
    SubmissionStatus status = 6;
    JudgeResult result = 7;
    int64 created_at = 8;
    int64 completed_at = 9;
    uint64 result_version = 10;
}

message AdminAccount {
    uint32 admin_id = 1;
    uint32 uid = 2;
    string role = 3;
    int64 created_at = 4;
    bool disabled = 5;
}

message AdminAuditLog {
    uint64 log_id = 1;
    string request_id = 2;
    uint32 operator_admin_id = 3;
    string operator_role = 4;
    string action = 5;
    string resource_type = 6;
    string result = 7;
    int64 created_at = 8;
    string payload_text = 9;
}

message CacheMetrics {
    uint64 hits = 1;
    uint64 misses = 2;
    uint64 errors = 3;
    uint64 invalidations = 4;
    int64 sampled_at = 5;
}

message EmptyRequest {}
message EmptyResponse {
    StatusResponse status = 1;
}
