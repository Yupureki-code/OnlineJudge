syntax = "proto3";
package oj.common;

// ==================== 实体消息 ====================

message User {
    uint32 uid = 1;
    string name = 2;
    string email = 3;
    int64 create_time = 4;  // int64 存储时间戳
    int64 last_login = 5;   // int64 存储时间戳
    int32 role = 6;         // 0=user, 1=admin, 2=super_admin
    string avatar = 7;
}

message Question {
    string id = 1;           // VARCHAR(5)
    string title = 2;
    string desc = 3;         // 题目描述
    string star = 4;         // 难度: 简单/中等/困难
    int32 cpu_limit = 5;     // 时间限制(秒)
    int32 memory_limit = 6;  // 内存限制(MB)
    int64 create_time = 7;
    int64 update_time = 8;
}

message TestCase {
    uint32 id = 1;
    string question_id = 2;
    string input = 3;
    string output = 4;
    bool is_sample = 5;
}

message Solution {
    uint32 id = 1;
    string question_id = 2;
    uint32 user_id = 3;
    string title = 4;
    string content_md = 5;
    uint32 like_count = 6;
    uint32 favorite_count = 7;
    uint32 comment_count = 8;
    string status = 9;       // rejected/pending/approved
    int64 created_at = 10;
    int64 updated_at = 11;
}

message Comment {
    uint32 id = 1;
    uint32 solution_id = 2;
    uint32 user_id = 3;
    uint32 parent_id = 4;         // 0 = 顶级评论
    uint32 reply_to_user_id = 5;  // 回复目标用户
    string content = 6;
    uint32 like_count = 7;
    uint32 favorite_count = 8;
    bool is_edited = 9;
    int64 created_at = 10;
    int64 updated_at = 11;
}

message Submission {
    uint32 user_id = 1;
    string question_id = 2;
    string result_json = 3;  // 判题结果 JSON
    bool is_pass = 4;
    int64 action_time = 5;
}

message AdminAccount {
    uint32 admin_id = 1;
    uint32 uid = 2;
    string role = 3;          // super_admin/admin
    int64 created_at = 4;
}

message AdminAuditLog {
    uint64 log_id = 1;
    string request_id = 2;
    uint32 operator_admin_id = 3;
    string operator_role = 4;
    string action = 5;
    string resource_type = 6;
    string result = 7;        // success/denied/failed
    int64 created_at = 8;
    string payload_text = 9;
}

// ==================== 通用消息 ====================

message PageRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message PageResponse {
    int32 total = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message StatusResponse {
    bool success = 1;
    string error_code = 2;
    string error_message = 3;
}

message EmptyRequest {}
message EmptyResponse {}