<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题解详情 - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            color: #F4F6F0;
            background-color: #2D2F2C;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .background {
            position: fixed;
            inset: 0;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        .rain-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(100vh); opacity: 0; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .head {
            margin-top: 20px;
            align-items: center;
            border-radius: 50%;
        }
        .logo{
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-left: 80px;
            margin-right: 80px;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
            width: 250px;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-toggle:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .rain-toggle::before {
            content: '♪';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .auth-btn {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(244, 246, 240, 0.85);
            border: 1px solid rgba(244, 246, 240, 0.15);
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .auth-btn:hover { background: rgba(255, 255, 255, 0.14); transform: translateY(-1px); }

        .container {
            max-width: 900px;
            margin: 36px auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        .detail-shell {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(244, 246, 240, 0.12);
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .back-link {
            color: rgba(244, 246, 240, 0.6);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.02em;
            padding: 4px 0 16px 0;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover { color: #F4F6F0; }

        .solution-header {
            display: flex;
            gap: 14px;
            padding: 16px 0;
        }

        .solution-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .solution-meta {
            flex: 1;
            min-width: 0;
        }

        .solution-author {
            color: rgba(244, 246, 240, 0.6);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .solution-title {
            color: #F4F6F0;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .solution-actions {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid rgba(244, 246, 240, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.7);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover { background: rgba(255, 255, 255, 0.1); color: #F4F6F0; }
        .action-btn.active { background: rgba(76, 175, 80, 0.15); color: #4CAF50; border-color: rgba(76, 175, 80, 0.3); }

        .divider {
            border: none;
            border-top: 1px solid rgba(244, 246, 240, 0.08);
            margin: 0;
        }

        .solution-content {
            padding: 24px 0;
            color: rgba(244, 246, 240, 0.85);
            line-height: 1.8;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: 0.02em;
            max-height: 400px;
            overflow-y: auto;
        }

        .loading { text-align: center; color: rgba(244, 246, 240, 0.5); padding: 60px 0; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: rgba(60, 80, 60, 0.95);
            margin: 15% auto;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: #F4F6F0;
            position: relative;
        }

        .close {
            color: rgba(244, 246, 240, 0.6);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover { color: #F4F6F0; }
        .modal h2 { margin-bottom: 20px; font-size: 24px; font-weight: 300; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(244, 246, 240, 0.8); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid rgba(244, 246, 240, 0.2); border-radius: 10px; background: rgba(255, 255, 255, 0.05); color: #F4F6F0; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: rgba(244, 246, 240, 0.4); background: rgba(255, 255, 255, 0.08); }
        .form-group input::placeholder { color: rgba(244, 246, 240, 0.4); }
        .submit-btn { width: 100%; padding: 14px; background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.3); border-radius: 10px; color: #4CAF50; font-size: 14px; cursor: pointer; }
        .submit-btn:hover { background: rgba(76, 175, 80, 0.3); }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden { opacity: 0; pointer-events: none; }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        #comment-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        #comment-section h3 {
            color: #F4F6F0;
            margin-bottom: 20px;
        }
        #comment-textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(76,175,80,0.3);
            border-radius: 8px;
            padding: 12px;
            color: #F4F6F0;
            resize: vertical;
        }
        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        #char-count {
            color: rgba(244,246,240,0.6);
            font-size: 12px;
        }
        .btn-submit {
            background: rgba(76,175,80,0.9);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .comment-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(76,175,80,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F4F6F0;
            font-weight: bold;
            object-fit: cover;
            object-position: center;
        }
        .comment-author {
            color: #F4F6F0;
            font-weight: 500;
        }
        .comment-time {
            color: rgba(244,246,240,0.5);
            font-size: 12px;
        }
        .comment-edited {
            color: rgba(244,246,240,0.4);
            font-size: 12px;
            margin-left: 5px;
        }
        .comment-content {
            color: rgba(244,246,240,0.9);
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .comment-actions {
            margin-top: 8px;
        }
        .comment-actions button {
            background: transparent;
            border: 1px solid rgba(76,175,80,0.5);
            color: rgba(76,175,80,0.9);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
            font-size: 12px;
        }

        @media (max-width: 960px) {
            .header { flex-direction: column; gap: 10px; padding: 16px 24px; text-align: center; }
            .nav { gap: 16px; flex-wrap: wrap; justify-content: center; }
            .container { margin: 24px auto; padding: 0 16px; }
            .detail-shell { padding: 20px; }
            .solution-title { font-size: 18px; }
        }

        .comment-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 99999;
            pointer-events: none;
            transition: opacity 0.35s ease;
            letter-spacing: 0.03em;
            font-weight: 400;
        }
        .comment-toast.success { background: rgba(76,175,80,0.92); color: #fff; }
        .comment-toast.error { background: rgba(244,67,54,0.92); color: #fff; }

    </style>
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>

    <div class="background"></div>
    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="/pictures/icon.png" width="40" height="40" alt="logo">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>

                <button class="auth-btn" id="sign-in-button">登录/注册</button>

            <div id="user-profile" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <div class="detail-shell">
            <a href="#" class="back-link" id="back-link">&larr; 全部题解</a>

            <div class="solution-header">
                <div class="solution-avatar" id="solution-avatar">?</div>
                <div class="solution-meta">
                    <div class="solution-author" id="solution-author">加载中...</div>
                    <div class="solution-title" id="solution-title"></div>

                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="modal-email" placeholder="请输入邮箱">
                </div>

    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        (function() {
            function createRainLines() {
                var rainLines = document.getElementById('rainLines');
                if (!rainLines) return;
                for (var i = 0; i < 50; i++) {
                    var line = document.createElement('div');
                    line.className = 'rain-line';
                    line.style.left = Math.random() * 100 + '%';
                    line.style.height = Math.random() * 100 + 50 + 'px';
                    line.style.animationDelay = Math.random() * 3 + 's';
                    line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    rainLines.appendChild(line);
                }
            }
            createRainLines();

            var solutionId = getSolutionId();
            if (!solutionId) {
                document.getElementById('solution-content').textContent = '无效的题解ID';
                return;
            }

            var questionId = '';
            var _loggedIn = false;

            function checkLoggedIn() {
                if (typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO && SERVER_USER_INFO.isLoggedIn) {
                    _loggedIn = true;
                }
                return _loggedIn;
            }

            window.addEventListener('oj-auth-changed', function(e) {
                _loggedIn = !!(e.detail && e.detail.user);
                loadActions();
            });

            fetch('/api/solutions/' + solutionId, {credentials: 'include'})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.success) {
                        document.getElementById('solution-content').textContent = data.error_code || '加载失败';
                        return;
                    }

                    questionId = data.question_id;
                    var initial = (data.author_name && data.author_name.charAt(0)) || '?';
                    document.getElementById('solution-avatar').textContent = initial;
                    document.getElementById('solution-author').textContent = data.author_name || '匿名';
                    document.getElementById('solution-title').textContent = data.title || '';
                    document.getElementById('like-count').textContent = data.like_count || 0;
                    document.getElementById('fav-count').textContent = data.favorite_count || 0;
                    document.title = (data.title || '题解详情') + ' - Yupureki-OJ';

                    // ← 全部题解：跳转到题目详情页的题解tab
                    document.getElementById('back-link').href = '/questions/' + questionId + '#solutions-tab';
                    document.getElementById('back-link').textContent = '\u2190 \u5168\u90e8\u9898\u89e3';

                    var contentEl = document.getElementById('solution-content');
                    if (typeof marked !== 'undefined' && data.content_md) {
                        contentEl.innerHTML = marked.parse(data.content_md);
                    } else {
                        contentEl.textContent = data.content_md || '';
                    }

                    loadActions();
                })
                .catch(function(err) {
                    document.getElementById('solution-content').textContent = '网络异常，请重试';
                    console.error(err);
                });

            function loadActions() {
                if (!checkLoggedIn()) {
                    updateActionButtons(false, false);
                    return;
                }
                fetch('/api/solutions/' + solutionId + '/actions', {credentials: 'include'})
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success) {
                            updateActionButtons(data.liked, data.favorited);
                        }
                    })
                    .catch(function() {});
            }

            function updateActionButtons(liked, favorited) {
                var likeBtn = document.getElementById('like-btn');
                var favBtn = document.getElementById('fav-btn');
                if (liked) likeBtn.classList.add('active');
                else likeBtn.classList.remove('active');
                if (favorited) favBtn.classList.add('active');
                else favBtn.classList.remove('active');
            }

            document.getElementById('like-btn').addEventListener('click', function() {
                if (!checkLoggedIn()) {
                    var signInButton = document.getElementById('sign-in-button');
                    if (signInButton) signInButton.click();
                    return;
                }
                fetch('/api/solutions/' + solutionId + '/like', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'}
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('like-count').textContent = data.like_count;
                        updateActionButtons(data.liked, document.getElementById('fav-btn').classList.contains('active'));
                    }
                })
                .catch(function() {});
            });

            document.getElementById('fav-btn').addEventListener('click', function() {
                if (!checkLoggedIn()) {
                    var signInButton = document.getElementById('sign-in-button');
                    if (signInButton) signInButton.click();
                    return;
                }
                fetch('/api/solutions/' + solutionId + '/favorite', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'}
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('fav-count').textContent = data.favorite_count;
                        updateActionButtons(document.getElementById('like-btn').classList.contains('active'), data.favorited);
                    }
                })
                .catch(function() {});
            });
        })();
    </script>
    <script>
        (function() {
            var currentUser = null;
            var currentPage = 1;
            var hasMoreComments = true;
            var isLoading = false;

            function getSolutionId() {
                var m = window.location.pathname.match(/\/solutions\/(\d+)/);
                return m ? m[1] : null;
            }

            function formatRelativeTime(timestamp) {
                var date = new Date(timestamp);
                var now = new Date();
                var diff = Math.floor((now - date) / 1000);

                if (diff < 60) return '刚刚';
                if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
                if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
                if (diff < 604800) return Math.floor(diff / 86400) + '天前';
                return date.toLocaleDateString('zh-CN');
            }

            function checkAuth() {
                fetch('/api/user/info', { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success) {
                            currentUser = data.user;
                            document.getElementById('comment-login-prompt').style.display = 'none';
                            document.getElementById('comment-form').style.display = 'block';
                        } else {
                            document.getElementById('comment-login-prompt').style.display = 'block';
                            document.getElementById('comment-form').style.display = 'none';
                        }
                    })
                    .catch(function() {
                        document.getElementById('comment-login-prompt').style.display = 'block';
                    });
            }

            function loadComments(page) {
                if (isLoading || !hasMoreComments) return;
                isLoading = true;
                document.getElementById('comment-loading').style.display = 'block';

                var solutionId = getSolutionId();
                fetch('/api/solutions/' + solutionId + '/comments?page=' + page + '&size=20', {
                    credentials: 'include'
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('comment-count').textContent = '(共 ' + data.total + ' 条评论)';

                        if (page === 1) {
                            document.getElementById('comment-list').innerHTML = '';
                        }

                        data.comments.forEach(function(comment) {
                            renderComment(comment);
                        });

                        hasMoreComments = page < data.total_pages;
                        currentPage = page;

                        if (!hasMoreComments) {
                            document.getElementById('comment-no-more').style.display = 'block';
                        }
                    }
                })
                .catch(function(e) {
                    console.error('加载评论失败:', e);
                })
                .finally(function() {
                    isLoading = false;
                    document.getElementById('comment-loading').style.display = 'none';
                });
            }

            function renderComment(comment, isReply) {
                var div = document.createElement('div');
                div.className = 'comment-item' + (isReply ? ' comment-reply' : '');
                div.dataset.commentId = comment.id;

                var isOwner = currentUser && currentUser.uid === comment.user_id;
                var canDelete = isOwner || (currentUser && currentUser.is_admin);

                var avatar = document.createElement('img');
                avatar.className = 'comment-avatar';
                avatar.src = comment.author_avatar || '/pictures/head.jpg';
                avatar.onerror = function() { this.src = '/pictures/head.jpg'; };

                var author = document.createElement('span');
                author.className = 'comment-author';
                author.textContent = (isReply && comment.reply_to_user_name ? '@' + comment.reply_to_user_name + ' ' : '') + (comment.author_name || '匿名');

                var time = document.createElement('span');
                time.className = 'comment-time';
                time.textContent = formatRelativeTime(comment.created_at);

                var content = document.createElement('div');
                content.className = 'comment-content';
                content.textContent = comment.content;

                var header = document.createElement('div');
                header.className = 'comment-header';
                header.appendChild(avatar);
                header.appendChild(author);
                header.appendChild(time);

                if (comment.is_edited) {
                    var edited = document.createElement('span');
                    edited.className = 'comment-edited';
                    edited.textContent = '(已编辑)';
                    header.appendChild(edited);
                }

                var actions = document.createElement('div');
                actions.className = 'comment-actions';

                // 点赞按钮
                var likeBtn = document.createElement('button');
                likeBtn.textContent = '❤ ' + (comment.like_count || 0);
                likeBtn.className = 'like-btn';
                likeBtn.onclick = function() { toggleCommentLike(comment.id, likeBtn); };
                actions.appendChild(likeBtn);

                // 收藏按钮
                var favBtn = document.createElement('button');
                favBtn.textContent = '⭐ ' + (comment.favorite_count || 0);
                favBtn.className = 'fav-btn';
                favBtn.onclick = function() { toggleCommentFavorite(comment.id, favBtn); };
                actions.appendChild(favBtn);

                // 回复按钮（仅顶级评论显示）
                if (!isReply) {
                    var replyBtn = document.createElement('button');
                    replyBtn.textContent = '回复';
                    replyBtn.onclick = function() { showReplyForm(comment.id, comment.author_name, true); };
                    actions.appendChild(replyBtn);
                }

                if (isOwner) {
                    var editBtn = document.createElement('button');
                    editBtn.textContent = '编辑';
                    editBtn.onclick = (function(cid, ccontent) {
                        return function() { editComment(cid, ccontent); };
                    })(comment.id, comment.content);
                    actions.appendChild(editBtn);
                }
                if (canDelete) {
                    var deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '删除';
                    deleteBtn.onclick = (function(cid) {
                        return function() { deleteComment(cid); };
                    })(comment.id);
                    actions.appendChild(deleteBtn);
                }

                div.appendChild(header);
                div.appendChild(content);
                div.appendChild(actions);

                // 顶级评论的回复区域
                if (!isReply) {
                    // 回复计数 + 展开按钮
                    var replyCount = comment.reply_count || 0;
                    if (replyCount > 0) {
                        var replyToggle = document.createElement('div');
                        replyToggle.className = 'reply-toggle';
                        replyToggle.style.cssText = 'margin-left:20px;cursor:pointer;color:rgba(244,246,240,0.6);font-size:13px;padding:4px 0;';
                        replyToggle.textContent = '▼ ' + replyCount + ' 条回复';
                        var replyContainer = document.createElement('div');
                        replyContainer.className = 'reply-container';
                        replyContainer.style.display = 'none';
                        replyToggle.onclick = function() {
                            if (replyContainer.style.display === 'none') {
                                replyContainer.style.display = 'block';
                                replyToggle.textContent = '▲ ' + replyCount + ' 条回复';
                                loadReplies(comment.id, replyContainer);
                            } else {
                                replyContainer.style.display = 'none';
                                replyToggle.textContent = '▼ ' + replyCount + ' 条回复';
                            }
                        };
                        div.appendChild(replyToggle);
                        div.appendChild(replyContainer);
                    }

                    // 回复表单
                    var replyForm = document.createElement('div');
                    replyForm.className = 'reply-form';
                    replyForm.id = 'reply-form-' + comment.id;
                    replyForm.style.cssText = 'display:none;margin-left:20px;margin-top:8px;';
                    replyForm.innerHTML = '<textarea id="reply-text-' + comment.id + '" maxlength="1000" style="width:100%;min-height:60px;background:rgba(255,255,255,0.06);border:1px solid rgba(244,246,240,0.2);border-radius:8px;color:#F4F6F0;padding:8px;resize:vertical;"></textarea><div style="margin-top:6px;display:flex;gap:8px;"><button onclick="submitReply(' + comment.id + ')" style="padding:6px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(244,246,240,0.2);border-radius:6px;color:#F4F6F0;cursor:pointer;">回复</button><button onclick="hideReplyForm(' + comment.id + ')" style="padding:6px 16px;background:transparent;border:none;color:rgba(244,246,240,0.5);cursor:pointer;">取消</button></div>';
                    div.appendChild(replyForm);
                } else {
                    // Nested reply toggle
                    var nestedReplyCount = comment.reply_count || 0;
                    if (nestedReplyCount > 0) {
                        var nestedToggle = document.createElement('div');
                        nestedToggle.className = 'reply-toggle';
                        nestedToggle.style.cssText = 'margin-left:4px;cursor:pointer;color:rgba(244,246,240,0.6);font-size:12px;padding:4px 0;';
                        nestedToggle.textContent = '▼ ' + nestedReplyCount + ' 条回复';
                        var nestedContainer = document.createElement('div');
                        nestedContainer.className = 'reply-container';
                        nestedContainer.id = 'nested-reply-' + comment.id;
                        nestedContainer.style.display = 'none';
                        nestedToggle.onclick = function() {
                            if (nestedContainer.style.display === 'none') {
                                nestedContainer.style.display = 'block';
                                nestedToggle.textContent = '▲ ' + nestedReplyCount + ' 条回复';
                                loadReplies(comment.id, nestedContainer);
                            } else {
                                nestedContainer.style.display = 'none';
                                nestedToggle.textContent = '▼ ' + nestedReplyCount + ' 条回复';
                            }
                        };
                        div.appendChild(nestedToggle);
                        div.appendChild(nestedContainer);
                    }
                }

                document.getElementById('comment-list').appendChild(div);
            }

            // 切换评论点赞
            function toggleCommentLike(commentId, btn) {
                if (!currentUser) { alert('请先登录'); return; }
                fetch('/api/comments/' + commentId + '/like', { method: 'POST', credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.success) {
                            btn.textContent = '❤ ' + d.like_count;
                            btn.style.color = d.liked ? '#ff6b6b' : '';
                        }
                    });
            }

            // 切换评论收藏
            function toggleCommentFavorite(commentId, btn) {
                if (!currentUser) { alert('请先登录'); return; }
                fetch('/api/comments/' + commentId + '/favorite', { method: 'POST', credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.success) {
                            btn.textContent = '⭐ ' + d.favorite_count;
                            btn.style.color = d.favorited ? '#ffd700' : '';
                        }
                    });
            }

            // 加载回复
            function loadReplies(parentId, container) {
                if (container.dataset.loaded === 'true') return;
                container.innerHTML = '<div style="color:rgba(244,246,240,0.5);padding:8px;">加载中...</div>';
                fetch('/api/comments/' + parentId + '/replies?page=1&size=50', { credentials: 'include' })
                    .then(function(r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(function(d) {
                        container.innerHTML = '';
                        if (d.success && d.comments && d.comments.length > 0) {
                            d.comments.forEach(function(reply) { renderCommentInline(reply, container); });
                        } else if (d.success && (!d.comments || d.comments.length === 0)) {
                            container.innerHTML = '<div style="color:rgba(244,246,240,0.3);padding:8px 0;font-size:12px;">暂无回复</div>';
                        } else {
                            container.innerHTML = '<div style="color:#F44336;padding:8px 0;font-size:12px;">加载失败: ' + (d.error_code || '') + '</div>';
                        }
                        container.dataset.loaded = 'true';
                    })
                    .catch(function(e) {
                        container.innerHTML = '<div style="color:#F44336;padding:8px 0;font-size:12px;">加载失败: ' + (e.message || '网络错误') + '</div>';
                        console.error('加载回复失败:', e);
                    });
            }

            // 内联渲染回复（含点赞/收藏/回复/编辑/删除按钮）
            function renderCommentInline(comment, container) {
                var div = document.createElement('div');
                div.className = 'comment-item comment-reply';
                div.style.cssText = 'padding:10px;margin:4px 0;border-left:2px solid rgba(244,246,240,0.1);';

                var isOwner = currentUser && currentUser.uid === comment.user_id;

                var avatar = document.createElement('img');
                avatar.className = 'comment-avatar';
                avatar.src = comment.author_avatar || '/pictures/head.jpg';
                avatar.onerror = function() { this.src = '/pictures/head.jpg'; };

                var authorSpan = '<span style="color:rgba(244,246,240,0.6);font-size:12px;">' + (comment.reply_to_user_name ? '@' + comment.reply_to_user_name + ' ' : '') + (comment.author_name || '匿名') + '</span>';
                var timeSpan = '<span style="color:rgba(244,246,240,0.4);font-size:11px;margin-left:8px;">' + formatRelativeTime(comment.created_at) + '</span>';
                var editedSpan = comment.is_edited ? '<span style="color:rgba(244,246,240,0.4);font-size:11px;margin-left:4px;">(已编辑)</span>' : '';

                var headerDiv = document.createElement('div');
                headerDiv.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;';
                headerDiv.innerHTML = authorSpan + timeSpan + editedSpan;

                var contentDiv = document.createElement('div');
                contentDiv.style.cssText = 'margin-top:4px;color:rgba(244,246,240,0.85);font-size:13px;';
                contentDiv.textContent = comment.content;

                // Actions: like, favorite, reply, edit, delete
                var actionsDiv = document.createElement('div');
                actionsDiv.style.cssText = 'margin-top:6px;display:flex;gap:6px;';

                var likeBtn = document.createElement('button');
                likeBtn.textContent = '❤ ' + (comment.like_count || 0);
                likeBtn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;';
                likeBtn.onclick = function() { toggleCommentLike(comment.id, likeBtn); };
                actionsDiv.appendChild(likeBtn);

                var favBtn = document.createElement('button');
                favBtn.textContent = '⭐ ' + (comment.favorite_count || 0);
                favBtn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;';
                favBtn.onclick = function() { toggleCommentFavorite(comment.id, favBtn); };
                actionsDiv.appendChild(favBtn);

                // Reply button on replies
                var replyBtn = document.createElement('button');
                replyBtn.textContent = '回复';
                replyBtn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;';
                replyBtn.onclick = function() { showReplyForm(comment.id, comment.author_name, false); };
                actionsDiv.appendChild(replyBtn);

                if (isOwner) {
                    var editBtn = document.createElement('button');
                    editBtn.textContent = '编辑';
                    editBtn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;';
                    editBtn.onclick = (function(cid, ccontent) {
                        return function() { editComment(cid, ccontent); };
                    })(comment.id, comment.content);
                    actionsDiv.appendChild(editBtn);

                    var deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '删除';
                    deleteBtn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;';
                    deleteBtn.onclick = (function(cid) {
                        return function() { deleteComment(cid); };
                    })(comment.id);
                    actionsDiv.appendChild(deleteBtn);
                }

                // Reply form for nested reply
                var replyForm = document.createElement('div');
                replyForm.className = 'reply-form';
                replyForm.id = 'reply-form-' + comment.id;
                replyForm.style.cssText = 'display:none;margin-top:8px;';
                replyForm.innerHTML = '<textarea id="reply-text-' + comment.id + '" maxlength="1000" style="width:100%;min-height:50px;background:rgba(255,255,255,0.06);border:1px solid rgba(244,246,240,0.2);border-radius:6px;color:#F4F6F0;padding:6px 8px;resize:vertical;font-size:13px;"></textarea><div style="margin-top:4px;display:flex;gap:6px;"><button onclick="submitReply(' + comment.id + ')" style="padding:4px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(244,246,240,0.2);border-radius:4px;color:#F4F6F0;cursor:pointer;font-size:12px;">回复</button><button onclick="hideReplyForm(' + comment.id + ')" style="padding:4px 12px;background:transparent;border:none;color:rgba(244,246,240,0.5);cursor:pointer;font-size:12px;">取消</button></div>';

                div.appendChild(headerDiv);
                div.appendChild(contentDiv);
                div.appendChild(actionsDiv);
                div.appendChild(replyForm);
                container.appendChild(div);
            }

            // 显示回复表单
            function showReplyForm(parentId, username, isTopLevel) {
                var form = document.getElementById('reply-form-' + parentId);
                if (!form) {
                    form = document.querySelector('[id="reply-form-' + parentId + '"]');
                }
                if (!form) { console.warn('Reply form not found: reply-form-' + parentId); return; }
                var textarea = document.getElementById('reply-text-' + parentId);
                if (!textarea) {
                    textarea = form.querySelector('textarea');
                }
                if (textarea) {
                    textarea.value = isTopLevel ? '' : ('@' + (username || '用户') + ' ');
                }
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
            }

            // 隐藏回复表单
            function hideReplyForm(parentId) {
                var form = document.getElementById('reply-form-' + parentId);
                if (form) form.style.display = 'none';
            }

            // 提交回复
            function submitReply(parentId) {
                if (!currentUser) { alert('请先登录'); return; }
                var textarea = document.getElementById('reply-text-' + parentId);
                var content = textarea ? textarea.value.trim() : '';
                if (!content) return;
                var solutionId = getSolutionId();
                if (!solutionId) { alert('无法获取题解ID，请刷新页面'); return; }
                console.log('提交回复: solutionId=' + solutionId + ' parentId=' + parentId);
                fetch('/api/solutions/' + solutionId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: content, parent_id: parentId })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success) {
                        hideReplyForm(parentId);
                        loadComments(1);
                        showToast('回复成功！');
                    } else {
                        showToast('回复失败: ' + (d.error_code || '未知错误'), true);
                    }
                });
            }

            // Expose reply functions globally for inline onclick handlers
            window.showReplyForm = showReplyForm;
            window.hideReplyForm = hideReplyForm;
            window.submitReply = submitReply;

            function editComment(commentId, currentContent) {
                var newContent = prompt('编辑评论:', currentContent);
                if (newContent === null || newContent.trim() === currentContent) return;
                if (newContent.trim().length > 1000) {
                    alert('评论内容不能超过1000字');
                    return;
                }

                fetch('/api/comments/' + commentId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: newContent.trim() })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        hasMoreComments = true;
                        currentPage = 1;
                        document.getElementById('comment-no-more').style.display = 'none';
                        loadComments(1);
                    } else {
                        alert(data.error_code === 'FORBIDDEN' ? '无权操作' : '编辑失败');
                    }
                })
                .catch(function() { alert('网络错误，请重试'); });
            }

            function deleteComment(commentId) {
                if (!confirm('确定要删除这条评论吗？')) return;

                fetch('/api/comments/' + commentId, {
                    method: 'DELETE',
                    credentials: 'include'
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        hasMoreComments = true;
                        currentPage = 1;
                        document.getElementById('comment-no-more').style.display = 'none';
                        loadComments(1);
                    } else {
                        alert(data.error_code === 'FORBIDDEN' ? '无权操作' : '删除失败');
                    }
                })
                .catch(function() { alert('网络错误，请重试'); });
            }

            function requireLogin() {
                var signInButton = document.getElementById('sign-in-button');
                if (signInButton) signInButton.click();
            }

            document.getElementById('submit-comment').addEventListener('click', function() {
                var content = document.getElementById('comment-textarea').value.trim();
                if (!content) {
                    showToast('评论内容不能为空', true);
                    return;
                }
                if (content.length > 1000) {
                    showToast('评论内容不能超过1000字', true);
                    return;
                }

                var solutionId = getSolutionId();
                fetch('/api/solutions/' + solutionId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: content })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('comment-textarea').value = '';
                        document.getElementById('char-count').textContent = '0/1000';
                        hasMoreComments = true;
                        currentPage = 1;
                        document.getElementById('comment-no-more').style.display = 'none';
                        loadComments(1);
                        showToast('发布成功！');
                    } else {
                        showToast(data.error_code === 'UNAUTHORIZED' ? '请先登录' : '发布失败', true);
                    }
                })
                .catch(function() { showToast('网络错误，请重试', true); });
            });

            document.getElementById('comment-textarea').addEventListener('input', function(e) {
                document.getElementById('char-count').textContent = e.target.value.length + '/1000';
            });

            window.addEventListener('scroll', function() {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                    if (!isLoading && hasMoreComments) {
                        loadComments(currentPage + 1);
                    }
                }
            });

            checkAuth();
            loadComments(1);

            function showToast(msg, isError) {
                console.log('showToast called:', msg);
                var toast = document.getElementById('comment-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'comment-toast';
                    toast.className = 'comment-toast';
                    document.body.appendChild(toast);
                }
                toast.textContent = msg;
                toast.className = 'comment-toast ' + (isError ? 'error' : 'success');
                toast.style.opacity = '1';
                clearTimeout(toast._timer);
                toast._timer = setTimeout(function() { toast.style.opacity = '0'; }, 2500);
            }
        })();
    </script>
<script src="/js/search.js"></script>
</body>
</html>
