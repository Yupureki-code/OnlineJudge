<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布题解 - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            color: #F4F6F0;
            background-color: #2D2F2C;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .background {
            position: fixed;
            inset: 0;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        .rain-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(100vh); opacity: 0; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            position: relative;
            z-index: 2;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav a, .logo {
            color: rgba(244, 246, 240, 0.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        .logo {
            font-size: 24px;
            letter-spacing: 0.1em;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .rain-toggle::before {
            content: '\u266A';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .search-container {
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
        }

        .auth-btn,
        .action-btn {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(244, 246, 240, 0.85);
            border: 1px solid rgba(244, 246, 240, 0.15);
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .auth-btn:hover,
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        .container {
            max-width: 1120px;
            margin: 36px auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        .editor-shell {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(244, 246, 240, 0.12);
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .page-title {
            font-size: 34px;
            font-weight: 300;
            letter-spacing: 0.06em;
        }

        .page-subtitle {
            color: rgba(244, 246, 240, 0.72);
            font-size: 14px;
            line-height: 1.7;
        }

        .question-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(244, 246, 240, 0.1);
            border-radius: 999px;
            font-size: 13px;
        }

        .form-grid {
            display: grid;
            gap: 18px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(244, 246, 240, 0.82);
            font-size: 13px;
            letter-spacing: 0.03em;
        }

        .text-input {
            width: 100%;
            border: 1px solid rgba(244, 246, 240, 0.16);
            border-radius: 18px;
            background: rgba(20, 24, 20, 0.36);
            color: #F4F6F0;
            padding: 16px 18px;
            font-size: 14px;
        }

        .text-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.3);
            background: rgba(20, 24, 20, 0.5);
        }

        .hint-box {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.72);
            font-size: 13px;
            line-height: 1.7;
        }

        .message-box {
            min-height: 20px;
            font-size: 13px;
        }

        .message-box.error {
            color: #ffb5b0;
        }

        .message-box.success {
            color: #b8f3be;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions-left,
        .actions-right {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .primary-btn {
            background: rgba(76, 175, 80, 0.18);
            color: #86d98b;
            border-color: rgba(76, 175, 80, 0.34);
        }

        .disabled-panel {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.75);
            line-height: 1.7;
        }

        #vditor-editor {
            border-radius: 18px;
            overflow: hidden;
            min-height: 420px;
        }

        @media (max-width: 960px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 16px 24px;
                text-align: center;
            }

            .nav {
                gap: 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .container {
                margin: 24px auto;
                padding: 0 16px;
            }

            .editor-shell {
                padding: 20px;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.10.5/dist/index.css">
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>

    <div class="background"></div>
    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="/pictures/icon.png" width="40" height="40" alt="logo">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <div id="user-profile" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <div class="editor-shell">
            <div>
                <h1 class="page-title">发布题解</h1>
            </div>

            <div class="question-badge" id="question-badge">正在加载题目信息...</div>

            <div id="login-required" class="disabled-panel" style="display: none;">
                当前未登录，不能发布题解。请先登录，再返回本页面继续编辑。
            </div>

            <div id="publish-form-shell" class="form-grid">
                <div>
                    <label class="field-label" for="solution-title">题解标题</label>
                    <input id="solution-title" class="text-input" maxlength="30" placeholder="30字以内，尽量说明核心思路">
                </div>

                <div>
                    <label class="field-label" for="solution-content">题解正文</label>
                    <div id="vditor-editor"></div>
                </div>

                <div id="publish-message" class="message-box"></div>

                <div class="actions">
                    <div class="actions-left">
                        <a id="back-to-question" class="action-btn" href="/all_questions">返回题目</a>
                    </div>
                    <div class="actions-right">
                        <button id="reset-form" type="button" class="action-btn">清空内容</button>
                        <button id="submit-solution" type="button" class="action-btn primary-btn">发布题解</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
    <script src="https://cdn.jsdelivr.net/npm/vditor@3.10.5/dist/index.min.js"></script>
    <script>
        var vditor = null;

        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            if (!rainLines) return;

            const lineCount = 50;
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'rain-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        function getQuestionIdFromPath() {
            const match = window.location.pathname.match(/\/questions\/(\d+)\/solutions\/new$/);
            return match ? match[1] : '';
        }

        function setMessage(text, isSuccess) {
            const node = document.getElementById('publish-message');
            if (!node) return;
            node.textContent = text || '';
            node.className = 'message-box ' + (isSuccess ? 'success' : 'error');
        }

        async function loadQuestionMeta(questionId) {
            const badge = document.getElementById('question-badge');
            const backLink = document.getElementById('back-to-question');
            if (backLink) {
                backLink.href = '/questions/' + questionId;
            }

            try {
                const response = await fetch('/api/question/' + questionId, { credentials: 'include' });
                const data = await response.json();
                if (data && data.success && data.question) {
                    badge.textContent = '题目 #' + data.question.number + ' \u00b7 ' + data.question.title;
                    document.title = '发布题解 - ' + data.question.title + ' - Yupureki-OJ';
                    return;
                }
            } catch (error) {
                console.error('加载题目信息失败', error);
            }

            badge.textContent = '题目信息加载失败';
        }

        function setupLoginState() {
            const isLoggedIn = typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO && SERVER_USER_INFO.isLoggedIn;
            const loginRequired = document.getElementById('login-required');
            const formShell = document.getElementById('publish-form-shell');
            const submitButton = document.getElementById('submit-solution');

            if (!isLoggedIn) {
                if (loginRequired) loginRequired.style.display = 'block';
                if (formShell) formShell.style.opacity = '0.55';
                if (submitButton) submitButton.disabled = true;
                setMessage('请先登录后再发布题解', false);
            }
        }

        async function publishSolution() {
            const questionId = getQuestionIdFromPath();
            const titleNode = document.getElementById('solution-title');
            const submitButton = document.getElementById('submit-solution');

            const title = titleNode ? titleNode.value.trim() : '';
            const content_md = vditor ? vditor.getValue().trim() : '';

            if (!title) {
                setMessage('请输入题解标题', false);
                return;
            }
            if (title.length > 30) {
                setMessage('标题不能超过30个字符', false);
                return;
            }
            if (!content_md) {
                setMessage('请输入题解内容', false);
                return;
            }

            setMessage('正在发布...', true);
            if (submitButton) submitButton.disabled = true;

            try {
                const response = await fetch('/api/questions/' + questionId + '/solutions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        title: title,
                        content_md: content_md
                    })
                });

                const data = await response.json();
                if (response.ok && data && data.success) {
                    setMessage('发布成功，正在跳转...', true);
                    window.setTimeout(function() {
                        window.location.href = '/solutions/' + data.solution_id;
                    }, 900);
                    return;
                }

                const errCode = data && data.error_code ? data.error_code : '';
                if (errCode === 'UNAUTHORIZED') setMessage('请先登录后再发布题解', false);
                else if (errCode === 'NOT_PASSED') setMessage('你还未通过该题，无法发布题解', false);
                else if (errCode === 'QUESTION_NOT_FOUND') setMessage('题目不存在，无法发布题解', false);
                else if (errCode === 'TITLE_REQUIRED') setMessage('请输入题解标题', false);
                else if (errCode === 'TITLE_TOO_LONG') setMessage('标题不能超过30个字符', false);
                else if (errCode === 'CONTENT_REQUIRED') setMessage('请输入题解内容', false);
                else setMessage('发布失败，请稍后重试', false);
            } catch (error) {
                console.error('发布题解失败', error);
                setMessage('网络异常，发布失败', false);
            } finally {
                if (submitButton) submitButton.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createRainLines();
            const questionId = getQuestionIdFromPath();
            if (questionId) {
                loadQuestionMeta(questionId);
            } else {
                setMessage('无法识别题号', false);
            }

            setupLoginState();

            const isLoggedIn = typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO && SERVER_USER_INFO.isLoggedIn;

            vditor = new Vditor('vditor-editor', {
                height: 500,
                mode: 'ir',
                theme: 'dark',
                icon: 'material',
                cache: { enable: false },
                preview: { theme: { current: 'dark' } },
                toolbar: [
                    'headings', 'bold', 'italic', '|',
                    'list', 'ordered-list', 'check', '|',
                    'quote', 'code', 'inline-code', '|',
                    'link', 'table', '|',
                    'undo', 'redo', '|',
                    'fullscreen', 'preview'
                ],
                after: function() {
                    if (!isLoggedIn) {
                        vditor.disabled();
                    }
                }
            });

            document.getElementById('reset-form')?.addEventListener('click', function() {
                const titleNode = document.getElementById('solution-title');
                if (titleNode) titleNode.value = '';
                if (vditor) {
                    vditor.setValue('');
                }
                setMessage('', true);
            });

            document.getElementById('submit-solution')?.addEventListener('click', publishSolution);
        });
    </script>
    <script src="/js/search.js"></script>
