<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库 - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        .loading-inline {
            color: rgba(244, 246, 240, 0.9);
            text-align: center;
            padding: 32px 16px;
            font-size: 16px;
            letter-spacing: 0.06em;
        }

        /* 登录/注册弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: rgba(60, 80, 60, 0.95);
            margin: 15% auto;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: #F4F6F0;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .close {
            color: rgba(244, 246, 240, 0.6);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #F4F6F0;
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 300;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(244, 246, 240, 0.8);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .auth-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.1);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            margin-left: 10px;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            color: #4CAF50;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateY(-2px);
        }

        .form-toggle {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: rgba(244, 246, 240, 0.6);
        }

        .form-toggle a {
            color: #4CAF50;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .form-toggle a:hover {
            color: #81C784;
        }

        /* 认证标签页样式 */
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(244, 246, 240, 0.2);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .auth-tab:hover {
            color: #F4F6F0;
        }

        .auth-tab.active {
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
        }

        /* 搜索容器样式 */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
            width: 250px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
            /* Keep wallpaper visible immediately during full-page navigations */
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 背景图片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        /* 雨线效果 */
        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .head {
            margin-top: 20px;
            align-items: center;
            border-radius: 50%;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-left: 80px;
            margin-right: 80px;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-toggle:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .rain-toggle::before {
            content: '♪';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .page-title {
            text-align: center;
            color: #F4F6F0;
            font-size: 48px;
            margin-bottom: 60px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 300;
            letter-spacing: 0.05em;
            animation: fadeIn 1.5s ease;
            padding-top: 100px;
        }

        .questions-container {
            display: grid;
            gap: 24px;
            margin-bottom: 60px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: slideIn 0.6s ease both;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 24px;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .question-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .question-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .question-number {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
  
        .question-info {
            flex: 1;
        }

        .question-title {
            font-size: 18px;
            color: #F4F6F0;
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .question-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .difficulty {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.2);
        }

        .difficulty-simple {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.3);
            color: rgba(76, 175, 80, 0.8);
        }

        .difficulty-medium {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.3);
            color: rgba(255, 152, 0, 0.8);
        }

        .difficulty-hard {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.3);
            color: rgba(244, 67, 54, 0.8);
        }

        .arrow-icon {
            font-size: 20px;
            color: rgba(244, 246, 240, 0.5);
            transition: all 0.3s ease;
        }

        .question-card:hover .arrow-icon {
            transform: translateX(5px);
            color: rgba(244, 246, 240, 0.8);
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 30;
            animation: fadeIn 0.8s ease;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(244, 246, 240, 0.4);
        }

        .search-mode-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .search-mode-wrap:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .search-mode-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(244, 246, 240, 0.18);
            color: rgba(244, 246, 240, 0.85);
            font-size: 12px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .search-mode-trigger {
            width: 100%;
            min-width: 0;
            padding: 10px 34px 10px 6px;
            border: 0;
            border-radius: 16px;
            background: transparent;
            color: #F4F6F0;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.025em;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .search-mode-trigger:hover,
        .search-mode-trigger:focus {
            outline: none;
            color: #ffffff;
        }

        .search-mode-wrap::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            width: 7px;
            height: 7px;
            border-right: 1.8px solid rgba(244, 246, 240, 0.8);
            border-bottom: 1.8px solid rgba(244, 246, 240, 0.8);
            transform: translateY(-65%) rotate(45deg);
            pointer-events: none;
            transition: transform 0.2s ease;
        }

        .search-mode-wrap:focus-within::after,
        .search-mode-wrap.open::after {
            transform: translateY(-40%) rotate(225deg);
        }

        .search-mode-menu {
            position: absolute;
            left: 12px;
            right: 12px;
            top: calc(100% + 8px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            border-radius: 22px;
            background: linear-gradient(160deg, rgba(60, 80, 60, 0.96),  rgba(60, 80, 60, 0.85));
            backdrop-filter: blur(40px) saturate(115%);
            -webkit-backdrop-filter: blur(24px) saturate(115%);
            border: 1px solid rgba(244, 246, 240, 0.2);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: all 0.2s ease;
            z-index: 50;
        }

        .search-mode-wrap.open .search-mode-menu {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .search-mode-item {
            width: 100%;
            border: 1px solid rgba(244, 246, 240, 0.18);
            border-radius: 16px;
            padding: 10px 14px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            color: rgba(244, 246, 240, 0.88);
            font-size: 13px;
            letter-spacing: 0.02em;
            text-align: left;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease;
        }

        .search-mode-item:hover {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.11));
            border-color: rgba(244, 246, 240, 0.28);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .search-mode-item.active {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.14));
            border-color: rgba(244, 246, 240, 0.34);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14), 0 8px 18px rgba(0, 0, 0, 0.14);
        }

        .search-mode-item:focus-visible {
            outline: none;
            border-color: rgba(244, 246, 240, 0.42);
            box-shadow: 0 0 0 2px rgba(244, 246, 240, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.14);
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.02em;
            animation: fadeIn 2s ease 1s both;
        }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 246, 240, 0.1);
            transform: scale(0);
            animation: ripple 0.4s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(244, 246, 240, 0.3);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(244, 246, 240, 0.5);
        }

        @media (max-width: 768px) {
            .question-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .question-number {
                margin: 0 auto;
            }
            .question-meta {
                justify-content: center;
            }
            .nav {
                display: flex;
                gap: 40px;
                align-items: center;
                margin-left: 80px;
                margin-right: 80px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .filter-bar {
                flex-direction: column;
            }

            .search-mode-wrap {
                width: 100%;
                min-width: unset;
                justify-content: space-between;
            }

            .search-mode-trigger {
                width: 100%;
                min-width: 0;
            }

            .page-title {
                font-size: 36px;
            }
        }

        .pagination {
            margin: 40px 0;
            padding: 0;
        }

        .pagination-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: fadeIn 0.8s ease;
        }

        .pagination-info {
            color: rgba(244, 246, 240, 0.8);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .pagination-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .pagination-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .pagination-numbers {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pagination-num {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
        }

        .pagination-num:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: scale(1.1);
        }

        .pagination-num.current {
            background: rgba(244, 246, 240, 0.2);
            border-color: rgba(244, 246, 240, 0.5);
            color: #F4F6F0;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            .pagination-container {
                flex-direction: column;
                align-items: center;
            }
            .pagination-buttons {
                flex-direction: column;
                width: 100%;
            }
            .pagination-numbers {
                flex-wrap: wrap;
                justify-content: center;
            }
        }


    </style>
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">正在加载中...</div>
    </div>
    <!-- 背景图片 -->
    <div class="background"></div>
    <!-- 雨线效果 -->
    <div class="rain-lines" id="rainLines"></div>
    <div class="header">
        <div class="nav">
            <img src="./pictures/icon.png" type="icon" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
                <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <!-- 未登录状态 -->
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <!-- 登录状态 -->
            <div id="user-profile" style="display: none;">
            </div>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">题目列表</h1>

        <div class="filter-bar">
            <div class="search-mode-wrap" id="searchModeWrap">
                <span class="search-mode-label">筛选字段</span>
                <button type="button" class="search-mode-trigger" id="searchModeTrigger" aria-haspopup="listbox" aria-expanded="false">
                    <span id="searchModeText">按标题筛选</span>
                </button>
                <div class="search-mode-menu" id="searchModeMenu" role="listbox" aria-label="筛选字段">
                    <button type="button" class="search-mode-item" data-value="title" role="option">按标题筛选</button>
                    <button type="button" class="search-mode-item" data-value="id" role="option">按题号筛选</button>
                    <button type="button" class="search-mode-item" data-value="both" role="option">题号+标题同时筛选</button>
                </div>
            </div>
            <input type="text" class="search-box" placeholder="搜索题目...">
            <button class="filter-btn active" data-difficulty="all">全部</button>
            <button class="filter-btn" data-difficulty="simple">简单</button>
            <button class="filter-btn" data-difficulty="medium">中等</button>
            <button class="filter-btn" data-difficulty="hard">困难</button>
        </div>

        <div class="questions-container">
            {{#question_list}}
            <a href="/questions/{{number}}" style="text-decoration: none; position: relative;">
                <div class="question-card">
                    <div class="question-number">{{number}}</div>
                    <div class="question-info">
                        <div class="question-title">{{title}}</div>
                        <div class="question-meta">
                            <span class="difficulty difficulty-{{star}}">{{star}}</span>
                        </div>
                    </div>
                    <div class="arrow-icon">→</div>
                </div>
            </a>
            {{/question_list}}
        </div>

        <div class="pagination">
            <div class="pagination-container">
                <div class="pagination-info">
                    <span id="pageInfo">第 {{current_page}} 页 / 共 {{total_pages}} 页</span>
                </div>
                <div class="pagination-buttons">
                    <a href="/all_questions?page=1" id="firstPage" class="pagination-btn" data-ajax-nav="true">首页</a>
                    <a href="/all_questions?page=1" id="prevPage" class="pagination-btn" data-ajax-nav="true">上一页</a>
                    <div class="pagination-numbers" id="pageNumbers">
                    </div>
                    <a href="/all_questions?page=2" id="nextPage" class="pagination-btn" data-ajax-nav="true">下一页</a>
                    <a href="/all_questions?page={{total_pages}}" id="lastPage" class="pagination-btn" data-ajax-nav="true">末页</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
        </div>
    </div>

    <script>
        // 交互元素
        const interactiveElements = document.querySelectorAll('a, button, .rain-toggle');

        // 涟漪效果
        interactiveElements.forEach(element => {
            element.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                element.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            });
        });

        // 生成雨线
        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            const lineCount = 50;
            
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.classList.add('rain-line');
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        function getCurrentFilters() {
            return parseFiltersFromParams(new URLSearchParams(window.location.search));
        }

        function parseFiltersFromParams(params) {
            const legacyTitle = params.get('title') || '';
            const legacyId = params.get('id') || '';
            const keyword = params.get('q') || legacyTitle || legacyId;
            return {
                page: parseInt(params.get('page') || '1', 10),
                size: parseInt(params.get('size') || '5', 10),
                difficulty: params.get('difficulty') || 'all',
                queryMode: params.get('query_mode') || (legacyId ? 'id' : 'title'),
                keyword: keyword
            };
        }

        function buildAllQuestionsUrl(filters) {
            const params = new URLSearchParams();
            params.set('page', String(Math.max(1, filters.page || 1)));
            params.set('size', String(Math.max(1, filters.size || 5)));
            if (filters.difficulty && filters.difficulty !== 'all') {
                params.set('difficulty', filters.difficulty);
            }
            if (filters.queryMode && filters.queryMode !== 'title') {
                params.set('query_mode', filters.queryMode);
            }
            if (filters.keyword && filters.keyword.trim() !== '') {
                params.set('q', filters.keyword.trim());
            }
            return '/all_questions?' + params.toString();
        }

        async function navigateWithFilters(next, pushState = true) {
            if (window.__showPageLoading) {
                window.__showPageLoading('正在搜索...');
            }

            const current = getCurrentFilters();
            const merged = {
                page: next.page !== undefined ? next.page : current.page,
                size: next.size !== undefined ? next.size : current.size,
                difficulty: next.difficulty !== undefined ? next.difficulty : current.difficulty,
                queryMode: next.queryMode !== undefined ? next.queryMode : current.queryMode,
                keyword: next.keyword !== undefined ? next.keyword : current.keyword
            };

            const url = buildAllQuestionsUrl(merged);

            if (pushState) {
                window.history.pushState({ filters: merged }, '', url);
            }

            const oldQuestionsContainer = document.querySelector('.questions-container');
            const oldPagination = document.querySelector('.pagination');
            oldQuestionsContainer.innerHTML = '<div class="loading-inline">加载中...</div>';
            oldPagination.style.opacity = '0.55';

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (!response.ok) {
                    window.location.href = url;
                    return;
                }

                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                const newQuestionsContainer = doc.querySelector('.questions-container');
                const newPagination = doc.querySelector('.pagination');

                if (!newQuestionsContainer || !newPagination) {
                    window.location.href = url;
                    return;
                }

                oldQuestionsContainer.innerHTML = newQuestionsContainer.innerHTML;
                oldPagination.innerHTML = newPagination.innerHTML;
                oldPagination.style.opacity = '1';

                syncFilterUIFromURL();
                updatePagination();
                animateQuestionCards();
            } catch (err) {
                window.location.href = url;
            } finally {
                if (window.__hidePageLoading) {
                    window.__hidePageLoading();
                }
            }
        }

        function syncFilterUIFromURL() {
            const current = getCurrentFilters();
            const searchBox = document.querySelector('.search-box');
            if (searchBox) {
                searchBox.value = current.keyword;
            }
            setSearchMode(current.queryMode || 'title');

            filterBtns.forEach(btn => {
                const value = btn.dataset.difficulty || 'all';
                if (value === current.difficulty) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 筛选按钮功能（服务端筛选，URL 参数透传）
        const filterBtns = document.querySelectorAll('.filter-btn');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const difficulty = btn.dataset.difficulty || 'all';
                navigateWithFilters({ page: 1, difficulty });
            });
        });

        // 搜索功能（服务端筛选，URL 参数透传）
        const searchBox = document.querySelector('.search-box');
        const searchModeWrap = document.getElementById('searchModeWrap');
        const searchModeTrigger = document.getElementById('searchModeTrigger');
        const searchModeText = document.getElementById('searchModeText');
        const searchModeItems = Array.from(document.querySelectorAll('.search-mode-item'));
        let selectedQueryMode = 'title';

        function queryModeText(mode) {
            if (mode === 'id') return '按题号筛选';
            if (mode === 'both') return '题号+标题同时筛选';
            return '按标题筛选';
        }

        function setSearchMode(mode) {
            const safeMode = (mode === 'id' || mode === 'both') ? mode : 'title';
            selectedQueryMode = safeMode;
            searchModeText.textContent = queryModeText(safeMode);

            searchModeItems.forEach(item => {
                const active = item.dataset.value === safeMode;
                item.classList.toggle('active', active);
                item.setAttribute('aria-selected', active ? 'true' : 'false');
            });
        }

        function closeSearchModeMenu() {
            searchModeWrap.classList.remove('open');
            searchModeTrigger.setAttribute('aria-expanded', 'false');
        }

        searchModeTrigger.addEventListener('click', () => {
            const isOpen = searchModeWrap.classList.toggle('open');
            searchModeTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });

        searchModeItems.forEach(item => {
            item.addEventListener('click', () => {
                const mode = item.dataset.value || 'title';
                setSearchMode(mode);
                closeSearchModeMenu();
                navigateWithFilters({ page: 1, queryMode: mode, keyword: searchBox.value });
            });
        });

        document.addEventListener('click', (e) => {
            if (!searchModeWrap.contains(e.target)) {
                closeSearchModeMenu();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSearchModeMenu();
            }
        });

        searchBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                navigateWithFilters({ page: 1, keyword: e.target.value, queryMode: selectedQueryMode });
            }
        });

        // 分页功能
        function updatePagination() {
            const current = getCurrentFilters();
            const currentPage = current.page;
            const pageInfoMatch = document.getElementById('pageInfo').textContent.match(/共\s*(\d+)\s*页/);
            const totalPages = pageInfoMatch ? parseInt(pageInfoMatch[1], 10) : 1;
            
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            
            const firstPageBtn = document.getElementById('firstPage');
            const prevPageBtn = document.getElementById('prevPage');
            const nextPageBtn = document.getElementById('nextPage');
            const lastPageBtn = document.getElementById('lastPage');

            const makePageUrl = (page) => {
                const params = new URLSearchParams();
                params.set('page', String(page));
                params.set('size', String(current.size));
                if (current.difficulty && current.difficulty !== 'all') {
                    params.set('difficulty', current.difficulty);
                }
                if (current.keyword && current.keyword.trim() !== '') {
                    params.set('q', current.keyword.trim());
                }
                if (current.queryMode) {
                    params.set('query_mode', current.queryMode);
                }
                return `/all_questions?${params.toString()}`;
            };
            
            if (firstPageBtn) firstPageBtn.href = makePageUrl(1);
            if (prevPageBtn) prevPageBtn.href = makePageUrl(Math.max(1, currentPage - 1));
            if (nextPageBtn) nextPageBtn.href = makePageUrl(Math.min(totalPages, currentPage + 1));
            if (lastPageBtn) lastPageBtn.href = makePageUrl(totalPages);
            
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                const pageLink = document.createElement('a');
                pageLink.href = makePageUrl(i);
                pageLink.className = `pagination-num ${i === currentPage ? 'current' : ''}`;
                pageLink.dataset.ajaxNav = 'true';
                pageLink.textContent = i;
                pageNumbers.appendChild(pageLink);
            }
        }

        function bindPaginationNavigation() {
            document.addEventListener('click', (e) => {
                const link = e.target.closest('.pagination a');
                if (!link) {
                    return;
                }

                const url = new URL(link.href, window.location.origin);
                if (url.pathname !== '/all_questions') {
                    return;
                }

                e.preventDefault();
                const filters = parseFiltersFromParams(url.searchParams);
                navigateWithFilters(filters);
            });
        }

        // 刷新题目列表动画
        function animateQuestionCards() {
            const cards = document.querySelectorAll('.question-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.classList.add('visible');
                }, index * 80);
            });
        }

        // 初始化
        createRainLines();
        syncFilterUIFromURL();
        updatePagination();
        animateQuestionCards();
        bindPaginationNavigation();

        window.addEventListener('popstate', () => {
            navigateWithFilters(getCurrentFilters(), false);
        });
    </script>

    
    
    
    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
<script src="/js/search.js"></script>
</body>
</html>
