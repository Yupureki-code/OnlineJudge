<style>
    .hero {
        text-align: center;
        padding: 100px 20px;
        animation: fadeIn 2s ease;
    }

    .hero h1 {
        font-size: 72px;
        font-weight: 200;
        color: #F4F6F0;
        letter-spacing: 0.1em;
        margin-bottom: 20px;
    }

    .hero p {
        font-size: 18px;
        color: rgba(244, 246, 240, 0.7);
        margin-bottom: 40px;
        letter-spacing: 0.05em;
    }

    .cta-button {
        display: inline-block;
        padding: 16px 48px;
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.4);
        border-radius: 50px;
        color: #4CAF50;
        font-size: 16px;
        font-weight: 400;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .cta-button:hover {
        background: rgba(76, 175, 80, 0.25);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(76, 175, 80, 0.2);
    }

    .scroll-indicator {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 48px;
        border: 1px solid rgba(244, 246, 240, 0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .scroll-indicator:hover {
        transform: translateX(-50%) scale(1.1);
        border-color: rgba(244, 246, 240, 0.6);
    }

    .scroll-indicator::after {
        content: '↓';
        color: rgba(244, 246, 240, 0.6);
        font-size: 14px;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(5px); }
    }

    .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin-top: 80px;
        padding: 0 40px;
    }

    .feature-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 30px;
        border: 1px solid rgba(244, 246, 240, 0.1);
        transition: all 0.3s ease;
    }

    .feature-card:hover {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .feature-card h3 {
        color: #F4F6F0;
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 12px;
    }

    .feature-card p {
        color: rgba(244, 246, 240, 0.6);
        font-size: 14px;
        line-height: 1.6;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="hero">
    <h1>Yupureki-OJ</h1>
    <p>C++&Linux开发的基于责任链模式的负载均衡式在线oj</p>
    <a href="#questions" class="cta-button">开始挑战</a>
</div>
<div class="scroll-indicator" id="scrollIndicator"></div>

<div class="features">
    <div class="feature-card">
        <h3>在线评测</h3>
        <p>支持多种语言在线编译运行，快速返回评测结果</p>
    </div>
    <div class="feature-card">
        <h3>负载均衡</h3>
        <p>多节点部署，智能分配编译任务，保证系统稳定</p>
    </div>
    <div class="feature-card">
        <h3>题库管理</h3>
        <p>丰富题库，涵盖算法、数据结构等多个领域</p>
    </div>
</div>

<script>
    function initPage() {
        const scrollIndicator = document.getElementById('scrollIndicator');
        if (scrollIndicator) {
            scrollIndicator.addEventListener('click', () => {
                window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
            });
        }
    }
</script>
