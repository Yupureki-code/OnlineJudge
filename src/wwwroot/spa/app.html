<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yupureki-OJ - 在线编程评测系统</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        .auth-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.1);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            margin-left: 10px;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-left: 80px;
            margin-right: 80px;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .search-container {
            display: flex;
            align-items: center;
        }

        .search-input {
            padding: 8px 16px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 12px;
            width: 200px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            margin-left: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(244, 246, 240, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(244, 246, 240, 0.3);
        }

        .search-icon svg {
            width: 14px;
            height: 14px;
            stroke: rgba(244, 246, 240, 0.7);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .search-icon:hover svg {
            stroke: #F4F6F0;
        }





        .page-content {
            min-height: calc(100vh - 200px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
                padding: 10px 20px;
            }
            .nav {
                margin-left: 0;
                margin-right: 0;
                gap: 20px;
            }
            .search-container {
                width: 100%;
            }
            .search-input {
                width: 100%;
            }
        }

        .footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
        }

        .footer p {
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>
    <div class="background"></div>
    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="./pictures/icon.png" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>
            <a href="#home">首页</a>
            <a href="#questions">题库</a>
            <a href="#about">关于</a>
        </div>
        <div class="search-container">
            <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
            <div class="search-icon" id="navbar-search-icon" title="搜索">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
        </div>
        <div class="nav">
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <div id="user-profile" style="display: none;">
            </div>
        </div>
    </div>

    <div class="container">
        <div id="page-content" class="page-content">
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
    </div>

    <script src="./js/spa-router.js"></script>
    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
    <script>
        console.log('SPA search init script loaded');
        (function() {
            function navigateToSearch(keyword) {
                console.log('navigateToSearch called with:', keyword);
                var q = keyword.trim();
                if (q) {
                    console.log('Setting hash to: #questions?q=' + encodeURIComponent(q));
                    window.location.hash = '#questions?q=' + encodeURIComponent(q);
                }
            }

            function initSearch() {
                console.log('initSearch running');
                var searchInput = document.getElementById('navbar-search');
                var searchIcon = document.getElementById('navbar-search-icon');
                console.log('searchInput found:', !!searchInput, 'searchIcon found:', !!searchIcon);

                if (searchInput) {
                    searchInput.addEventListener('keydown', function(e) {
                        console.log('keydown event, key:', e.key);
                        if (e.key === 'Enter') {
                            console.log('Enter pressed, navigating');
                            e.preventDefault();
                            navigateToSearch(this.value);
                        }
                    });
                    console.log('keydown listener attached');
                }

                if (searchIcon) {
                    searchIcon.addEventListener('click', function() {
                        if (searchInput) {
                            navigateToSearch(searchInput.value);
                        }
                    });
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSearch);
            } else {
                initSearch();
            }
        })();
    </script>
</body>
</html>
