<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>判题结果 - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
            background-image: url('/pictures/preview.jpg');

            background-repeat: no-repeat;

        }

        /* 背景图片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            background-repeat: no-repeat;

        /* 雨线效果 */
        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(100vh);

        .container {
            max-width: 1200px;

            z-index: 2;

        .header {

        .logo {

        .nav {

        .nav a {

            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';

            left: 50%;
            width: 0;

            background: rgba(244, 246, 240, 0.6);

        .rain-toggle {

            border: 1px solid rgba(244, 246, 240, 0.6);

        .rain-toggle:hover {

        .rain-toggle::before {

        .result-container {

        .test-timeout {

        .test-memory {

        .footer {

        /* 涟漪效果 */

<body>

        <div id="page-loading-mask" class="page-loading-mask">
            <div class="page-loading-text">加载中...</div>

    <!-- 背景图片 -->
    <div class="background"></div>
    
    <!-- 雨线效果 -->
    <div class="rain-lines" id="rainLines"></div>
    <div class="header">
        <div class="nav">
            <img src="./pictures/icon.png" type="icon" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>

                <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <a href="#"><img src="./pictures/message.png" width="40px" height="40px"></a>
            <a href="#"><img src="./pictures/head.jpg" width="40px" height="40px" style="border-radius: 50%;"></a>
        </div>
    </div>
    <div class="container">

        <div id="result"></div>

        <div class="footer">
            <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
        </div>
    </div>

    <script>
        // 交互元素
        const interactiveElements = document.querySelectorAll('a, button, .rain-toggle');

        // 涟漪效果
        interactiveElements.forEach(element => {
            element.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                element.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            });
        });

        // 生成雨线
        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            const lineCount = 50;
            
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.classList.add('rain-line');
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function displayResult() {
            const resultDiv = document.getElementById('result');
            try {
                const resultJson = getURLParam('result');
                if (resultJson) {
                    const result = JSON.parse(decodeURIComponent(resultJson));
                    showResult(result);
                } else {
                    showResult({"status": 0, "desc": "恭喜你!已通过此题", "stdout": "", "stderr": ""});
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="result-container result-error"><div class="result-header"><div class="result-icon">⚠️</div><h1 class="result-title">错误</h1><p class="result-desc">无法解析结果</p></div></div>';
            }
        }

        function showResult(result) {
            const resultDiv = document.getElementById('result');
            
            let statusString = result.status || '';
            const statusArray = statusString.trim().split(/\s+/).filter(s => s);
            
            // 检查是否是编译错误
            const isCompileError = statusArray.length > 0 && statusArray[0] === 'COMPILE_ERROR';
            
            // 如果是编译错误，显示专门的编译错误页面
            if (isCompileError) {
                resultDiv.innerHTML = `
                    <div class="result-container result-error">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        
                        <div class="result-header">
                            <div class="result-icon">🔧</div>
                            <h1 class="result-title">编译错误</h1>
                            <p class="result-desc">Compile Error</p>
                        </div>
                        
                        <div class="error-section" style="margin-top: 0;">
                            <h3 class="error-title">编译报错信息</h3>
                            <div class="error-content">${escapeHtml(result.stderr || '无编译错误信息')}</div>
                        </div>
                        
                        <div class="actions">
                            <a href="/questions/" class="action-btn btn-secondary" id="backToQuestion">返回题目</a>
                            <button onclick="history.back()" class="action-btn btn-primary">返回修改代码</button>
                        </div>
                    </div>
                `;
                
                // 设置返回题目按钮的链接
                setActionLinks();
                return;
            }
            
            let testCasesHTML = '';
            let overallStatus = 'AC';
            let overallIcon = '✅';
            let overallText = 'AC';
            let overallDesc = result.desc || '恭喜你!已通过此题';
            
            if (statusArray.length > 0) {
                // 检查是否有WA或其他错误
                let hasWA = false;
                let hasError = false;
                statusArray.forEach(status => {
                    if (status === 'WA') {
                        hasWA = true;
                    } else if (status !== 'AC') {
                        hasError = true;
                    }
                });
                
                if (hasError) {
                    overallStatus = statusArray[statusArray.length - 1];
                } else if (hasWA) {
                    overallStatus = 'WA';
                } else {
                    overallStatus = 'AC';
                }
                
                testCasesHTML = '<div class="test-cases-section">';
                testCasesHTML += '<h2 class="section-title">测试用例结果</h2>';
                testCasesHTML += '<div class="test-cases-grid">';
                
                statusArray.forEach((status, index) => {
                    let statusClass, statusIcon, statusText;
                    
                    switch(status) {
                        case 'AC':
                            statusClass = 'test-ac';
                            statusIcon = '✅';
                            statusText = 'AC';
                            break;
                        case 'WA':
                            statusClass = 'test-wa';
                            statusIcon = '❌';
                            statusText = 'WA';
                            break;
                        case 'RUNTIME_ERROR':
                            statusClass = 'test-timeout';
                            statusIcon = '⏱️';
                            statusText = 'TLE';
                            break;
                        case 'MEMORY_LIMIT':
                            statusClass = 'test-memory';
                            statusIcon = '💾';
                            statusText = 'MLE';
                            break;
                        case 'COMPILE_ERROR':
                            statusClass = 'test-error';
                            statusIcon = '🔧';
                            statusText = 'CE';
                            break;
                        case 'FPE_ERROR':
                            statusClass = 'test-error';
                            statusIcon = '🔢';
                            statusText = 'FPE';
                            break;
                        case 'SEGV_ERROR':
                            statusClass = 'test-error';
                            statusIcon = '💥';
                            statusText = 'SEGV';
                            break;
                        default:
                            statusClass = 'test-unknown';
                            statusIcon = '❓';
                            statusText = 'UNKNOWN';
                    }
                    
                    testCasesHTML += `
                        <div class="test-case-card ${statusClass}">
                            <div class="test-case-header">
                                <span class="test-case-number">测试用例 ${index + 1}</span>
                                <span class="test-case-status">${statusIcon} ${statusText}</span>
                            </div>
                            <div class="test-case-desc">${getStatusDesc(status)}</div>
                        </div>
                    `;
                });
                
                testCasesHTML += '</div></div>';
                
                if (overallStatus === 'AC') {
                    overallIcon = '✅';
                    overallText = 'AC';
                    overallDesc = '恭喜你!已通过此题';
                } else {
                    overallIcon = '❌';
                    overallText = 'WA';
                    overallDesc = '部分解答错误';
                }
            }
            
            let errorSection = '';
            let outputSection = '';
            
            if (result.stderr && result.stderr.trim()) {
                errorSection = `
                    <div class="error-section">
                        <h3 class="error-title">⚠️ 错误信息</h3>
                        <div class="error-content">${escapeHtml(result.stderr)}</div>
                    </div>
                `;
            }
            
            if (result.stdout && result.stdout.trim()) {
                outputSection = `
                    <div class="output-section">
                        <h3 class="output-title">📤 输出结果</h3>
                        <div class="output-content">${escapeHtml(result.stdout)}</div>
                    </div>
                `;
            }
            
            // 根据结果生成不同的操作按钮
        let actionsHTML = '';
        const currentQuestionId = getCurrentQuestionId();
        if (overallStatus === 'AC') {
            // 答案正确时，显示返回题目和下一道题
            actionsHTML = `
                <div class="actions">
                    <a href="/questions/" class="action-btn btn-secondary" id="backToQuestion">返回题目</a>
                    <a href="/questions/" class="action-btn btn-primary" id="nextQuestion">下一道题</a>
                </div>
            `;
        } else {
            // 答案错误时，只显示返回题目
            actionsHTML = `
                <div class="actions">
                    <a href="/questions/" class="action-btn btn-secondary" id="backToQuestion">返回题目</a>
                </div>
            `;
        }
            
            resultDiv.innerHTML = `
                <div class="result-container ${overallStatus === 'AC' ? 'result-ac' : 'result-wa'}">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    
                    <div class="result-header">
                        <div class="result-icon">${overallIcon}</div>
                        <h1 class="result-title">${overallText}</h1>
                        <p class="result-desc">${overallDesc}</p>
                    </div>
                    
                    ${testCasesHTML}
                    
                    ${outputSection}
                    ${errorSection}
                    
                    ${actionsHTML}
                </div>
            `;
            
            // 设置操作按钮的链接
            setActionLinks();
        }
        
        function getStatusDesc(status) {
            switch(status) {
                case 'AC':
                    return '通过';
                case 'WA':
                    return '答案错误';
                case 'RUNTIME_ERROR':
                    return '运行时间超时';
                case 'MEMORY_LIMIT':
                    return '内存申请过多';
                case 'COMPILE_ERROR':
                    return '编译错误';
                case 'FPE_ERROR':
                    return '浮点数异常';
                case 'SEGV_ERROR':
                    return '段错误';
                default:
                    return '未知错误';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 获取当前题目的ID
        function getCurrentQuestionId() {
            // 优先从URL参数中获取题目ID
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            console.log('idParam:', idParam);
            if (idParam) {
                const id = parseInt(idParam);
                console.log('Parsed id from param:', id);
                return id;
            }
            
            // 如果没有参数，再从URL路径中获取
            const currentUrl = window.location.href;
            console.log('Current URL:', currentUrl);
            const match = currentUrl.match(/\/(questions|judge)\/(\d+)/);
            console.log('Match result:', match);
            if (match) {
                const id = parseInt(match[2]);
                console.log('Parsed id from path:', id);
                return id;
            }
            console.log('Returning default id: 1');
            return 1;
        }

        // 设置返回题目和下一道题的链接
        function setActionLinks() {
            const currentQuestionId = getCurrentQuestionId();
            console.log('Current question ID:', currentQuestionId);
            
            const backToQuestion = document.getElementById('backToQuestion');
            if (backToQuestion) {
                backToQuestion.href = `/questions/${currentQuestionId}`;
                console.log('Set backToQuestion href:', backToQuestion.href);
            }
            
            const nextQuestion = document.getElementById('nextQuestion');
            if (nextQuestion) {
                nextQuestion.href = `/questions/${currentQuestionId + 1}`;
                console.log('Set nextQuestion href:', nextQuestion.href);
            }
        }
        
        // 初始化
        createRainLines();
        window.onload = displayResult;
    </script>
    <script src="/js/page-loading.js"></script>
<script src="/js/search.js"></script>
</body>
</html>
