<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        /* 登录/注册弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: rgba(60, 80, 60, 0.95);
            margin: 15% auto;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: #F4F6F0;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .close {
            color: rgba(244, 246, 240, 0.6);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #F4F6F0;
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 300;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(244, 246, 240, 0.8);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .auth-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.1);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            margin-left: 10px;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            color: #4CAF50;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateY(-2px);
        }

        .form-toggle {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: rgba(244, 246, 240, 0.6);
        }

        .form-toggle a {
            color: #4CAF50;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .form-toggle a:hover {
            color: #81C784;
        }

        /* 认证标签页样式 */
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(244, 246, 240, 0.2);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .auth-tab:hover {
            color: #F4F6F0;
        }

        .auth-tab.active {
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
            position: relative;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 背景图片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        /* 雨线效果 */
        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            padding: 20px;
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 100px);
            width: 100%;
            margin: 0;
            display: flex;
            animation: fadeIn 0.8s ease 0.2s both;
            align-items: stretch;
        }

        .resizer {
            width: 12px;
            background: transparent;
            cursor: col-resize;
            position: relative;
            transition: background 0.3s ease;
            z-index: 10;
        }

        .resizer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: rgba(244, 246, 240, 0.2);
            transition: background 0.3s ease;
        }

        .resizer-vertical {
            height: 12px;
            background: transparent;
            cursor: row-resize;
            position: relative;
            transition: background 0.3s ease;
            z-index: 10;
            margin: 10px 0;
        }

        .resizer-vertical::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 2px;
            background: rgba(244, 246, 240, 0.2);
            transition: background 0.3s ease;
        }

        .resizer-vertical:hover::before,
        .resizer-vertical.active::before {
            background: rgba(244, 246, 240, 0.6);
        }

        .resizer-vertical:hover {
            background: rgba(244, 246, 240, 0.1);
        }

        .resizer-vertical.active {
            background: rgba(244, 246, 240, 0.2);
        }

        .resizer:hover::before,
        .resizer.active::before {
            background: rgba(244, 246, 240, 0.6);
        }

        .resizer:hover {
            background: rgba(244, 246, 240, 0.1);
        }

        .resizer.active {
            background: rgba(244, 246, 240, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-left: 80px;
            margin-right: 80px;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-toggle:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .rain-toggle::before {
            content: '♪';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .question-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            animation: fadeIn 0.8s ease;
        }

        .question-title {
            font-size: 32px;
            color: #F4F6F0;
            margin-bottom: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .question-meta {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(244, 246, 240, 0.7);
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .difficulty-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.2);
        }

        .difficulty-simple {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.3);
            color: rgba(76, 175, 80, 0.8);
        }

        .difficulty-medium {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.3);
            color: rgba(255, 152, 0, 0.8);
        }

        .difficulty-hard {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.3);
            color: rgba(244, 67, 54, 0.8);
        }

        .question-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .content-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .content-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(244, 246, 240, 0.1);
            flex-shrink: 0;
        }

        .content-tab {
            padding: 8px 20px;
            cursor: pointer;
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.02em;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .content-tab:hover {
            color: rgba(244, 246, 240, 0.8);
        }

        .content-tab.active {
            color: #F4F6F0;
            border-bottom-color: rgba(244, 246, 240, 0.6);
        }

        .tab-content {
            display: none;
            overflow-y: auto;
            flex: 1;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 20px;
            color: #F4F6F0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 300;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: rgba(244, 246, 240, 0.6);
            border-radius: 2px;
        }

        .description {
            color: rgba(244, 246, 240, 0.85);
            line-height: 1.8;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: 0.02em;
        }

        .code-editor {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            animation: fadeIn 0.8s ease 0.4s both;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .editor-tabs {
            display: flex;
            gap: 12px;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(244, 246, 240, 0.1);
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.3);
            color: #F4F6F0;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.2);
        }

        #editor {
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .submit-section {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(244, 246, 240, 0.1);
        }

        .submit-btn {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #4CAF50;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .option-btn {
            padding: 16px 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.1);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border-left: 4px solid rgba(244, 246, 240, 0.3);
            color: rgba(244, 246, 240, 0.7);
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.02em;
            animation: fadeIn 2s ease 1s both;
        }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 246, 240, 0.1);
            transform: scale(0);
            animation: ripple 0.4s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(244, 246, 240, 0.3);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(244, 246, 240, 0.5);
        }

        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
            .question-section {
                gap: 10px;
                min-height: auto;
                max-height: none;
                width: 100%;
                flex: none;
            }
            .question-header {
                padding: 15px;
            }
            .question-title {
                font-size: 18px;
                margin-bottom: 10px;
            }
            .content-section {
                padding: 12px;
                max-height: none;
                min-height: auto;
            }
            .code-editor {
                padding: 12px;
                min-height: 350px;
                max-height: none;
                width: 100%;
                flex: none;
            }
            #editor {
                height: 250px !important;
            }
            .submit-section {
                flex-direction: column;
                gap: 8px;
                margin-top: 10px;
            }
            .submit-btn{
                width: 100%;
                padding: 10px;
                color: green;
                font-size: 14px;
            }
            .nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
                padding: 10px 0;
            }
            .logo {
                font-size: 20px;
            }
            .question-meta {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 10px;
                font-size: 12px;
            }
            .difficulty-badge {
                padding: 3px 8px;
                font-size: 11px;
            }
            .description {
                font-size: 13px;
                line-height: 1.5;
            }
            .container {
                padding: 0 10px;
            }
            .editor-header {
                font-size: 12px;
                margin-bottom: 10px;
            }
            .tab {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
            width: 250px;
        }
        .jump-option{
            width: 320px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }
        .info-option{
            width: 270px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .solution-item {
            display: flex;
            gap: 14px;
            padding: 16px 0;
            cursor: pointer;
            transition: background 0.2s ease;
            border-radius: 8px;
        }
        .solution-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .solution-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .solution-info {
            flex: 1;
            min-width: 0;
        }
        .solution-author {
            color: rgba(244, 246, 240, 0.6);
            font-size: 12px;
            margin-bottom: 4px;
        }
        .solution-title-text {
            color: #F4F6F0;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .solution-excerpt {
            color: rgba(244, 246, 240, 0.5);
            font-size: 13px;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }
        .solution-stats {
            display: flex;
            gap: 16px;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
        }
        .solution-divider {
            border: none;
            border-top: 1px solid rgba(244, 246, 240, 0.08);
            margin: 0;
        }
        .publish-solution-btn {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            color: #4CAF50;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }
        .publish-solution-btn:hover {
            background: rgba(76, 175, 80, 0.25);
        }
        .solutions-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding-top: 12px;
        }
        .solutions-pagination button {
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(244,246,240,0.12);
            border-radius: 6px;
            color: rgba(244,246,240,0.7);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .solutions-pagination button:hover {
            background: rgba(255,255,255,0.1);
            color: #F4F6F0;
        }
        .solutions-pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .solutions-pagination span {
            color: rgba(244,246,240,0.5);
            font-size: 13px;
        }


    </style>
</head>
<body>

        <div id="page-loading-mask" class="page-loading-mask">
            <div class="page-loading-text">加载中...</div>
        </div>

    
    <!-- 背景图片 -->
    <div class="background"></div>
    
    <!-- 雨线效果 -->
    <div class="rain-lines" id="rainLines"></div>
    <div class="header">
        <div class="nav">
            <img src="/pictures/icon.png" type="icon" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <!-- 未登录状态 -->
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <!-- 登录状态 -->
            <div id="user-profile" style="display: none;">
            </div>
        </div>
    </div>

    <div class="container">
        <div class="question-section" id="questionSection">
                <div class="question-header">
                    <h1 class="question-title">{{number}}. {{title}}</h1>
                    <div class="question-meta">
                        <div class="meta-item">
                            <span>难度：</span>
                            <span class="difficulty-badge difficulty-{{star}}">{{star}}</span>
                        </div>
                        <div class="meta-item">
                            <span>时间限制：</span>
                            <span>1秒</span>
                        </div>
                        <div class="meta-item">
                            <span>内存限制：</span>
                            <span>20MB</span>
                        </div>
                    </div>
                </div>
                <div class="content-section">
                    <div class="content-tabs">
                        <button class="content-tab active" data-tab="desc">题目描述</button>
                        <button class="content-tab" data-tab="solutions">题解</button>
                    </div>
                    <div class="tab-content active" id="tab-desc">
                        <div class="description">{{desc}}</div>
                    </div>
                    <div class="tab-content" id="tab-solutions">
                        <div id="solutions-container">
                            <div style="text-align:center;color:rgba(244,246,240,0.5);padding:40px 0;">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="resizer" id="resizer"></div>

            <div class="code-editor" id="codeEditor">
                <div class="editor-header">
                    <div class="editor-tabs">
                        <div class="tab active">C++</div>
                    </div>
                    <div>支持C++11标准</div>
                </div>
                    <form action="/judge/{{number}}" method="post" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
                        <div id="editor-container" style="flex: 3; min-height: 200px; display: flex; flex-direction: column;">
                            <div id="editor" style="flex: 1; min-height: 0;"></div>
                        </div>
                        <div class="resizer-vertical" id="verticalResizer"></div>
                        <div class="submit-section" style="flex: 1; min-height: 100px;">
                            <div class="info-option">
                                <button type="button" class="option-btn">测试结果</button>
                                <button type="button" class="option-btn">测试用例</button>
                                <button type="button" class="option-btn">提交记录</button>
                            </div>
                            <div class="jump-option">
                                <a href="/all_questions" class="option-btn">返回题库</a>
                                <a href="/questions/{{number}}/solutions/new" class="option-btn" id="publish-solution-link">发布题解</a>
                                <button type="submit" class="submit-btn">提交代码</button>
                            </div>
                        </div>
                        <textarea name="code" id="code" style="display: none;"></textarea>
                    </form>
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.13/ace.js"></script>
    <script>
        // 涟漪效果
        const interactiveElements = document.querySelectorAll('a, button, .rain-toggle');
        interactiveElements.forEach(element => {
            element.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                element.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            });
        });

        // 生成雨线
        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            const lineCount = 50;
            
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.classList.add('rain-line');
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        // 初始化ACE编辑器
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");
        editor.setOptions({
            fontSize: "14px",
            lineNumbers: true,
            autoScrollEditorIntoView: true,
            copyWithEmptySelection: true,
            useSoftTabs: true,
            tabSize: 4
        });
        
        // 设置默认代码
        editor.setValue('#include <iostream>\n\nint main()\n{\n    // 在这里编写你的代码\n    return 0;\n}');
        editor.clearSelection();
        
        // 表单提交时，将编辑器内容同步到textarea
        document.querySelector('form').addEventListener('submit', function(e) {
            document.getElementById('code').value = editor.getValue();
        });

        // 实现窗口大小调整功能
        const resizer = document.getElementById('resizer');
        const verticalResizer = document.getElementById('verticalResizer');
        const questionSection = document.getElementById('questionSection');
        const codeEditor = document.getElementById('codeEditor');
        const editorContainer = document.getElementById('editor-container');
        const submitSection = document.querySelector('.submit-section');
        const container = document.querySelector('.container');

        // 调试：检查布局状态
        console.log('页面加载完成，检查布局状态');
        console.log('屏幕宽度:', window.innerWidth);
        console.log('container的display:', window.getComputedStyle(container).display);
        console.log('container的flex-direction:', window.getComputedStyle(container).flexDirection);
        console.log('container的align-items:', window.getComputedStyle(container).alignItems);
        console.log('question-section的flex:', window.getComputedStyle(questionSection).flex);
        console.log('code-editor的flex:', window.getComputedStyle(codeEditor).flex);

        let isResizing = false;
        let isVerticalResizing = false;

        // 水平分割线拖动
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizer.classList.add('active');
            document.body.style.cursor = 'col-resize';
        });

        // 垂直分割线拖动
        verticalResizer.addEventListener('mousedown', (e) => {
            isVerticalResizing = true;
            verticalResizer.classList.add('active');
            document.body.style.cursor = 'row-resize';
        });

        document.addEventListener('mousemove', (e) => {
            // 水平调整
            if (isResizing) {
                const containerRect = container.getBoundingClientRect();
                const containerWidth = containerRect.width;
                const mouseX = e.clientX - containerRect.left;

                // 计算最小宽度（基于百分比）
                const minQuestionWidth = containerWidth * 0.34; // question-section 最小 34%
                const minCodeEditorWidth = containerWidth * 0.42; // code-editor 最小 42%
                
                // 计算最大宽度
                const maxQuestionWidth = containerWidth - minCodeEditorWidth;
                
                let newQuestionWidth = mouseX;
                if (newQuestionWidth < minQuestionWidth) newQuestionWidth = minQuestionWidth;
                if (newQuestionWidth > maxQuestionWidth) newQuestionWidth = maxQuestionWidth;

                const questionWidthPercent = (newQuestionWidth / containerWidth) * 100;
                const codeEditorWidthPercent = 100 - questionWidthPercent;

                questionSection.style.width = `${questionWidthPercent}%`;
                questionSection.style.flex = 'none';
                codeEditor.style.width = `${codeEditorWidthPercent}%`;
                codeEditor.style.flex = 'none';
            }

            // 垂直调整
            if (isVerticalResizing) {
                const form = verticalResizer.parentElement;
                const formRect = form.getBoundingClientRect();
                const formHeight = formRect.height;

                let newHeight = e.clientY - formRect.top;
                const minHeight = 200;
                const maxHeight = formHeight - 100;

                newHeight = Math.max(minHeight, Math.min(newHeight, maxHeight));

                const editorHeight = (newHeight / formHeight) * 100;
                const submitHeight = 100 - editorHeight;

                editorContainer.style.flex = `0 0 ${editorHeight}%`;
                submitSection.style.flex = `0 0 ${submitHeight}%`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('active');
            }

            if (isVerticalResizing) {
                isVerticalResizing = false;
                verticalResizer.classList.remove('active');
            }

            document.body.style.cursor = '';
        });

        // 初始化
        createRainLines();

        const publishSolutionLink = document.getElementById('publish-solution-link');
        if (publishSolutionLink) {
            publishSolutionLink.addEventListener('click', function(e) {
                const isLoggedIn = typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO && SERVER_USER_INFO.isLoggedIn;
                if (isLoggedIn) {
                    return;
                }

                e.preventDefault();
                const signInButton = document.getElementById('sign-in-button');
                if (signInButton) {
                    signInButton.click();
                }
            });
        }

        // Tab switching
        (function() {
            var tabs = document.querySelectorAll('.content-tab');
            var tabDesc = document.getElementById('tab-desc');
            var tabSolutions = document.getElementById('tab-solutions');
            var questionId = (function() {
                var m = window.location.pathname.match(/\/questions\/(\d+)/);
                return m ? m[1] : '';
            })();
            var solutionsLoaded = false;
            var solutionsPage = 1;
            var solutionsSort = 'latest';

            function activateTab(target) {
                tabs.forEach(function(t) { t.classList.remove('active'); });
                var tab = document.querySelector('.content-tab[data-tab="' + target + '"]');
                if (tab) tab.classList.add('active');
                tabDesc.classList.toggle('active', target === 'desc');
                tabSolutions.classList.toggle('active', target === 'solutions');
            }

            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var target = tab.getAttribute('data-tab');
                    activateTab(target);
                    if (target === 'solutions' && !solutionsLoaded && questionId) {
                        loadSolutions(questionId, 1, solutionsSort);
                        solutionsLoaded = true;
                    }
                });
            });

            // 支持URL hash自动切换到题解tab
            if (window.location.hash === '#solutions-tab' && questionId) {
                activateTab('solutions');
                loadSolutions(questionId, 1, solutionsSort);
                solutionsLoaded = true;
            }

            // 检查用户是否通过该题
            function loadPassStatus(qid) {
                var container = document.getElementById('solutions-container');
                fetch('/api/question/' + qid + '/pass_status', {credentials:'include'})
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var statusHtml = '';
                        if (data.logged_in) {
                            if (data.passed) {
                                statusHtml = '<div style="padding:12px 16px;margin-bottom:16px;border-radius:10px;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.25);display:flex;align-items:center;justify-content:space-between;">';
                                statusHtml += '<span style="color:#90ee90;font-size:13px;">恭喜你通过了该题！</span>';
                                statusHtml += '<a href="/questions/' + qid + '/solutions/new" class="publish-solution-btn" style="margin-bottom:0;">发布题解</a>';
                                statusHtml += '</div>';
                            } else {
                                statusHtml = '<div style="padding:12px 16px;margin-bottom:16px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(244,246,240,0.1);color:rgba(244,246,240,0.6);font-size:13px;text-align:center;">你还未通过该题，赶紧试试吧！</div>';
                            }
                        }
                        container.setAttribute('data-pass-status', statusHtml);
                    })
                    .catch(function() {});
            }

            window.loadSolutions = function(qid, page, sort) {
                solutionsPage = page;
                solutionsSort = sort || 'latest';
                var container = document.getElementById('solutions-container');
                container.innerHTML = '<div style="text-align:center;color:rgba(244,246,240,0.5);padding:40px 0;">加载中...</div>';

                // 异步加载pass状态
                loadPassStatus(qid);

                fetch('/api/questions/' + qid + '/solutions?page=' + solutionsPage + '&size=10&sort=' + solutionsSort, {credentials:'include'})
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var passStatusHtml = container.getAttribute('data-pass-status') || '';
                        if (!data.success) {
                            container.innerHTML = passStatusHtml + '<div style="text-align:center;color:rgba(244,246,240,0.5);padding:40px 0;">暂无题解</div>';
                            return;
                        }
                        var solutions = data.solutions || [];
                        if (solutions.length === 0) {
                            container.innerHTML = passStatusHtml + '<div style="text-align:center;color:rgba(244,246,240,0.5);padding:40px 0;">暂无题解，来做第一个吧！</div>';
                            return;
                        }
                        var html = passStatusHtml;
                        solutions.forEach(function(s) {
                            var initial = (s.author_name && s.author_name.charAt(0)) || '?';
                            var excerpt = s.content_md ? s.content_md.substring(0, 100).replace(/\n/g, ' ') + '...' : '';
                            html += '<div class="solution-item" onclick="window.location.href=\'/solutions/' + s.id + '\'">';
                            html += '<div class="solution-avatar">' + initial + '</div>';
                            html += '<div class="solution-info">';
                            html += '<div class="solution-author">' + (s.author_name || '') + '</div>';
                            html += '<div class="solution-title-text">' + (s.title || '') + '</div>';
                            html += '<div class="solution-excerpt">' + excerpt + '</div>';
                            html += '<div class="solution-stats"><span>\u2764 ' + s.like_count + '</span><span>\ud83d\udcac ' + s.comment_count + '</span><span>\u2b50 ' + s.favorite_count + '</span></div>';
                            html += '</div></div>';
                            html += '<hr class="solution-divider">';
                        });
                        if (data.total_pages > 1) {
                            html += '<div class="solutions-pagination">';
                            html += '<button onclick="loadSolutions(\'' + qid + '\',' + Math.max(1, solutionsPage - 1) + ',\'' + solutionsSort + '\')"' + (solutionsPage <= 1 ? ' disabled' : '') + '>上一页</button>';
                            html += '<span>' + solutionsPage + ' / ' + data.total_pages + '</span>';
                            html += '<button onclick="loadSolutions(\'' + qid + '\',' + Math.min(data.total_pages, solutionsPage + 1) + ',\'' + solutionsSort + '\')"' + (solutionsPage >= data.total_pages ? ' disabled' : '') + '>下一页</button>';
                            html += '</div>';
                        }
                        container.innerHTML = html;
                    })
                    .catch(function() {
                        container.innerHTML = '<div style="text-align:center;color:rgba(244,246,240,0.5);padding:40px 0;">加载失败，请重试</div>';
                    });
            };
        })();
    </script>

    
    
    
    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
</body>
</html>
