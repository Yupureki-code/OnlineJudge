                                    document.getElementById('sol-char-count').textContent = e.target.value.length + '/1000';
                                });
                                document.getElementById('sol-submit-comment').addEventListener('click', function() {
                                    submitDetailComment(currentDetailId);
                                });
                            } else {
                                commentCurrentUser = null;
                                inputArea.innerHTML = '<div class="sol-login-prompt"><a href="#" onclick="document.getElementById(\'sign-in-button\').click(); return false;">\u767b\u5f55</a>\u540e\u53ef\u53d1\u8868\u8bc4\u8bba</div>';
                            }
                        })
                        .catch(function() {
                            inputArea.innerHTML = '<div class="sol-login-prompt"><a href="#" onclick="document.getElementById(\'sign-in-button\').click(); return false;">\u767b\u5f55</a>\u540e\u53ef\u53d1\u8868\u8bc4\u8bba</div>';
                        });
                } else {
                    inputArea.innerHTML = '<div class="sol-login-prompt"><a href="#" onclick="document.getElementById(\'sign-in-button\').click(); return false;">\u767b\u5f55</a>\u540e\u53ef\u53d1\u8868\u8bc4\u8bba</div>';
                }
            }

            function loadDetailComments(solutionId, page) {
                if (commentIsLoading || !commentHasMore) return;
                commentIsLoading = true;
                var loadingEl = document.getElementById('sol-comment-loading');
                if (loadingEl) loadingEl.style.display = 'block';

                fetch('/api/solutions/' + solutionId + '/comments?page=' + page + '&size=20', { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success) {
                            var countEl = document.getElementById('sol-comment-count');
                            if (countEl) countEl.textContent = '(\u5171 ' + data.total + ' \u6761\u8bc4\u8bba)';
                            if (page === 1) {
                                var listEl = document.getElementById('sol-comment-list');
                                if (listEl) listEl.innerHTML = '';
                            }
                            data.comments.forEach(function(comment) {
                                renderDetailComment(comment);
                            });
                            commentHasMore = page < data.total_pages;
                            commentPage = page;
                            if (!commentHasMore) {
                                var noMoreEl = document.getElementById('sol-comment-no-more');
                                if (noMoreEl) noMoreEl.style.display = 'block';
                            }
                        }
                    })
                    .catch(function(e) {
                        console.error('\u52a0\u8f7d\u8bc4\u8bba\u5931\u8d25:', e);
                    })
                    .finally(function() {
                        commentIsLoading = false;
                        if (loadingEl) loadingEl.style.display = 'none';
                    });
            }

            function renderDetailComment(comment) {
                var listEl = document.getElementById('sol-comment-list');
                if (!listEl) return;

                var isOwner = commentCurrentUser && commentCurrentUser.uid === comment.user_id;
                var canDelete = isOwner || (commentCurrentUser && commentCurrentUser.is_admin);

                var div = document.createElement('div');
                div.className = 'sol-comment-item';
                div.dataset.commentId = comment.id;

                var headerHtml = '<div class="sol-comment-header">';
                var cmtAvatarUrl = comment.author_avatar || '/pictures/head.jpg';
                headerHtml += '<div class="sol-comment-avatar"><img src="' + cmtAvatarUrl + '" alt="" onerror="this.style.display=\'none\'">' + escapeHtml((comment.author_name || '?').charAt(0).toUpperCase()) + '</div>';
                headerHtml += '<span class="sol-comment-author">' + escapeHtml(comment.author_name || '\u533f\u540d') + '</span>';
                headerHtml += '<span class="sol-comment-time">' + formatRelativeTime(comment.created_at) + '</span>';
                if (comment.is_edited) {
                    headerHtml += '<span class="sol-comment-edited">(\u5df2\u7f16\u8f91)</span>';
                }
                headerHtml += '</div>';

                var contentHtml = '<div class="sol-comment-content">' + escapeHtml(comment.content) + '</div>';

                // Like button + Reply button + Edit/Delete
                var actionsHtml = '<div class="sol-comment-actions">';
                actionsHtml += '<button onclick="toggleDetailCommentLike(' + comment.id + ',this)" style="font-size:12px;">❤ ' + (comment.like_count || 0) + '</button>';
                // Reply button for top-level comments (no @ prefix)
                actionsHtml += '<button onclick="showDetailReplyForm(' + comment.id + ',\'\',true)" style="font-size:12px;">回复</button>';
                if (isOwner) {
                    actionsHtml += '<button onclick="editDetailComment(' + comment.id + ', \'' + escapeHtml(comment.content).replace(/'/g, "\\'") + '\')">编辑</button>';
                }
                if (canDelete) {
                    actionsHtml += '<button onclick="deleteDetailComment(' + comment.id + ')">删除</button>';
                }
                actionsHtml += '</div>';

                div.innerHTML = headerHtml + contentHtml + actionsHtml;

                // Reply toggle (▼ N 条回复 / ▲ N 条回复)
                var replyCount = comment.reply_count || 0;
                if (replyCount > 0) {
                    var replyToggle = document.createElement('div');
                    replyToggle.className = 'reply-toggle';
                    replyToggle.style.cssText = 'margin-left:20px;cursor:pointer;color:rgba(244,246,240,0.6);font-size:13px;padding:4px 0;';
                    replyToggle.textContent = '▼ ' + replyCount + ' 条回复';
                    var replyContainer = document.createElement('div');
                    replyContainer.className = 'reply-container';
                    replyContainer.id = 'reply-container-' + comment.id;
                    replyContainer.style.display = 'none';
                    replyToggle.onclick = function() {
                        if (replyContainer.style.display === 'none') {
                            replyContainer.style.display = 'block';
                            replyToggle.textContent = '▲ ' + replyCount + ' 条回复';
                            loadDetailReplies(comment.id, replyContainer);
                        } else {
                            replyContainer.style.display = 'none';
                            replyToggle.textContent = '▼ ' + replyCount + ' 条回复';
                        }
                    };
                    div.appendChild(replyToggle);
                    div.appendChild(replyContainer);
                }

                // Reply form (hidden)
                var replyForm = document.createElement('div');
                replyForm.className = 'reply-form';
                replyForm.id = 'reply-form-' + comment.id;
                replyForm.style.cssText = 'display:none;margin-left:20px;margin-top:8px;';
                replyForm.innerHTML = '<textarea id="reply-text-' + comment.id + '" maxlength="1000" style="width:100%;min-height:60px;background:rgba(255,255,255,0.06);border:1px solid rgba(244,246,240,0.2);border-radius:8px;color:#F4F6F0;padding:8px;resize:vertical;"></textarea><div style="margin-top:6px;display:flex;gap:8px;"><button onclick="submitDetailReply(' + comment.id + ')" style="padding:6px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(244,246,240,0.2);border-radius:6px;color:#F4F6F0;cursor:pointer;">回复</button><button onclick="hideDetailReplyForm(' + comment.id + ')" style="padding:6px 16px;background:transparent;border:none;color:rgba(244,246,240,0.5);cursor:pointer;">取消</button></div>';
                div.appendChild(replyForm);

                listEl.appendChild(div);
            }

            window.editDetailComment = function(commentId, currentContent) {
                var newContent = prompt('\u7f16\u8f91\u8bc4\u8bba:', currentContent);
                if (newContent === null || newContent.trim() === currentContent) return;
                if (newContent.trim().length > 1000) {
                    alert('\u8bc4\u8bba\u5185\u5bb9\u4e0d\u80fd\u8d85\u8fc71000\u5b57');
                    return;
                }
                fetch('/api/comments/' + commentId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: newContent.trim() })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        commentHasMore = true;
                        commentPage = 1;
                        var noMoreEl = document.getElementById('sol-comment-no-more');
                        if (noMoreEl) noMoreEl.style.display = 'none';
                        loadDetailComments(currentDetailId, 1);
                    } else {
                        alert(data.error_code === 'FORBIDDEN' ? '\u65e0\u6743\u64cd\u4f5c' : '\u7f16\u8f91\u5931\u8d25');
                    }
                })
                .catch(function() { alert('\u7f51\u7edc\u9519\u8bef\uff0c\u8bf7\u91cd\u8bd5'); });
            };

            window.deleteDetailComment = function(commentId) {
                if (!confirm('\u786e\u5b9a\u8981\u5220\u9664\u8fd9\u6761\u8bc4\u8bba\u5417\uff1f')) return;
                fetch('/api/comments/' + commentId, {
                    method: 'DELETE',
                    credentials: 'include'
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        commentHasMore = true;
                        commentPage = 1;
                        var noMoreEl = document.getElementById('sol-comment-no-more');
                        if (noMoreEl) noMoreEl.style.display = 'none';
                        loadDetailComments(currentDetailId, 1);
                    } else {
                        alert(data.error_code === 'FORBIDDEN' ? '\u65e0\u6743\u64cd\u4f5c' : '\u5220\u9664\u5931\u8d25');
                    }
                })
                .catch(function() { alert('\u7f51\u7edc\u9519\u8bef\uff0c\u8bf7\u91cd\u8bd5'); });
            };

            // Show reply form for a comment
            function showDetailReplyForm(parentId, username, isTopLevel) {
                var form = document.getElementById('reply-form-' + parentId);
                if (!form) {
                    // Fallback: search within document for any matching form
                    form = document.querySelector('[id="reply-form-' + parentId + '"]');
                }
                if (!form) { console.warn('Reply form not found: reply-form-' + parentId); return; }
                var textarea = document.getElementById('reply-text-' + parentId);
                if (!textarea) {
                    textarea = form.querySelector('textarea');
                }
                if (textarea) {
                    textarea.value = isTopLevel ? '' : ('@' + (username || '用户') + ' ');
                }
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
                if (textarea) textarea.focus();
            }

            // Hide reply form
            function hideDetailReplyForm(parentId) {
                var form = document.getElementById('reply-form-' + parentId);
                if (form) form.style.display = 'none';
            }

            // Submit reply
            function submitDetailReply(parentId) {
                if (!commentCurrentUser) { alert('请先登录'); return; }
                if (!currentDetailId) { alert('题解ID无效，请重新打开题解'); return; }
                var textarea = document.getElementById('reply-text-' + parentId);
                var content = textarea ? textarea.value.trim() : '';
                if (!content) return;
                console.log('提交回复: solutionId=' + currentDetailId + ' parentId=' + parentId);
                fetch('/api/solutions/' + currentDetailId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: content, parent_id: parentId })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success) {
                        hideDetailReplyForm(parentId);
                        commentHasMore = true;
                        commentPage = 1;
                        var noMoreEl = document.getElementById('sol-comment-no-more');
                        if (noMoreEl) noMoreEl.style.display = 'none';
                        loadDetailComments(currentDetailId, 1);
                        showToast('回复成功！');
                    } else {
                        showToast('回复失败: ' + (d.error_code || '未知错误'), true);
                    }
                })
                .catch(function() { showToast('网络错误', true); });
            }

            // Load replies for a parent comment
            function loadDetailReplies(parentId, container) {
                if (container.dataset.loaded === 'true') return;
                container.innerHTML = '<div style="color:rgba(244,246,240,0.5);padding:12px 0;">加载中...</div>';
                fetch('/api/comments/' + parentId + '/replies?page=1&size=50', { credentials: 'include' })
                    .then(function(r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(function(d) {
                        container.innerHTML = '';
                        if (d.success && d.comments && d.comments.length > 0) {
                            d.comments.forEach(function(reply) { renderReplyInline(reply, container); });
                        } else if (d.success && (!d.comments || d.comments.length === 0)) {
                            container.innerHTML = '<div style="color:rgba(244,246,240,0.3);padding:8px 0;font-size:12px;">暂无回复</div>';
                        } else {
                            container.innerHTML = '<div style="color:#F44336;padding:8px 0;font-size:12px;">加载失败: ' + (d.error_code || '') + '</div>';
                        }
                        container.dataset.loaded = 'true';
                    })
                    .catch(function(e) {
                        container.innerHTML = '<div style="color:#F44336;padding:8px 0;font-size:12px;">加载失败: ' + (e.message || '网络错误') + '</div>';
                        console.error('加载回复失败:', e);
                    });
            }

            // Render reply inline (with like button)
            function renderReplyInline(comment, container) {
                var div = document.createElement('div');
                div.className = 'sol-comment-item sol-comment-reply';
                div.style.cssText = 'margin-left:20px;padding:10px;margin-top:4px;margin-bottom:4px;border-left:2px solid rgba(244,246,240,0.1);';

                var isOwner = commentCurrentUser && commentCurrentUser.uid === comment.user_id;

                var cmtAvatarUrl = comment.author_avatar || '/pictures/head.jpg';
                var headerHtml = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
                headerHtml += '<div class="sol-comment-avatar" style="width:24px;height:24px;"><img src="' + cmtAvatarUrl + '" alt="" onerror="this.style.display=\'none\'">' + escapeHtml((comment.author_name || '?').charAt(0).toUpperCase()) + '</div>';
                headerHtml += '<span style="color:rgba(244,246,240,0.6);font-size:12px;">' + (comment.reply_to_user_name ? '@' + escapeHtml(comment.reply_to_user_name) + ' ' : '') + escapeHtml(comment.author_name || '匿名') + '</span>';
                headerHtml += '<span style="color:rgba(244,246,240,0.4);font-size:11px;margin-left:8px;">' + formatRelativeTime(comment.created_at) + '</span>';
                if (comment.is_edited) headerHtml += '<span style="color:rgba(244,246,240,0.4);font-size:11px;margin-left:4px;">(已编辑)</span>';
                headerHtml += '</div>';

                var contentHtml = '<div style="color:rgba(244,246,240,0.85);font-size:13px;margin-bottom:6px;">' + escapeHtml(comment.content) + '</div>';

                // Like button + Reply button + Edit/Delete
                var actionsHtml = '<div style="display:flex;gap:6px;">';
                actionsHtml += '<button onclick="toggleDetailCommentLike(' + comment.id + ',this)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;">❤ ' + (comment.like_count || 0) + '</button>';
                // Reply button on nested replies (with @ prefix)
                actionsHtml += '<button onclick="showDetailReplyForm(' + comment.id + ',\'' + escapeHtml(comment.author_name || '').replace(/'/g, "\\'") + '\',false)" style="background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;">回复</button>';
                if (isOwner) {
                    actionsHtml += '<button onclick="editDetailComment(' + comment.id + ',\'' + escapeHtml(comment.content).replace(/'/g, "\\'") + '\')" style="background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;">编辑</button>';
                    actionsHtml += '<button onclick="deleteDetailComment(' + comment.id + ')" style="background:rgba(255,255,255,0.08);border:1px solid rgba(244,246,240,0.1);border-radius:4px;color:rgba(244,246,240,0.7);cursor:pointer;font-size:12px;padding:2px 8px;">删除</button>';
                }
                actionsHtml += '</div>';

                // Reply form for nested replies
                actionsHtml += '<div class="reply-form" id="reply-form-' + comment.id + '" style="display:none;margin-top:8px;">';
                actionsHtml += '<textarea id="reply-text-' + comment.id + '" maxlength="1000" style="width:100%;min-height:50px;background:rgba(255,255,255,0.06);border:1px solid rgba(244,246,240,0.2);border-radius:6px;color:#F4F6F0;padding:6px 8px;resize:vertical;font-size:13px;"></textarea>';
                actionsHtml += '<div style="margin-top:4px;display:flex;gap:6px;"><button onclick="submitDetailReply(' + comment.id + ')" style="padding:4px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(244,246,240,0.2);border-radius:4px;color:#F4F6F0;cursor:pointer;font-size:12px;">回复</button>';
                actionsHtml += '<button onclick="hideDetailReplyForm(' + comment.id + ')" style="padding:4px 12px;background:transparent;border:none;color:rgba(244,246,240,0.5);cursor:pointer;font-size:12px;">取消</button></div></div>';

                div.innerHTML = headerHtml + contentHtml + actionsHtml;

                // Reply toggle for nested replies (supports reply-to-reply)
                var nestedReplyCount = comment.reply_count || 0;
                if (nestedReplyCount > 0) {
                    var nestedToggle = document.createElement('div');
                    nestedToggle.className = 'reply-toggle';
                    nestedToggle.style.cssText = 'cursor:pointer;color:rgba(244,246,240,0.6);font-size:12px;padding:4px 0;margin-left:4px;';
                    nestedToggle.textContent = '▼ ' + nestedReplyCount + ' 条回复';
                    var nestedContainer = document.createElement('div');
                    nestedContainer.className = 'reply-container';
                    nestedContainer.style.display = 'none';
                    nestedToggle.onclick = function() {
                        if (nestedContainer.style.display === 'none') {
                            nestedContainer.style.display = 'block';
                            nestedToggle.textContent = '▲ ' + nestedReplyCount + ' 条回复';
                            loadDetailReplies(comment.id, nestedContainer);
                        } else {
                            nestedContainer.style.display = 'none';
                            nestedToggle.textContent = '▼ ' + nestedReplyCount + ' 条回复';
                        }
                    };
                    div.appendChild(nestedToggle);
                    div.appendChild(nestedContainer);
                }

                container.appendChild(div);
            }

            // Toggle like on comment
            function toggleDetailCommentLike(commentId, btn) {
                if (!commentCurrentUser) { alert('请先登录'); return; }
                fetch('/api/comments/' + commentId + '/like', { method: 'POST', credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.success) {
                            btn.textContent = '❤ ' + d.like_count;
                            btn.style.color = d.liked ? '#ff6b6b' : '';
                        }
                    });
            }

            // Expose new functions globally for inline onclick handlers
            window.showDetailReplyForm = showDetailReplyForm;
            window.hideDetailReplyForm = hideDetailReplyForm;
            window.submitDetailReply = submitDetailReply;
            window.toggleDetailCommentLike = toggleDetailCommentLike;

            function submitDetailComment(solutionId) {
                var textarea = document.getElementById('sol-comment-textarea');
                if (!textarea) return;
                var content = textarea.value.trim();
                if (!content) {
                    showToast('评论内容不能为空', true);
                    return;
                }
                if (content.length > 1000) {
                    showToast('评论内容不能超过1000字', true);
                    return;
                }
                fetch('/api/solutions/' + solutionId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content: content })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        textarea.value = '';
                        var charCount = document.getElementById('sol-char-count');
                        if (charCount) charCount.textContent = '0/1000';
                        commentHasMore = true;
                        commentPage = 1;
                        var noMoreEl = document.getElementById('sol-comment-no-more');
                        if (noMoreEl) noMoreEl.style.display = 'none';
                        loadDetailComments(solutionId, 1);
                        showToast('发布成功！');
                    } else {
                        showToast(data.error_code === 'UNAUTHORIZED' ? '请先登录' : '发布失败', true);
                    }
                })
                .catch(function() { showToast('网络错误，请重试', true); });
            }

            window.hideSolutionDetail = function() {
                var solutionsContainer = document.getElementById('solutions-container');
                var detailArea = document.getElementById('solution-content-area');

                detailArea.classList.remove('active');
                detailArea.innerHTML = '';
                solutionsContainer.style.display = '';

                currentDetailId = null;
                commentCurrentUser = null;
                commentPage = 1;
                commentHasMore = true;
                commentIsLoading = false;

                // Update URL back to question page
                var qid = getQuestionId();
                history.pushState({}, '', '/questions/' + qid + '#solutions-tab');
            };

            // Handle browser back/forward
            window.addEventListener('popstate', function(e) {
                if (e.state && e.state.solutionDetail) {
                    // User navigated forward to a solution detail
                    showSolutionDetail(e.state.solutionDetail);
                } else {
                    // User navigated back to the list
                    var solutionsContainer = document.getElementById('solutions-container');
                    var detailArea = document.getElementById('solution-content-area');
                    if (detailArea.classList.contains('active')) {
                        detailArea.classList.remove('active');
                        detailArea.innerHTML = '';
                        solutionsContainer.style.display = '';
                        currentDetailId = null;
                    }
                }
            });

            // Scroll-based comment loading
            var commentScrollContainer = document.getElementById('tab-solutions');
            if (commentScrollContainer) {
                commentScrollContainer.addEventListener('scroll', function() {
                    if (!currentDetailId) return;
                    var el = commentScrollContainer;
                    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 50) {
                        if (!commentIsLoading && commentHasMore) {
                            loadDetailComments(currentDetailId, commentPage + 1);
                        }
                    }
                });
            }
        })();

        // Bottom Panel - Test Cases, Test Results, Submissions
        (function() {
            var questionId = (function() {
                var m = window.location.pathname.match(/\/questions\/(\d+)/);
                return m ? m[1] : '';
            })();

            var panel = document.getElementById('bottom-panel');
            var panelBody = document.getElementById('panel-body');
            var panelClose = document.getElementById('panel-close');
            var btnTestResult = document.getElementById('btn-test-result');
            var btnTestCases = document.getElementById('btn-test-cases');
            var btnSubmissions = document.getElementById('btn-submit-history');

            var currentPanelTab = null;
            var sampleTests = [];
            var selectedTestId = null;
            var testType = 'sample';
            var lastTestResults = null;

            if (!panel || !questionId) return;

            function escapeHtml(str) {
                if (!str) return '';
                var div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function showPanel(tabName) {
                if (currentPanelTab === tabName && panel.classList.contains('visible')) {
                    hidePanel();
                    return;
                }
                currentPanelTab = tabName;
                panel.classList.add('visible');
                updateOptionBtns();
                loadPanelContent();
            }

            function hidePanel() {
                panel.classList.remove('visible');
                currentPanelTab = null;
                updateOptionBtns();
            }

            function updateOptionBtns() {
                [btnTestResult, btnTestCases, btnSubmissions].forEach(function(btn) {
                    if (btn) btn.classList.remove('active');
                });
                if (currentPanelTab === 'test-results' && btnTestResult) btnTestResult.classList.add('active');
                if (currentPanelTab === 'test-cases' && btnTestCases) btnTestCases.classList.add('active');
                if (currentPanelTab === 'submissions' && btnSubmissions) btnSubmissions.classList.add('active');
            }

            function loadPanelContent() {
                if (currentPanelTab === 'test-cases') {
                    loadSampleTests();
                } else if (currentPanelTab === 'test-results') {
                    renderTestResults();
                } else if (currentPanelTab === 'submissions') {
                    loadSubmissions();
                }
            }

            // Close button
            if (panelClose) {
                panelClose.addEventListener('click', hidePanel);
            }

            // Option button clicks
            if (btnTestCases) {
                btnTestCases.addEventListener('click', function() { showPanel('test-cases'); });
            }
            if (btnTestResult) {
                btnTestResult.addEventListener('click', function() { showPanel('test-results'); });
            }
            if (btnSubmissions) {
                btnSubmissions.addEventListener('click', function() { showPanel('submissions'); });
            }

            // ---- Test Cases ----
            function loadSampleTests() {
                panelBody.innerHTML = '<div class="panel-loading">加载中...</div>';
                fetch('/api/question/' + questionId + '/sample_tests', { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.tests && data.tests.length > 0) {
                            sampleTests = data.tests;
                            if (!selectedTestId && sampleTests.length > 0) {
                                selectedTestId = sampleTests[0].id;
                            }
                            testType = 'sample';
                            renderTestCases();
                        } else if (data.success && (!data.tests || data.tests.length === 0)) {
                            sampleTests = [];
                            renderTestCases();
                        } else {
                            panelBody.innerHTML = '<div class="panel-error">加载失败，请重试</div>';
                        }
                    })
                    .catch(function() {
                        panelBody.innerHTML = '<div class="panel-error">加载失败，请重试</div>';
                    });
            }

            function renderTestCases() {
                var html = '';

                if (sampleTests.length > 0) {
                    html += '<div class="test-case-list">';
                    sampleTests.forEach(function(tc, idx) {
                        var isChecked = (tc.id === selectedTestId && testType === 'sample') ? 'checked' : '';
                        html += '<div class="test-case-item">';
                        html += '<div class="test-case-header" onclick="window._toggleTestCase(' + idx + ')">';
                        html += '<div style="display:flex;align-items:center;gap:8px;">';
                        html += '<input type="radio" name="test-case-select" class="test-case-radio" value="' + tc.id + '" ' + isChecked + ' onclick="event.stopPropagation();window._selectTestCase(' + tc.id + ')">';
                        html += '<span>测试用例 #' + (idx + 1) + (tc.is_sample ? ' (示例)' : '') + '</span>';
                        html += '</div>';
                        html += '<span class="test-case-toggle" id="tc-toggle-' + idx + '">展开 ▼</span>';
                        html += '</div>';
                        html += '<div class="test-case-body" id="tc-body-' + idx + '">';
                        html += '<div style="display:flex;gap:12px;">';
                        html += '<div style="flex:1;min-width:0;">';
                        html += '<div class="test-case-label">输入</div>';
                        html += '<div class="test-case-content">' + escapeHtml(tc.input || '(空)') + '</div>';
                        html += '</div>';
                        html += '<div style="flex:1;min-width:0;">';
                        html += '<div class="test-case-label">期望输出</div>';
                        html += '<div class="test-case-content">' + escapeHtml(tc.output || tc.expected_output || '(空)') + '</div>';
                        html += '</div>';
                        html += '</div>';
                        html += '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                } else {
                    html += '<div class="panel-empty">暂无示例测试用例</div>';
                }

                // Custom input section
                html += '<div class="custom-input-section">';
                html += '<div style="font-size:13px;color:rgba(244,246,240,0.7);margin-bottom:4px;">自定义输入</div>';
                html += '<textarea id="custom-test-input" placeholder="输入自定义测试数据..."></textarea>';
                html += '<div style="margin-top:8px;display:flex;justify-content:flex-end;gap:8px;">';
                if (sampleTests.length > 0) {
                    html += '<button class="run-test-btn" onclick="window._runSampleTest()">运行选中用例</button>';
                }
                html += '<button class="run-test-btn" onclick="window._runCustomTest()">运行自定义测试</button>';
                html += '</div>';
                html += '</div>';

                panelBody.innerHTML = html;
            }

            window._toggleTestCase = function(idx) {
                var body = document.getElementById('tc-body-' + idx);
                var toggle = document.getElementById('tc-toggle-' + idx);
                if (body) {
                    body.classList.toggle('expanded');
                }
                if (toggle) {
                    toggle.textContent = body && body.classList.contains('expanded') ? '收起 ▲' : '展开 ▼';
                }
            };

            window._selectTestCase = function(id) {
                selectedTestId = id;
                testType = 'sample';
            };

            window._runSampleTest = function() {
                if (!selectedTestId) {
                    alert('请先选择一个测试用例');
                    return;
                }
                var code = editor.getValue();
                if (!code || !code.trim()) {
                    alert('请先编写代码');
                    return;
                }
                runTest(code, 'sample', selectedTestId, null);
            };

            window._runCustomTest = function() {
                var customInput = document.getElementById('custom-test-input');
                var input = customInput ? customInput.value : '';
                if (!input.trim()) {
                    alert('请输入自定义测试数据');
                    return;
                }
                var code = editor.getValue();
                if (!code || !code.trim()) {
                    alert('请先编写代码');
                    return;
                }
                runTest(code, 'custom', null, input);
            };

            // ---- Run Test ----
            function runTest(code, type, testCaseId, customInput) {
                panelBody.innerHTML = '<div class="panel-loading">运行中...</div>';
                currentPanelTab = 'test-results';
                updateOptionBtns();

                var body = { code: code, test_type: type };
                if (type === 'sample' && testCaseId) {
                    body.test_case_id = testCaseId;
                }
                if (type === 'custom' && customInput) {
                    body.custom_input = customInput;
                }

                fetch('/api/question/' + questionId + '/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(body)
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    lastTestResults = data;
                    renderTestResults();
                })
                .catch(function(err) {
                    panelBody.innerHTML = '<div class="panel-error">运行失败: ' + escapeHtml(err.message || '网络错误') + '</div>';
                });
            }

            function renderTestResults() {
                if (!lastTestResults) {
                    panelBody.innerHTML = '<div class="panel-empty">暂无测试结果，请先运行测试</div>';
                    return;
                }

                var data = lastTestResults;
                if (!data.success) {
                    panelBody.innerHTML = '<div class="panel-error">' + escapeHtml(data.reason || data.message || data.desc || '测试失败') + '</div>';
                    return;
                }

                var status = data.status || '未知';
                var statusClass = 'error';
                var statusText = status;

                if (status === 'Accept' || status === 'Accepted' || status === 'AC' || status === 'passed') {
                    statusClass = 'pass';
                    statusText = '通过 ✓';
                } else if (status === 'OK' || status === 'Passed') {
                    statusClass = 'pass';
                    statusText = '运行成功 ✓';
                } else if (status === 'Wrong Answer' || status === 'WA') {
                    statusClass = 'fail';
                    statusText = '答案错误 ✗';
                } else if (status === 'Compile Error' || status === 'CE') {
                    statusClass = 'error';
                    statusText = '编译错误';
                } else if (status === 'Runtime Error' || status === 'RE') {
                    statusClass = 'error';
                    statusText = '运行时错误';
                } else if (status === 'Time Limit Exceeded' || status === 'TLE') {
                    statusClass = 'error';
                    statusText = '超时';
                } else if (status !== '未知') {
                    statusClass = 'info';
                }

                var html = '<div class="test-result-item">';
                html += '<div class="test-result-header">';
                html += '<span class="result-status-badge ' + statusClass + '">' + statusText + '</span>';
                html += '</div>';

                if (data.desc) {
                    html += '<div style="font-size:12px;color:rgba(244,246,240,0.6);margin-top:6px;">' + escapeHtml(data.desc) + '</div>';
                }

                if (data.stderr) {
                    html += '<div class="result-output-section">';
                    html += '<div class="result-output-label">错误输出</div>';
                    html += '<div class="result-output-content" style="color:#F44336;">' + escapeHtml(data.stderr) + '</div>';
                    html += '</div>';
                }

                if (data.stdout !== undefined && data.stdout !== null) {
                    html += '<div class="result-output-section">';
                    html += '<div class="result-output-label">你的输出</div>';
                    html += '<div class="result-output-content">' + escapeHtml(data.stdout || '(空)') + '</div>';
                    html += '</div>';
                }

                if (data.expected_output && String(data.expected_output).trim() !== '') {
                    html += '<div class="result-output-section">';
                    html += '<div class="result-output-label">期望输出</div>';
                    html += '<div class="result-output-content">' + escapeHtml(data.expected_output || '(空)') + '</div>';
                    html += '</div>';
                }

                if (data.input) {
                    html += '<div class="result-output-section">';
                    html += '<div class="result-output-label">输入</div>';
                    html += '<div class="result-output-content">' + escapeHtml(data.input) + '</div>';
                    html += '</div>';
                }

                html += '</div>';
                panelBody.innerHTML = html;
            }

            // ---- Submissions ----
            function loadSubmissions() {
                panelBody.innerHTML = '<div class="panel-loading">加载中...</div>';
                fetch('/api/question/' + questionId + '/submits', { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.submits && data.submits.length > 0) {
                            renderSubmissions(data.submits);
                        } else if (data.success && (!data.submits || data.submits.length === 0)) {
                            panelBody.innerHTML = '<div class="panel-empty">暂无提交记录</div>';
                        } else {
                            panelBody.innerHTML = '<div class="panel-error">加载失败，请重试</div>';
                        }
                    })
                    .catch(function() {
                        panelBody.innerHTML = '<div class="panel-error">加载失败，请重试</div>';
                    });
            }

            function renderSubmissions(submits) {
                var html = '<div class="submission-record-list">';
                submits.forEach(function(s) {
                    var isPass = s.is_pass;
                    var badgeClass = isPass ? 'badge-pass' : 'badge-fail';
                    var badgeText = isPass ? '通过' : '未通过';

                    var summary = '';
                    try {
                        var rj = typeof s.result_json === 'string' ? JSON.parse(s.result_json) : s.result_json;
                        summary = rj.status || rj.desc || '';
                    } catch(e) {
                        summary = s.result_json || '';
                    }

                    var time = s.action_time || '';
                    if (time && time.length > 19) {
                        time = time.substring(0, 19).replace('T', ' ');
                    }

                    html += '<div class="submission-record-item">';
                    html += '<div class="submission-record-left">';
                    html += '<div class="submission-record-time">' + escapeHtml(time) + '</div>';
                    html += '<div class="submission-record-summary">' + escapeHtml(summary) + '</div>';
                    html += '</div>';
                    html += '<span class="submission-record-badge ' + badgeClass + '">' + badgeText + '</span>';
                    html += '</div>';
                });
                html += '</div>';
                panelBody.innerHTML = html;
            }
            function showToast(msg, isError) {
                console.log('showToast called:', msg);
                var toast = document.getElementById('comment-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'comment-toast';
                    toast.className = 'comment-toast';
                    document.body.appendChild(toast);
                }
                toast.textContent = msg;
                toast.className = 'comment-toast ' + (isError ? 'error' : 'success');
                toast.style.opacity = '1';
                clearTimeout(toast._timer);
                toast._timer = setTimeout(function() { toast.style.opacity = '0'; }, 2500);
            }
            window.showToast = showToast;
        })();
    </script>
