<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yupureki-OJ - 在线编程评测系统</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/pictures/icon.png">
    <style>
        /* ---------- 全局防溢出 ---------- */
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;          /* 禁止横向滚动 */
        }

        /* ---------- 视频背景（移动端动态高度） ---------- */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            width: 100dvw;
            height: 100dvh;              /* 现代浏览器动态视口 */
            object-fit: contain;         /* 保证完整显示 */
            z-index: 0;
             filter: brightness(0.9);
            /* 放大一点点，遮盖因模糊产生的透明边缘 */
            transform: scale(1.05);
        }
        /* 降级：不支持 dvh 的浏览器 */
        @supports not (height: 100dvh) {
            .video-background {
                width: 100%;
                height: 100%;
            }
        }

        /* ---------- 内容层 ---------- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            margin-bottom: 100px;
            animation: fadeIn 2s ease;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin-bottom: 30px;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        .hero p {
            font-size: 16px;
            color: rgba(244, 246, 240, 0.7);
            margin-bottom: 60px;
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: #F4F6F0;
            text-decoration: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            border: 1px solid rgba(244, 246, 240, 0.2);
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border: 1px solid rgba(244, 246, 240, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scroll-indicator:hover {
            transform: translateX(-50%) scale(1.1);
            border-color: rgba(244, 246, 240, 0.6);
        }

        .scroll-indicator::after {
            content: '↓';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            animation: bounce 2s infinite;
        }

        .login-section {
            max-width: 400px;
            margin: 0 auto 100px;
            animation: fadeIn 2s ease 0.5s both;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .submit-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #F4F6F0;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.02em;
            animation: fadeIn 2s ease 1s both;
        }

        .footer p {
            margin-bottom: 12px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .social-icon::before {
            content: '○';
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
        }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 246, 240, 0.1);
            transform: scale(0);
            animation: ripple 0.4s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ---------- 移动端适配 ---------- */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 42px;               /* 稍小但清晰 */
            }
            .hero p {
                font-size: 15px;
                margin-bottom: 40px;
            }
            .hero {
                padding: 60px 20px 80px;       /* 减少纵向留白 */
            }
            .cta-button {
                padding: 14px 36px;
                font-size: 13px;
            }

            /* 顶栏响应式：确保不挤压、不换行错乱 */
            .header {
                flex-wrap: wrap;
                justify-content: space-between;
                padding: 10px 15px;
            }
            .nav {
                flex-wrap: wrap;
                gap: 12px;
                justify-content: center;
            }
            /* 搜索框在小屏显示为单独一行，或自适应宽度 */
            .search-container {
                order: 2;                       /* 放到导航下方 */
                width: 100%;
                margin: 8px 0;
            }
            #navbar-search {
                width: 100%;
            }

            .login-section {
                padding: 0 15px;
            }
            .glass-card {
                padding: 25px 20px;
            }
            .form-group input {
                font-size: 16px;               /* 移动端避免缩放 */
                padding: 14px 16px;
            }
             /* 移动端视频壁纸：铺满屏幕，裁剪两侧，保留中间 */
            .video-background {
                object-fit: cover;          /* 填满容器，允许裁剪 */
                object-position: center;    /* 裁剪时以视频正中为焦点 */
            }
        }

        /* 超小屏（320-480）进一步优化 */
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 34px;
            }
            .hero p {
                font-size: 14px;
            }
            .logo {
                font-size: 16px;
            }
            .nav a {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>

    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="./pictures/icon.png" width="40px" height="40px" alt="logo">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <div id="user-profile" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Yupureki-OJ</h1>
            <p>C++-基于分布式架构的在线OJ平台</p>
            <a href="/all_questions" class="cta-button">开始挑战</a>
        </div>
        <div class="scroll-indicator" id="scrollIndicator"></div>
        <div class="footer">
            <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
            <div class="social-icons">
                <div class="social-icon"></div>
                <div class="social-icon"></div>
                <div class="social-icon"></div>
            </div>
        </div>
    </div>

    <script>
        const v = document.querySelector('video');
        console.log('video元素存在？', v);
        if(v) {
          console.log('readyState:', v.readyState);
          console.log('networkState:', v.networkState);
          console.log('paused:', v.paused);
          console.log('ended:', v.ended);
          console.log('currentTime:', v.currentTime);
          console.log('duration:', v.duration);
          console.log('videoWidth/Height:', v.videoWidth, v.videoHeight);
          console.log('error code:', v.error?.code);
          v.play().then(() => console.log('play()成功')).catch(e => console.log('play()失败', e));
          v.currentTime = 0.1;
          setTimeout(() => console.log('强制跳转后 currentTime:', v.currentTime), 100);
        }
    </script>
    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
    <script src="/js/search.js"></script>
</body>
</html>
