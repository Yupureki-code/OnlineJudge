<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yupureki-OJ - 在线编程评测系统</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;

            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            margin-bottom: 100px;
            animation: fadeIn 2s ease;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin-bottom: 30px;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        .hero p {
            font-size: 16px;
            color: rgba(244, 246, 240, 0.7);
            margin-bottom: 60px;
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: #F4F6F0;
            text-decoration: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            border: 1px solid rgba(244, 246, 240, 0.2);
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border: 1px solid rgba(244, 246, 240, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scroll-indicator:hover {
            transform: translateX(-50%) scale(1.1);
            border-color: rgba(244, 246, 240, 0.6);
        }

        .scroll-indicator::after {
            content: '↓';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
            animation: bounce 2s infinite;
        }

        .login-section {
            max-width: 400px;
            margin: 0 auto 100px;
            animation: fadeIn 2s ease 0.5s both;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .submit-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #F4F6F0;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.02em;
            animation: fadeIn 2s ease 1s both;
        }

        .footer p {
            margin-bottom: 12px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .social-icon::before {
            content: '○';
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
        }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 246, 240, 0.1);
            transform: scale(0);
            animation: ripple 0.4s linear;
            pointer-events: none;
        }
        .video-background
        {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;  /* 保持完整内容，不裁剪 */
            background-color: #000;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 48px;
            }
            .nav {
                gap: 20px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .login-section {
                padding: 0 20px;
            }
        }
    </style>
</head>
 <body>
    <video class="video-background" autoplay muted loop playsinline preload="auto">
        <source src="pictures/b2.mp4" type="video/mp4">
    </video>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>
    <!-- 背景图片、雨线等保持不变 -->
    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="./pictures/icon.png" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <!-- 未登录状态 -->
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <!-- 登录状态 -->
            <div id="user-profile" style="display: none;">
            </div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Yupureki-OJ</h1>
            <p>C++-基于分布式架构的在线OJ平台</p>
            <a href="/all_questions" class="cta-button">开始挑战</a>
        </div>
        <div class="scroll-indicator" id="scrollIndicator"></div>
        <div class="footer">
            <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
            <div class="social-icons">
                <div class="social-icon"></div>
                <div class="social-icon"></div>
                <div class="social-icon"></div>
            </div>
        </div>
    </div>
    <script>
        const v = document.querySelector('video');
console.log('video元素存在？', v);
if(v) {
  console.log('readyState:', v.readyState);        // 0=尚无数据,1=元数据已加载,2=当前帧可用,3=至少下帧可用,4=全部可用
  console.log('networkState:', v.networkState);    // 0=空,1=加载中,2=已加载元数据,3=加载失败
  console.log('paused:', v.paused);                // 是否暂停
  console.log('ended:', v.ended);
  console.log('currentTime:', v.currentTime);      // 当前播放时间（秒）
  console.log('duration:', v.duration);            // 总时长
  console.log('videoWidth/Height:', v.videoWidth, v.videoHeight);
  console.log('error code:', v.error?.code);       // 如果有错误会显示
  v.play().then(() => console.log('play()成功')).catch(e => console.log('play()失败', e));
  // 强制尝试跳转到0.1秒
  v.currentTime = 0.1;
  setTimeout(() => console.log('强制跳转后 currentTime:', v.currentTime), 100);
}
    </script>
    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
<script src="/js/search.js"></script>
</body>
</html>
