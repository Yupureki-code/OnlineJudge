<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Yupureki-OJ</title>
    <link rel="preload" as="image" href="/pictures/preview.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .page-loading-mask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.55);
            backdrop-filter: blur(3px);
            z-index: 99999;
            transition: opacity 0.2s ease;
        }

        .page-loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-loading-text {
            color: #F4F6F0;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 12px 18px;
            border: 1px solid rgba(244, 246, 240, 0.25);
            border-radius: 12px;
            background: rgba(24, 28, 24, 0.45);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
            position: relative;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 背景图片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        /* 雨线效果 */
        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(60, 80, 60, 0.15);
            backdrop-filter: blur(20px);
            padding: 10px 80px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-toggle:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .rain-toggle::before {
            content: '♪';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(244, 246, 240, 0.4);
            background: rgba(255, 255, 255, 0.08);
            width: 250px;
        }

        .container {
            padding: 40px;
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 100px);
        }

        .user-profile {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(244, 246, 240, 0.2);
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .avatar:hover {
            filter: brightness(0.7);
            transform: scale(1.03);
        }

        .avatar-overlay {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.45);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay-text {
            color: #F4F6F0;
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.4;
        }

        .avatar-loading {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(24, 28, 24, 0.65);
            backdrop-filter: blur(2px);
        }

        .avatar-loading.active {
            display: flex;
        }

        .avatar-spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(244, 246, 240, 0.2);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: avatar-spin 0.7s linear infinite;
        }

        @keyframes avatar-spin {
            to { transform: rotate(360deg); }
        }

        .avatar-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }



        .avatar-msg {
            font-size: 12px;
            min-height: 16px;
            margin-top: 6px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .avatar-msg.success { color: #b8f3be; }
        .avatar-msg.error { color: #ffb0b0; }

        .user-info h1 {
            font-size: 32px;
            color: #F4F6F0;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .user-stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            color: #4CAF50;
            font-weight: 400;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(244, 246, 240, 0.7);
            margin-top: 5px;
        }

        .section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        .section-title {
            font-size: 20px;
            color: #F4F6F0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 300;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: rgba(244, 246, 240, 0.6);
            border-radius: 2px;
        }

        .submission-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .submission-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .submission-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .submission-title {
            font-size: 16px;
            color: #F4F6F0;
        }

        .submission-star {
            font-size: 12px;
            color: #FFD700;
            letter-spacing: 2px;
        }

        .submission-time {
            font-size: 14px;
            color: rgba(244, 246, 240, 0.6);
        }

        .submission-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            font-size: 14px;
            font-weight: 400;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-badge.pass {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border-color: rgba(76, 175, 80, 0.3);
        }

        .status-badge.fail {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border-color: rgba(244, 67, 54, 0.3);
        }

        .status-wa {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border-color: rgba(244, 67, 54, 0.3);
        }

        .status-ce {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
            border-color: rgba(255, 152, 0, 0.3);
        }

        .logout-btn {
            padding: 12px 24px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 50px;
            color: #F44336;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .logout-btn:hover {
            background: rgba(244, 67, 54, 0.3);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(244, 246, 240, 0.3);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(244, 246, 240, 0.5);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
                padding: 10px 0;
            }

            .nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }

            .container {
                padding: 20px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .user-stats {
                justify-content: center;
            }

            .submission-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .submission-status {
                align-self: flex-end;
            }
        }


    </style>
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>
    <!-- 背景图片 -->
    <div class="background"></div>
    
    <!-- 雨线效果 -->
    <div class="rain-lines" id="rainLines"></div>
    
    <div class="header">
        <div class="nav">
            <img src="/pictures/icon.png" type="icon" width="40px" height="40px">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <!-- 未登录状态 -->
            <div id="user-auth" style="display: block;">
                <button class="auth-btn" id="sign-in-button">登录/注册</button>
            </div>
            <!-- 登录状态 -->
            <div id="user-profile" style="display: none;">
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="user-profile">
            <div class="profile-header">
                <div class="avatar-wrapper" id="avatar-wrapper">
                    <img src="/pictures/head.jpg" class="avatar" id="profile-avatar" alt="用户头像" title="点击更换头像">
                    <div class="avatar-overlay" id="avatar-overlay">
                        <span class="avatar-overlay-text">更换头像</span>
                    </div>
                    <div class="avatar-loading" id="avatar-loading">
                        <div class="avatar-spinner"></div>
                    </div>
                    <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;">
                </div>
                <div class="user-info">
                    <h1 id="profile-name">用户名</h1>
                    <p id="profile-email" style="color: rgba(244, 246, 240, 0.7);">邮箱：-</p>
                    <p id="profile-uid" style="color: rgba(244, 246, 240, 0.7);">uid：-</p>
<div class="user-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="stat-passed">0</div>
                            <div class="stat-label">已解决题目</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">总提交数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-accuracy">0%</div>
                            <div class="stat-label">正确率</div>
                        </div>
                    </div>
                    <button class="logout-btn" id="logout-btn">退出登录</button>
                    <div class="avatar-actions">
                    </div>
                    <div class="avatar-msg" id="avatar-msg"></div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">最近提交</h2>
            <div class="submission-list" id="recent-submits-list">
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">已解决题目</h2>
            <div id="passed-questions-list"></div>
        </div>
    </div>

    <script>
        // 生成雨线
        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            const lineCount = 50;
            
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'rain-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        // 雨线开关
        document.getElementById('rainToggle').addEventListener('click', function() {
            const rainLines = document.getElementById('rainLines');
            if (rainLines.style.display === 'none') {
                rainLines.style.display = 'block';
            } else {
                rainLines.style.display = 'none';
            }
        });

        // 退出登录
        
        document.getElementById('logout-btn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/user/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                if (response.ok) {
                    console.log('退出登录成功');
                    window.location.href = '/';
                } else {
                    console.error('退出登录失败', response.status);
                }
            } catch (error) {
                console.error('退出登录出错:', error);
            }
        });


        // 初始化
        createRainLines();

        async function syncProfileUserInfo() {
            const nameEl = document.getElementById('profile-name');
            const emailEl = document.getElementById('profile-email');
            const uidEl = document.getElementById('profile-uid');

            if (typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO.isLoggedIn) {
                if (nameEl) nameEl.textContent = SERVER_USER_INFO.name || '用户名';
                if (emailEl) emailEl.textContent = `邮箱：${SERVER_USER_INFO.email || '-'}`;
                if (uidEl) uidEl.textContent = `uid：${SERVER_USER_INFO.uid || '-'}`;
                if (SERVER_USER_INFO.avatar_url) {
                    updateAvatarSrc(SERVER_USER_INFO.avatar_url);
                }
                loadUserStats();
                return;
            }

            try {
                const response = await fetch('/api/user/info', { credentials: 'include' });
                const data = await response.json();
                if (data && data.success && data.user) {
                    if (nameEl) nameEl.textContent = data.user.name || '用户名';
                    if (emailEl) emailEl.textContent = `邮箱：${data.user.email || '-'}`;
                    if (uidEl) uidEl.textContent = `uid：${data.user.uid || '-'}`;
                    if (data.user.avatar_url) {
                        updateAvatarSrc(data.user.avatar_url);
                    }
                    loadUserStats();
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
            }
        }

        async function loadUserStats() {
            try {
                const response = await fetch('/api/user/stats', { credentials: 'include' });
                const data = await response.json();
                if (data && data.success && data.stats) {
                    document.getElementById('stat-passed').textContent = data.stats.passed_questions || 0;
                    document.getElementById('stat-total').textContent = data.stats.total_submits || 0;
                    var acc = data.stats.accuracy !== undefined ? data.stats.accuracy : 0;
                    document.getElementById('stat-accuracy').textContent = (acc * 100).toFixed(1) + '%';
                    renderRecentSubmits(data.stats.recent_submits || []);
                    renderPassedQuestions(data.stats.recent_submits || []);
                }
            } catch (error) {
                console.error('加载用户统计失败:', error);
            }
        }

        function renderRecentSubmits(submits) {
            var container = document.getElementById('recent-submits-list');
            if (!container) return;
            if (submits.length === 0) {
                container.innerHTML = '<div style="color:rgba(244,246,240,0.4);padding:20px 0;text-align:center;">暂无提交记录</div>';
                return;
            }
            var html = '';
            submits.forEach(function(s) {
                var isPass = s.is_pass === true || s.is_pass === 1;
                var statusClass = isPass ? 'pass' : 'fail';
                var statusText = isPass ? '通过' : '未通过';
                var borderColor = isPass ? '#4CAF50' : '#F44336';
                var time = s.action_time || '';
                if (time && time.length > 19) {
                    time = time.substring(0, 19).replace('T', ' ');
                }
                var title = s.title || ('题目 #' + (s.question_id || ''));
                var starHtml = '';
                if (s.star) {
                    starHtml = ' <span class="difficulty-badge difficulty-' + s.star + '" style="font-size:11px;padding:2px 8px;margin-left:6px;">' + s.star + '</span>';
                }
                html += '<div class="submission-item" style="border-left-color:' + borderColor + '">';
                html += '<div class="submission-info">';
                html += '<div class="submission-problem">' + escapeHtml(title) + starHtml + '</div>';
                html += '<div class="submission-time">' + escapeHtml(time) + '</div>';
                html += '</div>';
                html += '<span class="status-badge ' + statusClass + '">' + statusText + '</span>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function renderPassedQuestions(submits) {
            var container = document.getElementById('passed-questions-list');
            if (!container) return;
            var passed = [];
            var seen = {};
            submits.forEach(function(s) {
                if ((s.is_pass === true || s.is_pass === 1) && s.question_id && !seen[s.question_id]) {
                    seen[s.question_id] = true;
                    passed.push(s);
                }
            });
            if (passed.length === 0) {
                container.innerHTML = '<div style="color:rgba(244,246,240,0.4);padding:10px 0;text-align:center;">(暂无)</div>';
                return;
            }
            var html = '<div style="margin-bottom:8px;color:rgba(244,246,240,0.6);font-size:13px;">共通过 ' + passed.length + ' 道题目</div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
            passed.forEach(function(s) {
                var title = s.title || ('题目 #' + s.question_id);
                html += '<a href="/questions/' + s.question_id + '" style="display:inline-block;padding:6px 14px;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);border-radius:6px;color:#4CAF50;text-decoration:none;font-size:13px;transition:all 0.2s;" onmouseover="this.style.background=\'rgba(76,175,80,0.25)\'" onmouseout="this.style.background=\'rgba(76,175,80,0.12)\'">' + escapeHtml(title) + '</a>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const DEFAULT_AVATAR = '/pictures/head.jpg';
        const MAX_AVATAR_SIZE = 2 * 1024 * 1024; // 2MB

        function setAvatarMsg(text, isError) {
            const el = document.getElementById('avatar-msg');
            if (!el) return;
            el.textContent = text || '';
            el.className = 'avatar-msg ' + (isError ? 'error' : 'success');
            if (text) {
                setTimeout(function() {
                    if (el.textContent === text) el.textContent = '';
                }, 4000);
            }
        }

        function setAvatarLoading(active) {
            const loading = document.getElementById('avatar-loading');
            const avatar = document.getElementById('profile-avatar');
            if (loading) loading.classList.toggle('active', active);
            if (avatar) avatar.style.pointerEvents = active ? 'none' : '';
        }

        function updateAvatarSrc(url) {
            const avatar = document.getElementById('profile-avatar');
            if (avatar) {
                avatar.src = url || DEFAULT_AVATAR;
            }
        }

        // Click avatar → trigger file input
        document.getElementById('avatar-wrapper').addEventListener('click', function(e) {
            const loading = document.getElementById('avatar-loading');
            if (loading && loading.classList.contains('active')) return;
            document.getElementById('avatar-input').click();
        });

        // File selected → upload
        document.getElementById('avatar-input').addEventListener('change', function() {
            const file = this.files && this.files[0];
            if (!file) return;
            this.value = '';

            if (file.size > MAX_AVATAR_SIZE) {
                setAvatarMsg('文件大小不能超过 2MB', true);
                return;
            }

            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                setAvatarMsg('仅支持 JPG、PNG、GIF、WebP 格式', true);
                return;
            }

            setAvatarMsg('上传中...', false);
            setAvatarLoading(true);

            var formData = new FormData();
            formData.append('avatar', file);

            fetch('/api/user/avatar', {
                method: 'POST',
                credentials: 'include',
                body: formData
            }).then(function(response) {
                return response.json().then(function(data) {
                    return { ok: response.ok, status: response.status, data: data };
                });
            }).then(function(result) {
                setAvatarLoading(false);
                if (result.ok && result.data && result.data.success) {
                    var newUrl = result.data.avatar_url || '';
                    updateAvatarSrc(newUrl);
                    setAvatarMsg('头像更新成功', false);
                } else {
                    var errMsg = '上传失败，请重试';
                    if (result.data && result.data.error_code === 'FILE_TOO_LARGE') errMsg = '文件大小不能超过 2MB';
                    else if (result.data && result.data.error_code === 'INVALID_FILE_TYPE') errMsg = '不支持的文件格式';
                    else if (result.data && result.data.error_code === 'NOT_LOGGED_IN') errMsg = '请先登录';
                    setAvatarMsg(errMsg, true);
                }
            }).catch(function() {
                setAvatarLoading(false);
                setAvatarMsg('网络异常，请稍后重试', true);
            });
        });

        syncProfileUserInfo();
    </script>
