<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户设置 - Yupureki-OJ</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>

        .container {
            padding: 40px;
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 100px);
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 34px;
            font-weight: 300;
            margin-bottom: 18px;
            letter-spacing: 0.05em;
        }

        .sub-title {
            color: rgba(244, 246, 240, 0.75);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
        }

        .settings-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 22px;
            border: 1px solid rgba(244, 246, 240, 0.12);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 12px;
            color: rgba(244, 246, 240, 0.7);
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .field-label { font-size: 12px; color: rgba(244,246,240,0.78); }

        .input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(244,246,240,0.2);
            background: rgba(255,255,255,0.06);
            color: #F4F6F0;
            font-size: 14px;
        }

        .input::placeholder { color: rgba(244,246,240,0.5); }

        .btn {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(244,246,240,0.2);
            background: rgba(255,255,255,0.09);
            color: #F4F6F0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover { background: rgba(255,255,255,0.14); }
        .btn-primary { background: rgba(45,124,240,0.3); border-color: rgba(45,124,240,0.55); }
        .btn-danger { background: rgba(244,67,54,0.18); border-color: rgba(244,67,54,0.42); color: #ffb3ad; }

        .msg { min-height: 18px; font-size: 12px; color: #b8f3be; }

        @media (max-width: 980px) {
            .settings-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; text-align: center; padding: 10px 12px; }
            .nav { margin-left: 0; margin-right: 0; gap: 12px; flex-wrap: wrap; justify-content: center; }
            .container { padding: 20px; }
            .settings-grid { grid-template-columns: 1fr; }
        }
</style>
</head>
<body>
    <div id="page-loading-mask" class="page-loading-mask">
        <div class="page-loading-text">加载中...</div>
    </div>

    <div class="background"></div>
    <div class="rain-lines" id="rainLines"></div>

    <div class="header">
        <div class="nav">
            <img src="/pictures/icon.png" width="40" height="40" alt="logo">
            <p class="logo">Yupureki-OJ</p>
            <a href="/">首页</a>
            <a href="/all_questions">题库</a>
            <a href="/about">关于</a>
            <a href="/user/profile">个人中心</a>
            <div class="rain-toggle" id="rainToggle"></div>
        </div>
        <div class="search-container">
            <input type="text" id="navbar-search" class="search-input" placeholder="搜索题目...">
        </div>
        <div class="nav">
            <div id="user-auth" style="display:block;">
                <button class="btn" id="sign-in-button">登录/注册</button>
            </div>
            <div id="user-profile" style="display:none;"></div>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">账户设置</h1>
        <p class="sub-title">当前账号：<span id="current-email">-</span> / uid：<span id="current-uid">-</span></p>

        <div class="settings-grid">
            <section class="settings-card">
                <h2 class="card-title">换绑邮箱</h2>
                <p class="card-desc">先向当前绑定邮箱发送验证码，验证通过后修改为新邮箱。</p>
                <label class="field-label">当前邮箱验证码</label>
                <div style="display:flex;gap:8px;">
                    <input id="email-change-code" class="input" maxlength="6" placeholder="6位验证码" style="flex:1;">
                    <button id="send-code-email-change" class="btn">发送验证码</button>
                </div>
                <label class="field-label">新邮箱</label>
                <input id="email-change-new" class="input" type="email" placeholder="请输入新邮箱">
                <button id="submit-email-change" class="btn btn-primary">确认换绑</button>
                <div id="msg-email-change" class="msg"></div>
            </section>

            <section class="settings-card">
                <h2 class="card-title">修改密码</h2>
                <p class="card-desc">需先验证当前邮箱验证码。新密码至少8位，且包含字母和数字。</p>
                <label class="field-label">当前邮箱验证码</label>
                <div style="display:flex;gap:8px;">
                    <input id="pwd-change-code" class="input" maxlength="6" placeholder="6位验证码" style="flex:1;">
                    <button id="send-code-password-change" class="btn">发送验证码</button>
                </div>
                <label class="field-label">新密码</label>
                <input id="pwd-change-new" class="input" type="password" placeholder="新密码">
                <label class="field-label">确认新密码</label>
                <input id="pwd-change-confirm" class="input" type="password" placeholder="再次输入新密码">
                <button id="submit-password-change" class="btn btn-primary">确认修改</button>
                <div id="msg-password-change" class="msg"></div>
            </section>

            <section class="settings-card">
                <h2 class="card-title">注销账户</h2>
                <p class="card-desc">该操作不可恢复。请先通过当前邮箱验证码确认身份。</p>
                <label class="field-label">当前邮箱验证码</label>
                <div style="display:flex;gap:8px;">
                    <input id="delete-account-code" class="input" maxlength="6" placeholder="6位验证码" style="flex:1;">
                    <button id="send-code-delete-account" class="btn">发送验证码</button>
                </div>
                <button id="submit-delete-account" class="btn btn-danger">确认注销账户</button>
                <div id="msg-delete-account" class="msg"></div>
            </section>
        </div>
    </div>

    <script>
        function trim(v) { return (v || '').trim(); }
        function isValidEmail(email) { return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(email); }
        function isValidCode(code) { return /^\d{6}$/.test(code); }
        function isStrongPassword(password) {
            if (!password || password.length < 8 || password.length > 72) return false;
            return /[A-Za-z]/.test(password) && /\d/.test(password);
        }

        async function postJson(url, body) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body || {})
            });
            let data = {};
            try { data = await response.json(); } catch (e) { data = { success: false }; }
            return { ok: response.ok, status: response.status, data: data };
        }

        function setMsg(id, text, ok) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.color = ok ? '#b8f3be' : '#ffb0b0';
            el.textContent = text || '';
        }

        async function sendSecurityCode(btnId, msgId) {
            const btn = document.getElementById(btnId);
            if (btn) btn.disabled = true;
            setMsg(msgId, '发送中...', true);
            try {
                const result = await postJson('/api/user/security/send_code', {});
                if (result.ok && result.data.success) {
                    setMsg(msgId, '验证码已发送到当前绑定邮箱', true);
                } else {
                    setMsg(msgId, '发送验证码失败，请稍后重试', false);
                }
            } catch (e) {
                setMsg(msgId, '网络异常，请稍后重试', false);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        async function handleEmailChange() {
            const code = trim(document.getElementById('email-change-code')?.value);
            const newEmail = trim(document.getElementById('email-change-new')?.value);
            if (!isValidCode(code)) {
                setMsg('msg-email-change', '请输入6位验证码', false);
                return;
            }
            if (!isValidEmail(newEmail)) {
                setMsg('msg-email-change', '请输入合法的新邮箱', false);
                return;
            }

            setMsg('msg-email-change', '处理中...', true);
            const result = await postJson('/api/user/email/change', { code: code, email: newEmail });
            if (result.ok && result.data.success) {
                setMsg('msg-email-change', '邮箱换绑成功', true);
                const user = result.data.user || {};
                document.getElementById('current-email').textContent = user.email || '-';
                document.getElementById('current-uid').textContent = user.uid || '-';
                if (typeof SERVER_USER_INFO !== 'undefined') {
                    SERVER_USER_INFO.email = user.email || SERVER_USER_INFO.email;
                    SERVER_USER_INFO.uid = user.uid || SERVER_USER_INFO.uid;
                }
            } else {
                const codeErr = result.data && result.data.error_code;
                if (codeErr === 'EMAIL_ALREADY_EXISTS') setMsg('msg-email-change', '新邮箱已被使用', false);
                else if (codeErr === 'SAME_EMAIL') setMsg('msg-email-change', '新邮箱不能与当前邮箱相同', false);
                else if (codeErr === 'CODE_MISMATCH') setMsg('msg-email-change', '验证码错误', false);
                else if (codeErr === 'CODE_EXPIRED') setMsg('msg-email-change', '验证码已过期，请重新发送', false);
                else if (codeErr === 'ATTEMPTS_EXCEEDED') setMsg('msg-email-change', '验证失败次数过多，请重新发送验证码', false);
                else setMsg('msg-email-change', '换绑失败，请稍后重试', false);
            }
        }

        async function handlePasswordChange() {
            const code = trim(document.getElementById('pwd-change-code')?.value);
            const np = document.getElementById('pwd-change-new')?.value || '';
            const cp = document.getElementById('pwd-change-confirm')?.value || '';
            if (!isValidCode(code)) {
                setMsg('msg-password-change', '请输入6位验证码', false);
                return;
            }
            if (!isStrongPassword(np)) {
                setMsg('msg-password-change', '新密码至少8位且包含字母和数字', false);
                return;
            }
            if (np !== cp) {
                setMsg('msg-password-change', '两次输入密码不一致', false);
                return;
            }

            setMsg('msg-password-change', '处理中...', true);
            const result = await postJson('/api/user/password/change', { code: code, new_password: np });
            if (result.ok && result.data.success) {
                setMsg('msg-password-change', '密码修改成功', true);
                document.getElementById('pwd-change-new').value = '';
                document.getElementById('pwd-change-confirm').value = '';
            } else {
                const codeErr = result.data && result.data.error_code;
                if (codeErr === 'WEAK_PASSWORD') setMsg('msg-password-change', '新密码至少8位且包含字母和数字', false);
                else if (codeErr === 'CODE_MISMATCH') setMsg('msg-password-change', '验证码错误', false);
                else if (codeErr === 'CODE_EXPIRED') setMsg('msg-password-change', '验证码已过期，请重新发送', false);
                else if (codeErr === 'ATTEMPTS_EXCEEDED') setMsg('msg-password-change', '验证失败次数过多，请重新发送验证码', false);
                else setMsg('msg-password-change', '修改失败，请稍后重试', false);
            }
        }

        async function handleDeleteAccount() {
            const code = trim(document.getElementById('delete-account-code')?.value);
            if (!isValidCode(code)) {
                setMsg('msg-delete-account', '请输入6位验证码', false);
                return;
            }
            if (!window.confirm('注销账户后不可恢复，确定继续吗？')) {
                return;
            }

            setMsg('msg-delete-account', '处理中...', true);
            const result = await postJson('/api/user/account/delete', { code: code });
            if (result.ok && result.data.success) {
                setMsg('msg-delete-account', '账户已注销，正在返回首页...', true);
                window.location.href = '/';
            } else {
                const codeErr = result.data && result.data.error_code;
                if (codeErr === 'CODE_MISMATCH') setMsg('msg-delete-account', '验证码错误', false);
                else if (codeErr === 'CODE_EXPIRED') setMsg('msg-delete-account', '验证码已过期，请重新发送', false);
                else if (codeErr === 'ATTEMPTS_EXCEEDED') setMsg('msg-delete-account', '验证失败次数过多，请重新发送验证码', false);
                else setMsg('msg-delete-account', '注销失败，请稍后重试', false);
            }
        }

        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            if (!rainLines) return;
            for (let i = 0; i < 50; i++) {
                const line = document.createElement('div');
                line.className = 'rain-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        document.getElementById('rainToggle')?.addEventListener('click', function () {
            const rainLines = document.getElementById('rainLines');
            if (!rainLines) return;
            rainLines.style.display = rainLines.style.display === 'none' ? 'block' : 'none';
        });

        async function initCurrentUser() {
            if (typeof SERVER_USER_INFO !== 'undefined' && SERVER_USER_INFO.isLoggedIn) {
                document.getElementById('current-email').textContent = SERVER_USER_INFO.email || '-';
                document.getElementById('current-uid').textContent = SERVER_USER_INFO.uid || '-';
                return;
            }

            try {
                const res = await fetch('/api/user/info', { credentials: 'include' });
                const data = await res.json();
                if (data && data.success && data.user) {
                    document.getElementById('current-email').textContent = data.user.email || '-';
                    document.getElementById('current-uid').textContent = data.user.uid || '-';
                }
            } catch (e) {
                console.error('加载用户信息失败:', e);
            }
        }

        document.getElementById('send-code-email-change')?.addEventListener('click', function () {
            sendSecurityCode('send-code-email-change', 'msg-email-change');
        });
        document.getElementById('send-code-password-change')?.addEventListener('click', function () {
            sendSecurityCode('send-code-password-change', 'msg-password-change');
        });
        document.getElementById('send-code-delete-account')?.addEventListener('click', function () {
            sendSecurityCode('send-code-delete-account', 'msg-delete-account');
        });

        document.getElementById('submit-email-change')?.addEventListener('click', handleEmailChange);
        document.getElementById('submit-password-change')?.addEventListener('click', handlePasswordChange);
        document.getElementById('submit-delete-account')?.addEventListener('click', handleDeleteAccount);

        createRainLines();
        initCurrentUser();
    </script>

    <script src="/js/page-loading.js"></script>
    <script src="/js/auth.js?v=20260423"></script>
<script src="/js/search.js"></script>
</body>
</html>
