<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目列表 - Yupureki-OJ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #2D2F2C;
        }

        /* 背景图片 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/pictures/preview.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0.2px);
            z-index: -1;
        }

        /* 雨线效果 */
        .rain-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(244, 246, 240, 0.05));
            animation: rain 3s linear infinite;
        }

        @keyframes rain {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav a {
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            color: #F4F6F0;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(244, 246, 240, 0.6);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav a:hover::after {
            width: 100%;
        }

        .rain-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(244, 246, 240, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-toggle:hover {
            background: rgba(244, 246, 240, 0.1);
            transform: scale(1.1);
        }

        .rain-toggle::before {
            content: '♪';
            color: rgba(244, 246, 240, 0.6);
            font-size: 14px;
        }

        .page-title {
            text-align: center;
            color: #F4F6F0;
            font-size: 48px;
            margin-bottom: 60px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 300;
            letter-spacing: 0.05em;
            animation: fadeIn 1.5s ease;
        }

        .questions-container {
            display: grid;
            gap: 24px;
            margin-bottom: 60px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            animation: fadeIn 0.8s ease both;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 24px;
            align-items: center;
        }

        .question-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .question-number {
            font-size: 24px;
            font-weight: 300;
            color: #F4F6F0;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
  
        .question-info {
            flex: 1;
        }

        .question-title {
            font-size: 18px;
            color: #F4F6F0;
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .question-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .difficulty {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(244, 246, 240, 0.8);
            border: 1px solid rgba(244, 246, 240, 0.2);
        }

        .difficulty-simple {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.3);
            color: rgba(76, 175, 80, 0.8);
        }

        .difficulty-medium {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.3);
            color: rgba(255, 152, 0, 0.8);
        }

        .difficulty-hard {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.3);
            color: rgba(244, 67, 54, 0.8);
        }

        .arrow-icon {
            font-size: 20px;
            color: rgba(244, 246, 240, 0.5);
            transition: all 0.3s ease;
        }

        .question-card:hover .arrow-icon {
            transform: translateX(5px);
            color: rgba(244, 246, 240, 0.8);
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #F4F6F0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(244, 246, 240, 0.4);
        }

        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(244, 246, 240, 0.4);
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(244, 246, 240, 0.5);
            font-size: 12px;
            letter-spacing: 0.02em;
            animation: fadeIn 2s ease 1s both;
        }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 246, 240, 0.1);
            transform: scale(0);
            animation: ripple 0.4s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(244, 246, 240, 0.3);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(244, 246, 240, 0.5);
        }

        @media (max-width: 768px) {
            .question-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .question-number {
                margin: 0 auto;
            }
            .question-meta {
                justify-content: center;
            }
            .nav {
                flex-direction: column;
                gap: 15px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .filter-bar {
                flex-direction: column;
            }
            .page-title {
                font-size: 36px;
            }
        }

        .pagination {
            margin: 40px 0;
            padding: 0;
        }

        .pagination-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(244, 246, 240, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: fadeIn 0.8s ease;
        }

        .pagination-info {
            color: rgba(244, 246, 240, 0.8);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .pagination-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 10px 20px;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .pagination-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: translateY(-2px);
        }

        .pagination-numbers {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pagination-num {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(244, 246, 240, 0.2);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(244, 246, 240, 0.8);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 300;
        }

        .pagination-num:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 246, 240, 0.4);
            color: #F4F6F0;
            transform: scale(1.1);
        }

        .pagination-num.current {
            background: rgba(244, 246, 240, 0.2);
            border-color: rgba(244, 246, 240, 0.5);
            color: #F4F6F0;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            .pagination-container {
                flex-direction: column;
                align-items: center;
            }
            .pagination-buttons {
                flex-direction: column;
                width: 100%;
            }
            .pagination-numbers {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    
    <!-- 背景图片 -->
    <div class="background"></div>
    
    <!-- 雨线效果 -->
    <div class="rain-lines" id="rainLines"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">Yupureki-OJ</div>
            <div class="nav">
                <a href="/">首页</a>
                <a href="/all_questions">题库</a>
                <a href="/about">关于</a>
                <div class="rain-toggle" id="rainToggle"></div>
            </div>
        </div>

        <h1 class="page-title">题目列表</h1>

        <div class="filter-bar">
            <input type="text" class="search-box" placeholder="搜索题目...">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">简单</button>
            <button class="filter-btn">中等</button>
            <button class="filter-btn">困难</button>
        </div>

        <div class="questions-container">
            {{#question_list}}
            <a href="/questions/{{number}}" style="text-decoration: none; position: relative;">
                <div class="question-card">
                    <div class="question-number">{{number}}</div>
                    <div class="question-info">
                        <div class="question-title">{{title}}</div>
                        <div class="question-meta">
                            <span class="difficulty difficulty-{{star}}">{{star}}</span>
                        </div>
                    </div>
                    <div class="arrow-icon">→</div>
                </div>
            </a>
            {{/question_list}}
        </div>

        <div class="pagination">
            <div class="pagination-container">
                <div class="pagination-info">
                    <span id="pageInfo">第 1 页 / 共 2 页</span>
                </div>
                <div class="pagination-buttons">
                    <a href="/all_questions?page=1" id="firstPage" class="pagination-btn">首页</a>
                    <a href="/all_questions?page=1" id="prevPage" class="pagination-btn">上一页</a>
                    <div class="pagination-numbers" id="pageNumbers">
                    </div>
                    <a href="/all_questions?page=2" id="nextPage" class="pagination-btn">下一页</a>
                    <a href="/all_questions?page=2" id="lastPage" class="pagination-btn">末页</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Yupureki-OJ. All rights reserved.</p>
        </div>
    </div>

    <script>
        // 交互元素
        const interactiveElements = document.querySelectorAll('a, button, .rain-toggle');

        // 涟漪效果
        interactiveElements.forEach(element => {
            element.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                element.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            });
        });

        // 生成雨线
        function createRainLines() {
            const rainLines = document.getElementById('rainLines');
            const lineCount = 50;
            
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.classList.add('rain-line');
                line.style.left = Math.random() * 100 + '%';
                line.style.height = Math.random() * 100 + 50 + 'px';
                line.style.animationDelay = Math.random() * 3 + 's';
                line.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rainLines.appendChild(line);
            }
        }

        // 筛选按钮功能
        const filterBtns = document.querySelectorAll('.filter-btn');
        const questionCards = document.querySelectorAll('.question-card');
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.textContent.trim();
                
                questionCards.forEach(card => {
                    const difficultySpan = card.querySelector('.difficulty');
                    const difficulty = difficultySpan ? difficultySpan.textContent.trim() : '';
                    
                    if (filter === '全部' || difficulty === filter) {
                        card.parentElement.style.display = 'block';
                    } else {
                        card.parentElement.style.display = 'none';
                    }
                });
            });
        });

        // 搜索功能
        const searchBox = document.querySelector('.search-box');
        searchBox.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            questionCards.forEach(card => {
                const title = card.querySelector('.question-title').textContent.toLowerCase();
                const number = card.querySelector('.question-number').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || number.includes(searchTerm)) {
                    card.parentElement.style.display = 'block';
                } else {
                    card.parentElement.style.display = 'none';
                }
            });
        });

        // 分页功能
        function updatePagination() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentPage = parseInt(urlParams.get('page')) || 1;
            const totalPages = parseInt(document.getElementById('pageInfo').textContent.match(/共 (\d+) 页/)[1]);
            
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            
            const firstPageBtn = document.getElementById('firstPage');
            const prevPageBtn = document.getElementById('prevPage');
            const nextPageBtn = document.getElementById('nextPage');
            const lastPageBtn = document.getElementById('lastPage');
            
            if (firstPageBtn) firstPageBtn.href = `/all_questions?page=1`;
            if (prevPageBtn) prevPageBtn.href = `/all_questions?page=${Math.max(1, currentPage - 1)}`;
            if (nextPageBtn) nextPageBtn.href = `/all_questions?page=${Math.min(totalPages, currentPage + 1)}`;
            if (lastPageBtn) lastPageBtn.href = `/all_questions?page=${totalPages}`;
            
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                const pageLink = document.createElement('a');
                pageLink.href = `/all_questions?page=${i}`;
                pageLink.className = `pagination-num ${i === currentPage ? 'current' : ''}`;
                pageLink.textContent = i;
                pageNumbers.appendChild(pageLink);
            }
        }

        // 初始化
        createRainLines();
        updatePagination();
    </script>
</body>
</html>
