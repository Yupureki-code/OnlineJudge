name: onlinejudge

x-env: &env
  OJ_DB_HOST: mysql
  OJ_DB_PORT: "3306"
  OJ_DB_USER: oj_server
  OJ_DB_PASS: ${OJ_DB_PASSWORD:?OJ_DB_PASSWORD is required}
  OJ_DB_NAME: myoj
  OJ_REDIS_ADDR: ${OJ_REDIS_ADDR:?OJ_REDIS_ADDR authenticated URI is required}
  OJ_MQ_HOST: rabbitmq
  OJ_MQ_PORT: "5672"
  OJ_MQ_USER: ${OJ_MQ_USER:?OJ_MQ_USER is required}
  OJ_MQ_PASS: ${OJ_MQ_PASSWORD:?OJ_MQ_PASSWORD is required}
  OJ_GATEWAY_AUTH_TOKEN_FILE: /run/secrets/gateway_auth_token
  OJ_COOKIE_SECURE: "true"
  OJ_CONF_PATH: /app/conf
  OJ_HTML_PATH: /app/wwwroot
  OJ_LOG_PATH: /app/log

x-secure: &secure
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - "/tmp:rw,noexec,nosuid,size=64m"
    - "/app/tmp:rw,noexec,nosuid,size=128m,uid=999,gid=999,mode=0770"
    - "/app/log:rw,noexec,nosuid,size=64m,uid=999,gid=999,mode=0770"
  restart: unless-stopped
  networks: [internal]

services:
  mysql:
    image: mysql:8.0.39
    environment:
      MYSQL_ROOT_PASSWORD: ${OJ_MYSQL_ROOT_PASSWORD:?OJ_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: myoj
      MYSQL_USER: oj_server
      MYSQL_PASSWORD: ${OJ_DB_PASSWORD:?OJ_DB_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/users.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ../sql/questions.sql:/docker-entrypoint-initdb.d/02_questions.sql:ro
      - ../sql/tests.sql:/docker-entrypoint-initdb.d/03_tests.sql:ro
      - ../sql/solutions.sql:/docker-entrypoint-initdb.d/04_solutions.sql:ro
      - ../sql/solution_comments.sql:/docker-entrypoint-initdb.d/05_comments.sql:ro
      - ../sql/solution_actions.sql:/docker-entrypoint-initdb.d/06_solution_actions.sql:ro
      - ../sql/comment_actions.sql:/docker-entrypoint-initdb.d/07_comment_actions.sql:ro
      - ../sql/user_submits.sql:/docker-entrypoint-initdb.d/08_submissions.sql:ro
      - ../sql/admin_accounts.sql:/docker-entrypoint-initdb.d/09_admin_accounts.sql:ro
      - ../sql/admin_audit_logs.sql:/docker-entrypoint-initdb.d/10_admin_audit.sql:ro
      - ../sql/cache_metrics_snapshots.sql:/docker-entrypoint-initdb.d/11_cache_metrics.sql:ro
      - ../sql/judge_tasks.sql:/docker-entrypoint-initdb.d/12_judge_tasks.sql:ro
      - ../sql/migrations/20260715_01_submissions_and_outbox.sql:/docker-entrypoint-initdb.d/90_submissions.sql:ro
      - ../sql/migrations/20260715_02_odb_schema_alignment.sql:/docker-entrypoint-initdb.d/91_odb.sql:ro
      - ../sql/migrations/20260715_03_comment_schema_alignment.sql:/docker-entrypoint-initdb.d/92_comments.sql:ro
      - ../sql/migrations/20260715_04_interaction_constraints.sql:/docker-entrypoint-initdb.d/93_interactions.sql:ro
      - ../sql/migrations/20260716_05_legacy_submission_bool_alignment.sql:/docker-entrypoint-initdb.d/94_submission_bool.sql:ro
      - ../sql/migrations/20260716_06_existing_schema_compatibility.sql:/docker-entrypoint-initdb.d/95_compatibility.sql:ro
      - ../sql/migrations/20260717_01_question_visibility.sql:/docker-entrypoint-initdb.d/96_visibility.sql:ro
      - ../sql/migrations/20260717_02_judge_outbox_leases.sql:/docker-entrypoint-initdb.d/97_outbox_leases.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck: { test: [CMD-SHELL, 'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD"'], interval: 5s, timeout: 5s, retries: 20 }
    restart: unless-stopped
    networks: [internal]
  redis:
    image: redis:7.4.2-alpine
    environment:
      REDIS_PASSWORD: ${OJ_REDIS_PASSWORD:?OJ_REDIS_PASSWORD is required}
    command: [sh, -ec, 'exec redis-server --appendonly yes --user default on ">$$REDIS_PASSWORD" "~*" "&*" "+@all"']
    volumes: [redis_data:/data]
    healthcheck: { test: [CMD-SHELL, 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping'], interval: 5s, timeout: 3s, retries: 20 }
    restart: unless-stopped
    networks: [internal]
  rabbitmq:
    image: rabbitmq:3.13.7-management
    environment:
      RABBITMQ_DEFAULT_USER: ${OJ_MQ_USER:?OJ_MQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${OJ_MQ_PASSWORD:?OJ_MQ_PASSWORD is required}
    volumes: [rabbitmq_data:/var/lib/rabbitmq]
    healthcheck: { test: [CMD, rabbitmq-diagnostics, -q, ping], interval: 5s, timeout: 5s, retries: 20 }
    restart: unless-stopped
    networks: [internal]

  oj_server:
    <<: *secure
    image: onlinejudge-app:phase8
    build: { context: .., dockerfile: docker/Dockerfile.oj_server }
    environment:
      <<: *env
      OJ_SERVER_PORT: "8080"
      OJ_JUDGE_CALLBACK_KEY_ID: phase8-compose
      OJ_JUDGE_CALLBACK_SECRET: ${OJ_JUDGE_CALLBACK_SECRET:?OJ_JUDGE_CALLBACK_SECRET is required}
    secrets: [gateway_auth_token]
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    healthcheck: { test: [CMD, curl, -fsS, http://localhost:8080/healthz], interval: 5s, timeout: 3s, retries: 20 }
  oj_admin:
    <<: *secure
    image: onlinejudge-app:phase8
    entrypoint: [/app/bin/oj_admin]
    environment:
      <<: *env
      OJ_ADMIN_HOST: 0.0.0.0
      OJ_ADMIN_PORT: "8090"
    secrets: [gateway_auth_token]
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_healthy } }
    healthcheck: { test: [CMD, curl, -fsS, http://localhost:8090/healthz], interval: 5s, timeout: 3s, retries: 20 }
  judge_service:
    <<: *secure
    image: onlinejudge-app:phase8
    entrypoint: [/app/bin/judge_service]
    environment:
      <<: *env
      OJ_SERVER_RPC_ADDR: oj_server:8080
      OJ_JUDGE_CALLBACK_KEY_ID: phase8-compose
      OJ_JUDGE_CALLBACK_SECRET: ${OJ_JUDGE_CALLBACK_SECRET:?OJ_JUDGE_CALLBACK_SECRET is required}
      OJ_JUDGE_INBOX_COMPLETED_TTL_SECONDS: ${OJ_JUDGE_INBOX_COMPLETED_TTL_SECONDS:-604800}
    depends_on: { oj_server: { condition: service_healthy }, redis: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add: ["${DOCKER_GID:?DOCKER_GID for /var/run/docker.sock is required}"]

  openresty:
    build: { context: .., dockerfile: docker/Dockerfile.openresty }
    environment:
      OJ_SERVER_UPSTREAM: http://oj_server:8080
      OJ_ADMIN_UPSTREAM: http://oj_admin:8090
      OJ_ALLOWED_ORIGINS: ${OJ_ALLOWED_ORIGINS:-https://localhost}
      OJ_COOKIE_SECURE: "true"
      OJ_REQUIRE_TLS_SECRETS: ${OJ_REQUIRE_TLS_SECRETS:-true}
      OJ_GATEWAY_AUTH_TOKEN_FILE: /run/secrets/gateway_auth_token
    depends_on: { oj_server: { condition: service_healthy }, oj_admin: { condition: service_healthy } }
    ports: ["80:8080", "443:8443"]
    secrets:
      - oj_tls_cert
      - oj_tls_key
      - gateway_auth_token
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    healthcheck: { test: [CMD, wget, -qO-, http://localhost:8080/healthz], interval: 5s, timeout: 3s, retries: 20 }
    restart: unless-stopped
    networks: [edge, internal]

networks:
  edge: {}
  internal: { name: oj-internal, internal: true }
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
secrets:
  oj_tls_cert:
    file: ${OJ_TLS_CERT_PATH:?OJ_TLS_CERT_PATH is required}
  oj_tls_key:
    file: ${OJ_TLS_KEY_PATH:?OJ_TLS_KEY_PATH is required}
  gateway_auth_token:
    file: ${OJ_GATEWAY_AUTH_TOKEN_PATH:?OJ_GATEWAY_AUTH_TOKEN_PATH is required}
