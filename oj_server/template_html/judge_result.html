<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>判题结果</title>
</head>
<body>
    <h1>判题结果</h1>
    <div id="result"></div>
    <script>
        // 解析URL中的JSON参数
        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 显示结果
        function displayResult() {
            const resultDiv = document.getElementById('result');
            try {
                // 尝试从URL参数获取结果
                const resultJson = getURLParam('result');
                if (resultJson) {
                    const result = JSON.parse(decodeURIComponent(resultJson));
                    showResult(result);
                } else {
                    // 否则尝试从responseText获取
                    showResult({"status": "AC", "message": "Accepted", "time": "0ms", "memory": "0KB"});
                }
            } catch (e) {
                resultDiv.innerHTML = '<p>错误：无法解析结果</p>';
            }
        }

        function showResult(result) {
            const resultDiv = document.getElementById('result');
            let statusText, color;
            
            // 根据状态码转换为对应的文本
            switch(result.status) {
                case 0:
                    statusText = 'AC';
                    color = 'green';
                    break;
                case 1:
                    statusText = 'WA';
                    color = 'red';
                    break;
                case 2:
                    statusText = 'RUNTIME_ERROR';
                    color = 'red';
                    break;
                case 3:
                    statusText = 'MEMORY_LIMIT';
                    color = 'red';
                    break;
                case 4:
                    statusText = 'COMPILE_ERROR';
                    color = 'red';
                    break;
                case 5:
                    statusText = 'FPE_ERROR';
                    color = 'red';
                    break;
                case 6:
                    statusText = 'SEGV_ERROR';
                    color = 'red';
                    break;
                default:
                    statusText = 'UNKNOWN';
                    color = 'red';
            }
            
            let errorInfo = '';
            // 如果是编译错误或运行错误，显示错误信息
            if (result.status === 4 || result.status >= 2 && result.status <= 3 || result.status >= 5 && result.status <= 6) {
                if (result.stderr) {
                    errorInfo = `<div style="margin-top: 10px; padding: 10px; background-color: #f5f5f5; border-left: 4px solid ${color};">
                        <h4>错误信息:</h4>
                        <pre style="white-space: pre-wrap; font-family: monospace;">${result.stderr}</pre>
                    </div>`;
                }
            }
            
            resultDiv.innerHTML = `
                <p style="color: ${color}; font-size: 24px;">${statusText} - ${result.desc}</p>
                ${result.stdout ? `<p>输出: ${result.stdout}</p>` : ''}
                ${errorInfo}
                <p><a href="/all_questions">返回题目列表</a></p>
            `;
        }

        // 页面加载时显示结果
        window.onload = displayResult;
    </script>
</body>
</html>
