<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{title}}</title>
</head>
<body>
    <h1>{{number}}. {{title}}</h1>
    <p>难度：{{star}}</p>
    <h2>题目描述</h2>
    <pre>{{desc}}</pre>
    <h2>提交代码</h2>
    <form action="/judge/{{number}}" method="post">
        <textarea name="code" rows="20" cols="80" placeholder="在此输入你的代码..."></textarea><br>
        <input type="submit" value="提交">
    </form>
    <p><a href="/all_questions">返回题目列表</a></p>
</body>
</html>
