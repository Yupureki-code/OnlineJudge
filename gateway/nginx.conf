worker_processes auto;
error_log stderr info;
pid /tmp/nginx.pid;
env OJ_PROTO_DESCRIPTOR;
env OJ_COOKIE_SECURE;
env OJ_ALLOWED_ORIGINS;
env OJ_GATEWAY_MAX_JSON_BODY;
env OJ_GATEWAY_MAX_AVATAR_BASE64;
env OJ_GATEWAY_MAX_CODE;
env OJ_GATEWAY_MAX_CUSTOM_INPUT;
env OJ_GATEWAY_MAX_UPSTREAM_RESPONSE;
env OJ_SERVER_UPSTREAM;
env OJ_ADMIN_UPSTREAM;
env OJ_UPSTREAM_CONNECT_TIMEOUT_MS;
env OJ_UPSTREAM_SEND_TIMEOUT_MS;
env OJ_UPSTREAM_READ_TIMEOUT_MS;
env OJ_UPSTREAM_TOTAL_TIMEOUT_MS;
env OJ_UPSTREAM_KEEPALIVE_TIMEOUT_MS;
env OJ_UPSTREAM_KEEPALIVE_POOL;

events { worker_connections 1024; }

http {
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 2s;
    lua_package_path "/usr/local/openresty/oj/?.lua;/usr/local/openresty/oj/lua/?.lua;;";
    lua_code_cache on;
    lua_check_client_abort on;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;
    client_max_body_size 1m;
    client_body_buffer_size 1m;
    large_client_header_buffers 4 16k;
    underscores_in_headers off;
    server_tokens off;
    include mime.types;
    default_type application/octet-stream;

    init_worker_by_lua_block {
        require("bootstrap").init()
    }

    include /usr/local/openresty/nginx/conf/conf.d/*.conf;
}
