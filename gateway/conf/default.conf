server {
    listen 8080;
    server_name _;
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
    location / { return 308 https://$host$request_uri; }
}

server {
    listen 8443 ssl;
    server_name _;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    ssl_certificate /tmp/oj-tls/tls.crt;
    ssl_certificate_key /tmp/oj-tls/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:OJTLS:10m;
    ssl_session_timeout 10m;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(api|admin/api)(/|$) {
        content_by_lua_block { require("router").handle() }
    }

    root /usr/local/openresty/oj/wwwroot;
    location = / { try_files /index.html =404; }
    location = /all_questions { try_files /all_questions.html =404; }
    location = /about { try_files /about.html =404; }
    location = /user/profile { try_files /user/profile.html =404; }
    location = /user/settings { try_files /user/settings.html =404; }
    location = /judge_result.html { try_files /judge_result.html =404; }
    location = /admin/login { try_files /admin/login.html =404; }
    location = /admin { try_files /admin/index.html =404; }
    location ~ "^/questions/[0-9]{1,5}$" { try_files /one_question.html =404; }
    location ~ "^/questions/[0-9]{1,5}/solutions/new$" { try_files /solutions/new.html =404; }
    location ~ ^/solutions/[0-9]+$ { try_files /solutions/detail.html =404; }
    location ~ ^/(js|admin)/ {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }
    location ~ ^/(css|pictures)/ {
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }
    location / { try_files $uri $uri.html =404; }
}
