# conf/gateway.conf
# Gateway 路由配置
# 格式：path_prefix backend_service backend_method require_auth require_admin
# backend_service: business / judge
# require_auth: true/false
# require_admin: true/false

# 认证相关（无需认证）
/api/auth/send_code    business  UserService.SendCode       false false
/api/auth/verify_code  business  UserService.Register       false false
/api/auth/login        business  UserService.Login          false false

# 用户相关（需认证）
/api/user/info         business  UserService.GetUser         true false
/api/user/update       business  UserService.UpdateUser     true false
/api/user/dashboard    business  UserService.GetDashboard   true false

# 题目相关（读取无需认证，写入需管理员）
/api/question/list     business  QuestionService.GetQuestionList    false false
/api/question/detail   business  QuestionService.GetQuestionDetail  false false
/api/question/create   business  QuestionService.CreateQuestion     true  true
/api/question/update   business  QuestionService.UpdateQuestion     true  true
/api/question/testcase business  QuestionService.UploadTestCase     true  true

# 题解相关（读取无需认证，写入需认证）
/api/solution/list     business  SolutionService.GetSolutionList    false false
/api/solution/detail   business  SolutionService.GetSolutionDetail   false false
/api/solution/create   business  SolutionService.CreateSolution     true  false
/api/solution/like     business  SolutionService.ToggleLike          true  false
/api/solution/favorite business  SolutionService.ToggleFavorite      true  false

# 评论相关（需认证）
/api/comment/list      business  CommentService.GetComments          false false
/api/comment/create    business  CommentService.CreateComment        true  false
/api/comment/delete    business  CommentService.DeleteComment        true  false
/api/comment/like      business  CommentService.ToggleCommentLike   true  false

# 判题相关（需认证）
/api/judge/submit      judge     JudgeService.Submit                 true  false
/api/judge/status      judge     JudgeService.GetStatus              true  false

# 管理后台（需管理员）
/api/admin/login       business  AdminService.AdminLogin             false false
/api/admin/dashboard   business  AdminService.GetDashboard           true  true
/api/admin/question    business  AdminService.ManageQuestion         true  true
/api/admin/user        business  AdminService.ManageUser             true  true
/api/admin/logs        business  AdminService.GetAuditLogs           true  true